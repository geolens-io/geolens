# ==============================================================================
# Production / pull-prebuilt-images compose
# ==============================================================================
# This is the compose `scripts/install.sh` uses for a RELEASE install: it PULLS
# the version-pinned, multi-arch, Trivy-scanned images published by
# `.github/workflows/publish.yml` instead of building from source. It is the
# fast, reproducible path for self-hosters.
#
#   docker compose -f docker-compose.prod.yml pull
#   GEOLENS_VERSION=1.2.3 docker compose -f docker-compose.prod.yml up -d
#
# The dev/build compose is `docker-compose.yml` (bind-mounts, --reload, Vite dev
# server, locally-built db). Use that for development or as the offline / fork /
# unreleased-`main` fallback. install.sh falls back to it automatically when no
# release image is available.
#
# DRIFT: the third-party services (titiler, minio, valkey, backup) and the
# shared env anchors are duplicated from docker-compose.yml on purpose — a
# standalone file avoids compose-override list-merge traps (you cannot drop a
# bind-mount or replace a port via override). Keep db/titiler/minio/valkey/backup
# blocks in sync with docker-compose.yml when they change.
#
# GEOLENS_VERSION pins the image tag. install.sh sets it to the resolved release
# tag (e.g. 1.2.3). Defaults to `latest` for a manual `docker compose` invocation.
# ==============================================================================

# ------------------------------------------------------------------------------
# Shared environment anchors (kept in sync with docker-compose.yml)
# ------------------------------------------------------------------------------
x-db-env: &db-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB}

x-auth-env: &auth-env
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  GEOLENS_ADMIN_USERNAME: ${GEOLENS_ADMIN_USERNAME}
  GEOLENS_ADMIN_PASSWORD: ${GEOLENS_ADMIN_PASSWORD}
  JWT_ALGORITHM: "${JWT_ALGORITHM:-HS256}"
  ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-15}"
  REFRESH_TOKEN_EXPIRE_DAYS: "${REFRESH_TOKEN_EXPIRE_DAYS:-7}"
  PASSWORD_MIN_LENGTH: "${PASSWORD_MIN_LENGTH:-12}"
  PASSWORD_REQUIRE_CLASSES: "${PASSWORD_REQUIRE_CLASSES:-3}"

x-db-ssl-env: &db-ssl-env
  DATABASE_URL_OVERRIDE: "${DATABASE_URL_OVERRIDE:-}"
  DATABASE_SSL_MODE: "${DATABASE_SSL_MODE:-prefer}"
  DATABASE_SSL_CA_CERT: "${DATABASE_SSL_CA_CERT:-}"
  DATABASE_POOL_PRE_PING: "${DATABASE_POOL_PRE_PING:-true}"
  DB_USE_EXTERNAL_POOLER: "${DB_USE_EXTERNAL_POOLER:-false}"
  DB_POOL_SIZE: "${DB_POOL_SIZE:-10}"
  DB_MAX_OVERFLOW: "${DB_MAX_OVERFLOW:-3}"
  DB_POOL_TIMEOUT: "${DB_POOL_TIMEOUT:-30}"
  DB_POOL_RECYCLE: "${DB_POOL_RECYCLE:-1800}"

x-storage-env: &storage-env
  STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
  S3_ENDPOINT: "${S3_ENDPOINT:-}"
  S3_BUCKET: "${S3_BUCKET:-}"
  S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
  S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
  S3_REGION: "${S3_REGION:-us-east-1}"
  S3_ALLOW_HTTP: "${S3_ALLOW_HTTP:-false}"
  S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-auto}"
  AZURE_STORAGE_CONTAINER: "${AZURE_STORAGE_CONTAINER:-}"
  AZURE_STORAGE_CONNECTION_STRING: "${AZURE_STORAGE_CONNECTION_STRING:-}"
  AZURE_STORAGE_ACCOUNT_URL: "${AZURE_STORAGE_ACCOUNT_URL:-}"
  AZURE_STORAGE_ACCOUNT_KEY: "${AZURE_STORAGE_ACCOUNT_KEY:-}"

x-logging-env: &logging-env
  LOG_JSON: "${LOG_JSON:-false}"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"
  # fix(#441): the SEC-005 posture flag never reached the containers — an
  # operator setting ENVIRONMENT=production in .env got no Secure cookie and
  # public /docs anyway. Empty (unset) falls back to LOG_JSON in Settings.
  ENVIRONMENT: "${ENVIRONMENT:-}"

x-ai-env: &ai-env
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
  LLM_MODEL: "${LLM_MODEL:-claude-sonnet-5}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o}"
  OPENAI_MODEL_LIGHT: "${OPENAI_MODEL_LIGHT:-}"
  OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
  EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
  EMBEDDING_DIMS: "${EMBEDDING_DIMS:-1536}"
  EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-}"

x-edition-env: &edition-env
  GEOLENS_EDITION: "${GEOLENS_EDITION:-}"
  GEOLENS_TENANCY_MODE: "${GEOLENS_TENANCY_MODE:-single_tenant}"
  GEOLENS_LICENSE_ENFORCE: "${GEOLENS_LICENSE_ENFORCE:-false}"
  GEOLENS_LICENSE_KEY: "${GEOLENS_LICENSE_KEY:-}"
  GEOLENS_LICENSE_FILE: "${GEOLENS_LICENSE_FILE:-}"
  GEOLENS_LICENSE_AUDIENCE: "${GEOLENS_LICENSE_AUDIENCE:-}"

x-notification-env: &notification-env
  NOTIFICATIONS_ENABLED: "${NOTIFICATIONS_ENABLED:-false}"
  SMTP_HOST: "${SMTP_HOST:-}"
  SMTP_PORT: "${SMTP_PORT:-587}"
  SMTP_USERNAME: "${SMTP_USERNAME:-}"
  SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
  SMTP_FROM_ADDRESS: "${SMTP_FROM_ADDRESS:-}"
  SMTP_USE_TLS: "${SMTP_USE_TLS:-true}"
  NOTIFICATION_WEBHOOK_URL: "${NOTIFICATION_WEBHOOK_URL:-}"
  NOTIFICATION_WEBHOOK_SECRET: "${NOTIFICATION_WEBHOOK_SECRET:-}"
  NOTIFY_ON_SIGNUP: "${NOTIFY_ON_SIGNUP:-false}"
  NOTIFY_ON_INGEST_COMPLETE: "${NOTIFY_ON_INGEST_COMPLETE:-false}"
  NOTIFY_ON_INGEST_FAILED: "${NOTIFY_ON_INGEST_FAILED:-false}"
  NOTIFY_ON_HEALTH_ALERT: "${NOTIFY_ON_HEALTH_ALERT:-false}"
  NOTIFICATION_ADMIN_EMAIL: "${NOTIFICATION_ADMIN_EMAIL:-}"

x-app-runtime-env: &app-runtime-env
  LANDING_FIRST: "${LANDING_FIRST:-false}"
  DEMO_MODE: "${DEMO_MODE:-false}"
  TITILER_BASE_URL: "${TITILER_BASE_URL:-http://titiler:8000}"

# Shared hardening profile for the FastAPI-image trio (api, worker, migrate).
# Identical to docker-compose.yml: start as root, chown the upload_staging
# volume, then setpriv-drop to uid 1001. read_only root fs + dropped caps.
x-hardened-base: &hardened-base
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
  read_only: true

# Registry + owner for the published images. Override REGISTRY/IMAGE_OWNER only
# for a fork or a mirror; defaults point at the canonical GHCR namespace.
x-image-base: &image-registry ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-geolens-io}

# ==============================================================================
# Services
# ==============================================================================
services:
  db:
    # PostGIS 17 + pgvector, built locally from ./db — a thin layer on the
    # OFFICIAL postgis/postgis image (the source maintainer) plus the pgvector
    # apt package. No single upstream image bundles both PostGIS and pgvector,
    # and we deliberately do NOT publish a custom db image, so this stays a
    # local build — the only build in a release install (~20s). The official
    # postgis image is amd64-only; arm64 hosts run it emulated (unchanged from
    # docker-compose.yml). Same db service as the dev compose.
    build:
      context: ./db
    command: postgres -c config_file=/etc/postgresql/custom.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
      - ./db/postgresql.conf:/etc/postgresql/custom.conf:ro
    # GAP-001: memory limit prevents the DB from consuming all host RAM under
    # heavy query load. 2 GB covers shared_buffers (512 MB) + work_mem headroom
    # for concurrent queries. Raise on hosts with > 8 GB RAM.
    # fix(#448): env-overridable — the fixed caps summed to 9 GB, over-committing
    # an 8 GB host (no cap sum guard exists in Docker). On 8 GB set
    # DB_MEM_LIMIT=1.5g API_MEM_LIMIT=1g WORKER_MEM_LIMIT=2g (sum ≈ 6 GB).
    mem_limit: "${DB_MEM_LIMIT:-2g}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  migrate:
    # One-shot alembic upgrade, runs from the baked api image (alembic/ +
    # alembic.ini are COPYed into /app — Dockerfile backend-base).
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-geolens-io}/geolens-api:${GEOLENS_VERSION:-latest}
    entrypoint: []
    # `upgrade heads` (plural) applies all Alembic branch heads and avoids bare
    # `head` failing when a revision graph has multiple heads. For a single-head
    # graph, `heads` is equivalent to `head`.
    command: sh -c "uv run --no-dev alembic upgrade heads"
    restart: "no"
    <<: *hardened-base
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /home/appuser:size=64m,uid=1001,gid=1001
      - /app/staging:size=8m,uid=1001,gid=1001
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env, *edition-env]
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy

  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-geolens-io}/geolens-api:${GEOLENS_VERSION:-latest}
    # GAP-003: override the baked image CMD to add --proxy-headers so uvicorn
    # populates request.client from X-Forwarded-For / X-Real-IP sent by the
    # nginx frontend. Without this flag, rate-limit buckets collapse to nginx's
    # container IP and audit logs record the proxy address instead of the real
    # client IP.
    # fix(#430 BA-01): --forwarded-allow-ips='*' is safe ONLY because nginx OVERWRITES
    # X-Forwarded-For with $remote_addr at the internet-facing edge (see
    # frontend/nginx.conf). The header is injected at that public edge, so a
    # client could otherwise forge the leftmost value uvicorn trusts.
    command: >
      sh -c "uv run --no-dev uvicorn app.api.main:app
      --host 0.0.0.0 --port 8000
      --workers $${UVICORN_WORKERS:-2}
      --timeout-keep-alive $${UVICORN_TIMEOUT_KEEP_ALIVE:-5}
      --timeout-graceful-shutdown $${UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN:-30}
      --proxy-headers --forwarded-allow-ips='*'"
    user: "0:0"
    init: true
    stop_grace_period: 30s
    restart: unless-stopped
    # GAP-001: 2 GB covers the Python process + Uvicorn workers + ORM caches.
    # Raise if ingesting very large files with many concurrent workers.
    # fix(#448): env-overridable for small hosts — see the db service note.
    mem_limit: "${API_MEM_LIMIT:-2g}"
    <<: *hardened-base
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /home/appuser:size=128m,uid=1001,gid=1001
      - /var/run:size=8m
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - upload_staging:/app/staging
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env, *storage-env, *logging-env, *ai-env, *edition-env, *notification-env, *app-runtime-env]
      PYTHONPATH: /app
      # Prod default 2 workers (dev uses 1 to keep --reload working).
      UVICORN_WORKERS: "${UVICORN_WORKERS:-2}"
      UVICORN_TIMEOUT_KEEP_ALIVE: "${UVICORN_TIMEOUT_KEEP_ALIVE:-5}"
      UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN: "${UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN:-30}"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8080}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080/api}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DCAT_CONTACT_EMAIL: ${DCAT_CONTACT_EMAIL:-}
      REDIS_URL: "${REDIS_URL:-}"
      CDN_BASE_URL: "${CDN_BASE_URL:-}"
      PRESIGNED_MULTIPART_THRESHOLD_MB: "${PRESIGNED_MULTIPART_THRESHOLD_MB:-100}"
      TILE_CACHE_TTL: "${TILE_CACHE_TTL:-300}"
      TILE_SIGNING_SECRET: "${TILE_SIGNING_SECRET:-}"
      UPLOAD_MAX_SIZE_MB: "${UPLOAD_MAX_SIZE_MB:-500}"
      # GAP-022: pinned — api/worker/titiler share the upload_staging volume at
      # the fixed /app/staging mount target; the app path must equal it. Not an
      # operator knob in compose. See docker-compose.yml + .env.example.
      UPLOAD_STAGING_DIR: "/app/staging"
      UPLOAD_ALLOWED_EXTENSIONS: "${UPLOAD_ALLOWED_EXTENSIONS:-.zip,.gpkg,.geojson,.json,.csv,.tif,.tiff,.xlsx,.xls}"
      REGISTRATION_ENABLED: "${REGISTRATION_ENABLED:-false}"
      TILE_POOL_MIN_SIZE: "${TILE_POOL_MIN_SIZE:-2}"
      TILE_POOL_MAX_SIZE: "${TILE_POOL_MAX_SIZE:-10}"
      ENV_ONLY_CONFIG: "${ENV_ONLY_CONFIG:-false}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      INGEST_HTTP_TIMEOUT_SECONDS: "${INGEST_HTTP_TIMEOUT_SECONDS:-300}"
      # fix(#434): retention for terminal ingest_jobs rows, purged by the API
      # lifespan sweeper (0 = keep history forever).
      INGEST_JOBS_RETENTION_DAYS: "${INGEST_JOBS_RETENTION_DAYS:-30}"
      PROCRASTINATE_SCHEMA: "${PROCRASTINATE_SCHEMA:-catalog}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    # The worker is the SAME image as api — identical backend-base; the published
    # geolens-worker image differs only in its baked ENTRYPOINT/CMD/HEALTHCHECK.
    # Run it from the PUBLIC geolens-api image with those three overridden (the
    # same pattern the migrate service uses). This keeps a release install pulling
    # only public images — no dependency on the geolens-worker package visibility.
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-geolens-io}/geolens-api:${GEOLENS_VERSION:-latest}
    entrypoint: ["/app/scripts/worker-entrypoint.sh"]
    command: ["sh", "-c", "uv run --no-dev python -m app.worker"]
    user: "0:0"
    init: true
    stop_grace_period: 35s
    restart: unless-stopped
    # GAP-001: 4 GB covers the worker process + GDAL/OGR buffers during large
    # file ingestion (GeoTIFF COG conversion can be RAM-intensive).
    # fix(#448): env-overridable for small hosts — see the db service note.
    mem_limit: "${WORKER_MEM_LIMIT:-4g}"
    <<: *hardened-base
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /home/appuser:size=128m,uid=1001,gid=1001
      - /var/run:size=8m
    volumes:
      - upload_staging:/app/staging
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env, *storage-env, *logging-env, *ai-env, *edition-env, *notification-env]
      PYTHONPATH: /app
      REDIS_URL: "${REDIS_URL:-}"
      # GAP-022: pinned — api/worker/titiler share the upload_staging volume at
      # the fixed /app/staging mount target; the app path must equal it. Not an
      # operator knob in compose. See docker-compose.yml + .env.example.
      UPLOAD_STAGING_DIR: "/app/staging"
      WORKER_SHUTDOWN_TIMEOUT: "${WORKER_SHUTDOWN_TIMEOUT:-30}"
      # fix(#448): parallel job slots (2-3 on multi-core hosts; keep 1 on
      # 2-vCPU boxes) and queue pinning for a dedicated raster worker.
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-1}"
      WORKER_QUEUES: "${WORKER_QUEUES:-priority,ingest,raster}"
      INGEST_HTTP_TIMEOUT_SECONDS: "${INGEST_HTTP_TIMEOUT_SECONDS:-300}"
      PROCRASTINATE_SCHEMA: "${PROCRASTINATE_SCHEMA:-catalog}"
    healthcheck:
      # The api image's baked healthcheck targets :8000 (uvicorn); the worker
      # process serves :8001/health/live, so override it here to match the
      # geolens-worker image's baked check.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  titiler:
    # Third-party image — identical to docker-compose.yml.
    image: ghcr.io/developmentseed/titiler:2.0.5
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # GAP-001: 1 GB covers GDAL_CACHEMAX (200 MB) + Python process overhead for
    # concurrent tile rendering. Raise for very large raster catalogs.
    # fix(#448): env-overridable for small hosts — see the db service note.
    mem_limit: "${TITILER_MEM_LIMIT:-1g}"
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      GDAL_CACHEMAX: "200"
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ".tif,.tiff,.cog,.vrt"
      GDAL_VRT_RAWRASTERBAND_ALLOWED_SOURCE: "NETWORK_OR_LOCAL"
      VSI_CACHE: "TRUE"
      CPL_VSIL_CURL_CACHE_SIZE: "16777216"
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"
      GDAL_HTTP_FOLLOWLOCATION: "NO"
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${S3_REGION:-us-east-1}"
      AZURE_STORAGE_CONNECTION_STRING: "${AZURE_STORAGE_CONNECTION_STRING:-}"
      AZURE_STORAGE_ACCOUNT: "${AZURE_STORAGE_ACCOUNT:-}"
      AZURE_STORAGE_ACCESS_KEY: "${AZURE_STORAGE_ACCOUNT_KEY:-}"
      TITILER_API_ROOT_PATH: ""
    volumes:
      - upload_staging:/app/staging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    # Published nginx image: serves the built SPA on :8080 and proxies /api ->
    # api:8000 and /raster-tiles/* -> the api raster proxy internally (see
    # frontend/nginx.conf). No build, no bind-mounts, no Vite.
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-geolens-io}/geolens-frontend:${GEOLENS_VERSION:-latest}
    restart: unless-stopped
    # fix(#448): previously uncapped — nginx idles ~25 MB, peaks ~50 MB; a cap
    # keeps a leak from eating a small host's headroom.
    mem_limit: "${FRONTEND_MEM_LIMIT:-128m}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    # The entrypoint materializes the immutable SPA in /tmp; nginx keeps its
    # bounded raster cache on a dedicated writable volume.
    tmpfs:
      - /tmp:size=64m,mode=1777
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:8080"
    volumes:
      - frontend_cache:/var/cache/nginx
    environment:
      # The SPA calls relative /api (nginx proxies to api:8000), so a relative
      # base works for any host the stack is reached on. Override for a CDN.
      API_BASE_URL: "${FRONTEND_API_BASE_URL:-/api}"
      # FRONTEND_TILE_BASE_URL (this var) is the tile-CDN lever and OUTRANKS the
      # backend CDN_BASE_URL setting (see resolveTileBaseUrl); CDN_BASE_URL alone
      # only flips the admin "Tile Cache" badge. Fronting the whole domain with a
      # CDN needs neither — tiles route through the edge same-origin; leave at /api.
      TILE_BASE_URL: "${FRONTEND_TILE_BASE_URL:-/api}"
      # Empty default on purpose: the api service's localhost fallback must not
      # leak into og:image; unset keeps the built relative URL.
      PUBLIC_APP_URL: "${PUBLIC_APP_URL:-}"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy

  backup:
    # Backup runs by default — no --profile flag needed (BKP-01).
    # Pulls the published multi-arch geolens-backup image from GHCR;
    # no local build required on the operator host.
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-geolens-io}/geolens-backup:${GEOLENS_VERSION:-latest}
    restart: unless-stopped
    init: true
    # fix(#448): previously uncapped — the nightly pg_dump+tar peaks ~300 MB;
    # 512m default leaves headroom while bounding it on small hosts.
    mem_limit: "${BACKUP_MEM_LIMIT:-512m}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # The postgres base declares PGDATA as a VOLUME. Override it with ephemeral
    # tmpfs because this image only runs pg_dump; otherwise Docker creates an
    # unused anonymous volume for every backup container.
    tmpfs:
      - /var/lib/postgresql/data:size=1m,mode=0700
    volumes:
      # No ./scripts bind-mount in prod: the published geolens-backup image bakes
      # /scripts/backup-entrypoint.sh + restore.sh (BKP-01), so the prebuilt-prod
      # path boots without a repo checkout. A stale/absent ./scripts host dir would
      # otherwise mask the baked entrypoint and the container would exit. (The dev
      # compose mounts ./scripts for live script iteration on its locally-built image.)
      - backup_data:/backups
      # BKP-01 (Phase 1219): include object storage in backup scope. The backup
      # service tars the upload_staging volume alongside the pg_dump so a restore
      # yields a WORKING instance (DB rows + the staged source objects they
      # reference), not just an empty-object catalog. Mounted read-only — the
      # backup job never mutates app data. CAVEAT: this captures the local
      # upload_staging volume only; deployments that offload objects to external
      # S3/MinIO must back those buckets up separately (their own lifecycle).
      - upload_staging:/staging:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      POSTGRES_HOST: db
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_S3_ENABLED: ${BACKUP_S3_ENABLED:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ALLOW_HTTP: ${S3_ALLOW_HTTP:-false}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-auto}
    entrypoint: ["/scripts/backup-entrypoint.sh"]
    healthcheck:
      # The entrypoint runs the built-in sleep-loop scheduler (postgres:17 has no
      # cron); the probe just verifies that process is alive.
      test: ["CMD-SHELL", "pgrep -f backup-entrypoint || pgrep -f sleep || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      # Probe every 5s during start-up so the service reports healthy quickly — it
      # starts last (gated on migrate) and must clear the installer's
      # wait-for-healthy budget on a fresh install.
      start_interval: 5s
    depends_on:
      db:
        condition: service_healthy
      # Gate the first (on-startup) pg_dump behind migrations so a fresh install
      # never captures a pre-migration / empty DB as its first retained backup.
      migrate:
        condition: service_completed_successfully

  # --- cloud-dev profile: local S3 + cache (identical to docker-compose.yml) ---
  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    profiles: ["cloud-dev"]
    # INST-01 + Codex P1 (true fail-closed, parse-safe) — mirrors the
    # docker-compose.yml minio guard. `${VAR:?}` would abort `compose config`/`up`
    # at PARSE time even when cloud-dev is inactive (breaks a verbatim-.env.example
    # install). And `${VAR:-}` alone is NOT fail-closed: MinIO treats an EMPTY
    # MINIO_ROOT_USER as unset and silently boots with the well-known default
    # minioadmin:minioadmin. So keep parse-safe empty refs in environment: AND
    # enforce non-empty creds at RUNTIME via the entrypoint (the cloud-dev S3 store
    # refuses to start on default/blank creds — fail-closed only when it starts,
    # i.e. when the profile is active).
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$MINIO_ROOT_USER" ] || [ -z "$$MINIO_ROOT_PASSWORD" ]; then
          echo "FATAL: cloud-dev MinIO requires MINIO_ROOT_USER and MINIO_ROOT_PASSWORD in .env — refusing to start with default/blank credentials." >&2
          exit 1
        fi
        exec minio server /data --console-address ":9001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      # Parse-safe empty default (:-); the entrypoint above enforces non-empty at
      # runtime. MUST be listed here so compose passes the host value into the
      # container (the runtime guard checks these).
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  minio-setup:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    profiles: ["cloud-dev"]
    # BUG-015 (Phase 1184): same fix as docker-compose.yml — mounted script
    # replaces the broken YAML folded-scalar heredoc.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      minio:
        condition: service_healthy
    environment:
      # INST-01 (Phase 1218): see minio service above — empty-default keeps a
      # verbatim-.env.example install parseable; runtime rejects empty creds.
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-}"
    volumes:
      - ./scripts/minio-setup.sh:/usr/local/bin/minio-setup.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/minio-setup.sh"]

  valkey:
    image: valkey/valkey:8.1.7-alpine
    profiles: ["cloud-dev"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pgdata:
  upload_staging:
  backup_data:
  frontend_cache:
  minio_data:
  valkey_data:
