services:
  db:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      POSTGRES_USER: ${POSTGRES_USER:-geolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/10-init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geolens} -d ${POSTGRES_DB:-geolens}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  migrate:
    image: ghcr.io/geolens-io/geolens-api:${GEOLENS_VERSION:-latest}
    command: sh -c "uv run alembic upgrade head"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      PYTHONPATH: /app
      DATABASE_URL_OVERRIDE: "${DATABASE_URL_OVERRIDE:-}"
      DATABASE_SSL_MODE: "${DATABASE_SSL_MODE:-}"
      DATABASE_SSL_CA_CERT: "${DATABASE_SSL_CA_CERT:-}"
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/geolens-io/geolens-api:${GEOLENS_VERSION:-latest}
    restart: unless-stopped
    entrypoint: ["/app/scripts/api-entrypoint.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GEOLENS_ADMIN_USERNAME: ${GEOLENS_ADMIN_USERNAME:-admin}
      GEOLENS_ADMIN_PASSWORD: ${GEOLENS_ADMIN_PASSWORD}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8080}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080/api}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      LOG_JSON: "${LOG_JSON:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-claude-sonnet-4-20250514}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      REDIS_URL: "${REDIS_URL:-}"
      STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ALLOW_HTTP: "${S3_ALLOW_HTTP:-false}"
      S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-auto}"
      CDN_BASE_URL: "${CDN_BASE_URL:-}"
      DATABASE_URL_OVERRIDE: "${DATABASE_URL_OVERRIDE:-}"
      DATABASE_SSL_MODE: "${DATABASE_SSL_MODE:-}"
      DATABASE_SSL_CA_CERT: "${DATABASE_SSL_CA_CERT:-}"
      DATABASE_POOL_PRE_PING: "${DATABASE_POOL_PRE_PING:-true}"
      DB_USE_EXTERNAL_POOLER: "${DB_USE_EXTERNAL_POOLER:-false}"
      PRESIGNED_MULTIPART_THRESHOLD_MB: "${PRESIGNED_MULTIPART_THRESHOLD_MB:-100}"
      # CORS: comma-separated allowed origins for cross-origin API access (empty = same-origin only)
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:8080}"
    volumes:
      - upload_staging:/app/staging
    command: >
      sh -c "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ghcr.io/geolens-io/geolens-api:${GEOLENS_VERSION:-latest}
    restart: unless-stopped
    entrypoint: ["/app/scripts/worker-entrypoint.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GEOLENS_ADMIN_USERNAME: ${GEOLENS_ADMIN_USERNAME:-admin}
      GEOLENS_ADMIN_PASSWORD: ${GEOLENS_ADMIN_PASSWORD}
      LOG_JSON: "${LOG_JSON:-true}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      REDIS_URL: "${REDIS_URL:-}"
      STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
      S3_ENDPOINT: "${S3_ENDPOINT:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ALLOW_HTTP: "${S3_ALLOW_HTTP:-false}"
      S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-auto}"
      DATABASE_URL_OVERRIDE: "${DATABASE_URL_OVERRIDE:-}"
      DATABASE_SSL_MODE: "${DATABASE_SSL_MODE:-}"
      DATABASE_SSL_CA_CERT: "${DATABASE_SSL_CA_CERT:-}"
      DATABASE_POOL_PRE_PING: "${DATABASE_POOL_PRE_PING:-true}"
      DB_USE_EXTERNAL_POOLER: "${DB_USE_EXTERNAL_POOLER:-false}"
      WORKER_SHUTDOWN_TIMEOUT: "${WORKER_SHUTDOWN_TIMEOUT:-30}"
    volumes:
      - upload_staging:/app/staging
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  titiler:
    image: ghcr.io/developmentseed/titiler:${TITILER_VERSION:-latest}
    restart: unless-stopped
    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      GDAL_CACHEMAX: "200"
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ".tif,.tiff,.cog,.vrt"
      GDAL_VRT_RAWRASTERBAND_ALLOWED_SOURCE: "NETWORK_OR_LOCAL"
      VSI_CACHE: "TRUE"
      CPL_VSIL_CURL_CACHE_SIZE: "16777216"
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${S3_REGION:-us-east-1}"
      TITILER_API_ROOT_PATH: ""
    volumes:
      - upload_staging:/app/staging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    # No ports: section — internal only, reachable at http://titiler:8000
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/geolens-io/geolens-frontend:${GEOLENS_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    image: postgis/postgis:17-3.5
    restart: unless-stopped
    volumes:
      - ./scripts:/scripts:ro
      - backup_data:/backups
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      POSTGRES_HOST: db
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_S3_ENABLED: ${BACKUP_S3_ENABLED:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ALLOW_HTTP: ${S3_ALLOW_HTTP:-false}
    entrypoint: ["/scripts/backup-entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  upload_staging:
  backup_data:
