apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "geolens.fullname" . }}
  labels:
    {{- include "geolens.labels" . | nindent 4 }}
data:
  # Database
  POSTGRES_HOST: {{ .Values.database.host | quote }}
  POSTGRES_PORT: {{ .Values.database.port | quote }}
  POSTGRES_DB: {{ .Values.database.name | quote }}
  POSTGRES_USER: {{ .Values.database.user | quote }}
  {{- if .Values.database.urlOverride }}
  DATABASE_URL_OVERRIDE: {{ .Values.database.urlOverride | quote }}
  {{- end }}
  {{- if .Values.database.sslMode }}
  DATABASE_SSL_MODE: {{ .Values.database.sslMode | quote }}
  {{- end }}
  {{- if .Values.database.sslCaCert }}
  DATABASE_SSL_CA_CERT: {{ .Values.database.sslCaCert | quote }}
  {{- end }}
  DATABASE_POOL_PRE_PING: {{ .Values.database.poolPrePing | quote }}
  DB_USE_EXTERNAL_POOLER: {{ .Values.database.useExternalPooler | quote }}

  # Logging
  LOG_LEVEL: {{ .Values.api.logLevel | quote }}
  LOG_JSON: {{ .Values.api.logJson | quote }}

  # Storage
  STORAGE_PROVIDER: {{ .Values.storage.provider | quote }}
  {{- if .Values.storage.s3.endpoint }}
  S3_ENDPOINT: {{ .Values.storage.s3.endpoint | quote }}
  {{- end }}
  {{- if .Values.storage.s3.bucket }}
  S3_BUCKET: {{ .Values.storage.s3.bucket | quote }}
  {{- end }}
  S3_REGION: {{ .Values.storage.s3.region | quote }}
  S3_ALLOW_HTTP: {{ .Values.storage.s3.allowHttp | quote }}
  S3_ADDRESSING_STYLE: {{ .Values.storage.s3.addressingStyle | quote }}
  {{- if .Values.storage.cdnBaseUrl }}
  CDN_BASE_URL: {{ .Values.storage.cdnBaseUrl | quote }}
  {{- end }}
  PRESIGNED_MULTIPART_THRESHOLD_MB: {{ .Values.storage.presignedMultipartThresholdMb | quote }}

  # AI / LLM
  LLM_MODEL: {{ .Values.ai.llmModel | quote }}
  OPENAI_MODEL: {{ .Values.ai.openaiModel | quote }}
  {{- if .Values.ai.openaiBaseUrl }}
  OPENAI_BASE_URL: {{ .Values.ai.openaiBaseUrl | quote }}
  {{- end }}

  # Redis
  {{- if .Values.redis.url }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  {{- end }}

  # Worker
  WORKER_SHUTDOWN_TIMEOUT: {{ .Values.worker.shutdownTimeout | quote }}

  # Derived URLs
  {{- $publicAppUrl := include "geolens.publicAppUrl" . }}
  {{- if $publicAppUrl }}
  PUBLIC_APP_URL: {{ $publicAppUrl | quote }}
  {{- end }}
  {{- $publicApiUrl := include "geolens.publicApiUrl" . }}
  {{- if $publicApiUrl }}
  PUBLIC_API_URL: {{ $publicApiUrl | quote }}
  {{- end }}
  {{- $corsOrigins := include "geolens.corsOrigins" . }}
  {{- if $corsOrigins }}
  CORS_ALLOWED_ORIGINS: {{ $corsOrigins | quote }}
  {{- end }}

  # Python path (required for alembic migrations)
  PYTHONPATH: "/app"

  # AWS Marketplace
  {{- if .Values.marketplace.productCode }}
  AWS_MARKETPLACE_PRODUCT_CODE: {{ .Values.marketplace.productCode | quote }}
  AWS_MARKETPLACE_PUBLIC_KEY_VERSION: {{ .Values.marketplace.publicKeyVersion | quote }}
  {{- end }}
