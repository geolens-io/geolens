apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "geolens.fullname" . }}-worker
  labels:
    {{- include "geolens.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "geolens.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "geolens.worker.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
            runAsNonRoot: true
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "geolens.fullname" . }}
            - secretRef:
                name: {{ include "geolens.fullname" . }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: staging
              mountPath: /app/staging
      volumes:
        - name: staging
          emptyDir: {}
