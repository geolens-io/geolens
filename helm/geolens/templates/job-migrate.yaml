apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "geolens.fullname" . }}-migrate
  labels:
    {{- include "geolens.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "geolens.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 1001
        runAsNonRoot: true
      containers:
        - name: migrate
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "uv run alembic upgrade head"]
          envFrom:
            - configMapRef:
                name: {{ include "geolens.fullname" . }}
            - secretRef:
                name: {{ include "geolens.fullname" . }}
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
