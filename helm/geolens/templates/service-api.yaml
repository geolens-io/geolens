apiVersion: v1
kind: Service
metadata:
  name: {{ include "geolens.fullname" . }}-api
  labels:
    {{- include "geolens.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "geolens.api.selectorLabels" . | nindent 4 }}
