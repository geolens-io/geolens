apiVersion: v1
kind: Secret
metadata:
  name: {{ include "geolens.fullname" . }}
  labels:
    {{- include "geolens.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.database.password | quote }}
  JWT_SECRET_KEY: {{ .Values.auth.jwtSecretKey | quote }}
  GEOLENS_ADMIN_USERNAME: {{ .Values.auth.adminUsername | quote }}
  GEOLENS_ADMIN_PASSWORD: {{ .Values.auth.adminPassword | quote }}
  {{- if .Values.ai.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.ai.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.ai.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.ai.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.storage.s3.accessKeyId }}
  S3_ACCESS_KEY_ID: {{ .Values.storage.s3.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.storage.s3.secretAccessKey }}
  S3_SECRET_ACCESS_KEY: {{ .Values.storage.s3.secretAccessKey | quote }}
  {{- end }}
