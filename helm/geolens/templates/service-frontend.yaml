apiVersion: v1
kind: Service
metadata:
  name: {{ include "geolens.fullname" . }}-frontend
  labels:
    {{- include "geolens.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "geolens.frontend.selectorLabels" . | nindent 4 }}
