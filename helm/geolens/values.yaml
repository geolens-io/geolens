# GeoLens Helm Chart Values
# All env vars from docker-compose.prod.yml mapped to structured fields.

# -- Override chart name
nameOverride: ""
# -- Override fully qualified release name
fullnameOverride: ""

# ------------------------------------------------------------------
# API server
# ------------------------------------------------------------------
api:
  replicas: 1
  image:
    repository: ghcr.io/geolens-io/geolens-api
    tag: ""  # defaults to Chart.AppVersion
  logLevel: INFO
  logJson: "true"
  # PYTHONPATH is always /app (not configurable)
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: false
    minAvailable: 1
  serviceMonitor:
    enabled: false
    interval: "30s"
    additionalLabels: {}

# ------------------------------------------------------------------
# Background worker (uses same image as API)
# ------------------------------------------------------------------
worker:
  replicas: 1
  image:
    repository: ghcr.io/geolens-io/geolens-api
    tag: ""
  shutdownTimeout: "30"
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  pdb:
    enabled: false
    minAvailable: 1
  serviceMonitor:
    enabled: false
    interval: "30s"
    additionalLabels: {}

# ------------------------------------------------------------------
# Frontend (nginx-unprivileged)
# ------------------------------------------------------------------
frontend:
  replicas: 1
  image:
    repository: ghcr.io/geolens-io/geolens-frontend
    tag: ""
  # External URLs injected into env-config.js by docker-entrypoint.sh
  apiBaseUrl: ""     # e.g. https://geolens.example.com/api
  tileBaseUrl: ""
  resources:
    requests:
      cpu: "125m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

# ------------------------------------------------------------------
# Database (external managed DB -- no StatefulSet)
# ------------------------------------------------------------------
database:
  host: ""           # required: external DB host
  port: "5432"
  name: geolens
  user: geolens
  password: ""       # required
  urlOverride: ""    # optional: full DATABASE_URL_OVERRIDE
  sslMode: ""        # optional: DATABASE_SSL_MODE
  sslCaCert: ""      # optional: DATABASE_SSL_CA_CERT
  poolPrePing: "true"
  useExternalPooler: "false"

# ------------------------------------------------------------------
# Authentication
# ------------------------------------------------------------------
auth:
  jwtSecretKey: ""       # required
  adminUsername: admin
  adminPassword: ""      # required

# ------------------------------------------------------------------
# Object storage
# ------------------------------------------------------------------
storage:
  provider: local        # "local" or "s3"
  s3:
    endpoint: ""
    bucket: ""
    accessKeyId: ""
    secretAccessKey: ""
    region: us-east-1
    allowHttp: "false"
    addressingStyle: "auto"
  cdnBaseUrl: ""
  presignedMultipartThresholdMb: "100"

# ------------------------------------------------------------------
# AI / LLM
# ------------------------------------------------------------------
ai:
  anthropicApiKey: ""
  llmModel: "claude-sonnet-4-20250514"
  openaiApiKey: ""
  openaiModel: gpt-4o
  openaiBaseUrl: ""

# ------------------------------------------------------------------
# Redis / Valkey (optional -- bring your own)
# ------------------------------------------------------------------
redis:
  url: ""

# ------------------------------------------------------------------
# CORS
# ------------------------------------------------------------------
cors:
  allowedOrigins: ""     # auto-derived from ingress.host if empty

# ------------------------------------------------------------------
# Public URLs (auto-derived from ingress.host if empty)
# ------------------------------------------------------------------
publicAppUrl: ""
publicApiUrl: ""

# ------------------------------------------------------------------
# AWS Marketplace (optional -- only for marketplace AMI deployments)
# ------------------------------------------------------------------
marketplace:
  productCode: ""              # AWS Marketplace product code
  publicKeyVersion: 1          # RegisterUsage public key version

# ------------------------------------------------------------------
# Ingress
# ------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  host: geolens.example.com
  annotations: {}
  tls: []
  #  - secretName: geolens-tls
  #    hosts:
  #      - geolens.example.com
