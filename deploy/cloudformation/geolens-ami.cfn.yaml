AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GeoLens - PostGIS-native GIS Data Catalog.
  Launches a single EC2 instance with the GeoLens AMI.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Instance Configuration
        Parameters:
          - InstanceType
          - KeyName
          - AmiId
      - Label:
          default: Network Configuration
        Parameters:
          - VpcId
          - SubnetId
          - SSHCidr
    ParameterLabels:
      InstanceType:
        default: EC2 Instance Type
      KeyName:
        default: SSH Key Pair Name
      AmiId:
        default: GeoLens AMI ID
      VpcId:
        default: VPC ID
      SubnetId:
        default: Public Subnet ID
      SSHCidr:
        default: SSH Allowed CIDR

Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - m6i.large
      - m6i.xlarge
      - r6i.large
    Description: >
      t3.medium (4GB) for evaluation, t3.large+ (8GB+) for production.

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access.

  AmiId:
    Type: AWS::EC2::Image::Id
    Description: >
      GeoLens AMI ID (e.g., ami-0123456789abcdef0).
      Find this in the AWS Marketplace or your Packer build output.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch the instance in.

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet with internet access (for GHCR image pull on first boot).

  SSHCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'
    Description: >
      CIDR block allowed to SSH. Use your IP (e.g., 203.0.113.1/32) for security.

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: GeoLens - HTTP, HTTPS, SSH
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHCidr
          Description: SSH
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS
      Tags:
        - Key: Name
          Value: geolens-sg

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GeolensMarketplaceMetering
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aws-marketplace:RegisterUsage
                Resource: '*'
      Tags:
        - Key: Name
          Value: geolens-instance-role

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      ImageId: !Ref AmiId
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 40
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: GeoLens

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref Instance

  PublicIP:
    Description: Public IP address
    Value: !GetAtt Instance.PublicIp

  ApplicationURL:
    Description: GeoLens application URL
    Value: !Sub 'http://${Instance.PublicIp}'

  SSHCommand:
    Description: SSH connection command
    Value: !Sub 'ssh -i ~/.ssh/${KeyName}.pem ubuntu@${Instance.PublicIp}'

  CredentialsCommand:
    Description: Command to view admin credentials (run after SSH)
    Value: 'sudo cat /var/log/geolens-init.log'
