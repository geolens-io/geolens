proxy_cache_path /var/cache/nginx/auth_cache levels=1:2 keys_zone=auth_cache:1m max_size=10m inactive=60s use_temp_path=off;
proxy_cache_path /var/cache/nginx/raster_cache levels=1:2 keys_zone=raster_cache:10m max_size=1g inactive=1h use_temp_path=off;

limit_req_zone $binary_remote_addr zone=raster_anon:10m rate=30r/m;

map $cache_status $no_tile_cache {
    "private" 1;
    default   0;
}

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    location = /env-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /_raster_auth {
        internal;
        resolver 127.0.0.11 valid=10s;
        set $upstream_api http://api:8000;
        proxy_pass $upstream_api/tiles/raster-auth-check/?dataset_id=$arg_dataset_id;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Embed-Token $http_x_embed_token;
        proxy_cache auth_cache;
        proxy_cache_key "$http_authorization$http_x_embed_token$arg_dataset_id";
        proxy_cache_valid 200 30s;
        proxy_cache_valid 401 403 5s;
        proxy_cache_methods GET HEAD;
        proxy_ignore_headers Cache-Control;
    }

    location ~ ^/raster-tiles/(?<dataset_id>[0-9a-f-]+)/tiles/(?<z>\d+)/(?<x>\d+)/(?<y>\d+)\.(?<fmt>[a-z]+)$ {
        limit_req zone=raster_anon burst=10 nodelay;

        auth_request /_raster_auth?dataset_id=$dataset_id;
        auth_request_set $asset_open_path $upstream_http_x_geolens_asset_openpath;
        auth_request_set $cache_status $upstream_http_x_geolens_cache_status;
        auth_request_set $render_params $upstream_http_x_geolens_render_params;

        resolver 127.0.0.11 valid=10s;
        set $titiler http://titiler:8000;
        proxy_pass $titiler/cog/tiles/WebMercatorQuad/$z/$x/$y.$fmt?url=$asset_open_path&$render_params;
        proxy_set_header Host $host;

        proxy_intercept_errors on;
        error_page 404 = @empty_tile;

        proxy_cache raster_cache;
        proxy_cache_key "$dataset_id/$z/$x/$y.$fmt$cache_status";
        proxy_cache_valid 200 1h;
        proxy_no_cache $no_tile_cache;
        proxy_cache_bypass $no_tile_cache;

        set $cc_header "public, max-age=3600";
        if ($cache_status = "private") {
            set $cc_header "private, no-store";
        }
        add_header Cache-Control $cc_header always;
        add_header X-Cache-Status $upstream_cache_status;
    }

    location @empty_tile {
        return 204;
    }

    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_api http://api:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $upstream_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 500m;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
