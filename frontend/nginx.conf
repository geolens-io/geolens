proxy_cache_path /var/cache/nginx/raster_cache levels=1:2 keys_zone=raster_cache:10m max_size=1g inactive=1h use_temp_path=off;

# Bumped from 30r/m -> 600r/m: a single Mapbox/MapLibre map view loads
# ~12 tiles, so 30r/m hit the burst limit immediately for any real use.
# Tilted multi-layer 3D raster views can cold-start with 50-100+ tile
# requests across DEM + hillshade sources, so keep the burst budget above
# that initial fan-out while the steady-state rate still limits sustained abuse.
limit_req_zone $binary_remote_addr zone=raster_anon:10m rate=600r/m;

# SEC-006: the ?api_key=<secret> query-param credential is a documented auth
# fallback (resolution order: X-Api-Key header > query > JWT > anon). nginx logs
# the full request line ($request) by default, so these long-lived, non-expiring
# keys would be persisted in cleartext in the access log and any downstream log
# aggregation. Redact the api_key value from the logged request line. The app
# layer already logs only request.url.path (uvicorn.access is silenced), but
# nginx fronts /api/, so the scrub must also happen at the edge.
map $request $geolens_scrubbed_request {
    default $request;
    "~^(?<pre>.*[?&])api_key=[^&\s]*(?<post>.*)$" "${pre}api_key=REDACTED${post}";
}
log_format geolens_scrubbed '$remote_addr - $remote_user [$time_local] '
                            '"$geolens_scrubbed_request" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent"';

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # SEC-006: emit the api_key-scrubbed access log for every location in this
    # server (see the map/log_format above). Set at server scope so /api/ and
    # all other locations inherit it.
    access_log /var/log/nginx/access.log geolens_scrubbed;

    # MIME type handling — defense-in-depth (base image http{} also configures this).
    # `default_type application/octet-stream` makes browsers download unknown files
    # rather than render them as text/plain (mitigates content-sniffing surprises).
    # `include /etc/nginx/mime.types` registers .css → text/css, .js → application/javascript, etc.
    # The types {} block adds modern types not in the default mime.types.
    default_type application/octet-stream;
    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
        application/manifest+json webmanifest;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # SEC-FU-09 (sec-audit-20260519.md): suppress nginx version disclosure in
    # Server: response header and default error pages. Prevents remote scanners
    # from fingerprinting the exact nginx minor version for exploit targeting.
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/geo+json
        image/svg+xml;

    location = /env-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/raster-tiles/(?<dataset_id>[0-9a-f-]+)/tiles/(?<z>\d+)/(?<x>\d+)/(?<y>\d+)\.(?<fmt>[a-z]+)$ {
        limit_req zone=raster_anon burst=200 nodelay;

        # Forward to the api-side raster proxy (`/tiles/raster-proxy/...`).
        # The api enforces RBAC, resolves the COG open-path, and proxies to
        # Titiler with the correct render params. Equivalent semantics to
        # the previous nginx auth_request + direct-titiler proxy, without
        # the variable-interpolation pitfalls of `proxy_pass $upstream/path?query`
        # inside a regex location (nginx 1.29 silently drops the query
        # string in that case, so Titiler saw `?url=&` and 500'd).
        resolver 127.0.0.11 valid=10s;
        set $upstream_api http://api:8000;
        rewrite ^.*$ /tiles/raster-proxy/$dataset_id/$z/$x/$y.$fmt$is_args$args break;
        proxy_pass $upstream_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through auth headers so the api can apply RBAC.
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Embed-Token $http_x_embed_token;

        proxy_intercept_errors on;
        error_page 404 = @empty_tile;

        # Tile cache — keyed on dataset/zxy. The api enforces auth on cache
        # MISS, so cache HITS for the same tile across users are safe for
        # public datasets. Private datasets get distinct cache keys via the
        # api setting Cache-Control on its response (`no-store` for private).
        proxy_cache raster_cache;
        # Cache key must vary by EVERY render param the api forwards to Titiler,
        # else tiles with different bounds collide (#317 Codex P2): include
        # pmin/pmax/sigma alongside colormap_name/stretch.
        proxy_cache_key "$dataset_id/$z/$x/$y.$fmt/$arg_colormap_name/$arg_stretch/$arg_pmin/$arg_pmax/$arg_sigma";
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating;
        # Honor the api's Cache-Control: nginx skips caching when the api
        # sets `no-store` (private dataset).
        proxy_ignore_headers Set-Cookie;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    location @empty_tile {
        return 204;
    }

    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_api http://api:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $upstream_api;
        # A3 (#315 follow-up): the FastAPI SecurityHeadersMiddleware already emits
        # X-Frame-Options: DENY. This block has no add_header, so it inherits the
        # server-scope `add_header X-Frame-Options SAMEORIGIN`, which nginx APPENDS
        # to the proxied DENY -> two conflicting X-Frame-Options on every /api
        # response. Strip the upstream header so exactly one (the inherited
        # SAMEORIGIN) survives. The backend still emits DENY for direct,
        # non-proxied access (defense-in-depth when nginx isn't in front).
        proxy_hide_header X-Frame-Options;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 500m;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # SEC-S08 (Phase 1062-05): per-token embed framing relies on the FastAPI
    # /api/maps/shared/{token} response emitting frame-ancestors CSP derived
    # from EmbedToken.allowed_origins. The SPA HTML at /m/{token} must NOT
    # inherit the global X-Frame-Options: SAMEORIGIN from the server scope,
    # because that header blocks the iframe-embed path before the API response
    # has a chance to communicate the per-token allowed_origins.
    #
    # Nginx semantics: any add_header in an inner location block DISABLES
    # inheritance of all add_header directives from the server scope. This
    # block re-declares the global headers we want to keep (X-Content-Type-Options,
    # Referrer-Policy) while intentionally omitting X-Frame-Options so the
    # browser does not preemptively reject the frame. X-Frame-Options is
    # intentionally absent — the FastAPI /api/maps/shared/{token} response
    # carries the frame-ancestors CSP instead (Phase 1062-05).
    #
    # This regex location wins over the prefix `location /` because nginx
    # regex locations beat prefix locations unless the prefix uses `^~`.
    # The `location /` below uses no `^~`, so this `~ ^/m/` match wins
    # for /m/ and /m/<any-suffix> paths.
    #
    # WR-05: changed from `~ ^/m/.+` to `~ ^/m/` so the bare /m/ path
    # (no token after the slash) also matches this block and inherits the
    # missing X-Frame-Options intent. No real share token is the empty string,
    # so this is an edge-case fix — it removes the inconsistency where /m/
    # fell through to `location /` and picked up X-Frame-Options: SAMEORIGIN
    # from the server scope while /m/<token> had no XFO header at all.
    #
    # Note: the server-scope `X-Frame-Options: SAMEORIGIN` on `location /`
    # is intentional — the SPA HTML at non-/m/ paths is not designed to be
    # framed, so SAMEORIGIN is the right policy there. Only /m/* paths are
    # expected to be embedded in cross-origin iframes (via the per-token
    # frame-ancestors CSP from the API response).
    # builder-audit P0-02: enforce per-token frame-ancestors on the embed HTML
    # shell itself. Domain restrictions used to protect only the tile/data calls,
    # not the embeddable document — so a disallowed site could still frame the
    # shell. An internal auth_request validates the token (last path segment) and
    # returns the frame-ancestors directive in X-Embed-Frame-Ancestors;
    # auth_request_set copies it into the CSP emitted on this static HTML
    # response. X-Frame-Options stays omitted ONLY here (see SEC-S08 above).
    location ~ ^/m/ {
        # Codex P1 (#338): the auth_request subrequest does NOT carry the parent's
        # query string, so $arg_et is empty inside /_embed_frame_policy. Capture
        # the real embed token (the `et` query param) into a `set` variable here —
        # subrequests share the parent request's `set` variables — and forward
        # THAT to the policy endpoint, so a domain-locked embed keeps its
        # restriction instead of being treated as an unrestricted/no-token case.
        set $embed_et $arg_et;
        auth_request /_embed_frame_policy;
        auth_request_set $embed_frame_ancestors $upstream_http_x_embed_frame_ancestors;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # X-Frame-Options intentionally omitted — see SEC-S08 comment above.
        # The per-token $embed_frame_ancestors below is the clickjacking policy:
        #   - domain-locked token  -> "frame-ancestors 'self' <origins>"
        #   - invalid/revoked token -> "frame-ancestors 'none'" (fail closed)
        #   - unrestricted Community token -> empty, leaving framing open
        #     (intentional; the trailing empty CSP directive is ignored by
        #     browsers per CSP3 and never emits frame-ancestors '*').
        # SEC-020: same script/exfil backstop as `location /`.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'self'; ${embed_frame_ancestors}" always;
        try_files $uri /index.html;
    }

    # builder-audit P0-02: internal subrequest target for the /m/ framing policy.
    # Validates the embed token captured by the `location ~ ^/m/` regex above and
    # returns X-Embed-Frame-Ancestors. The API endpoint always answers 200 (even
    # for an invalid token, which yields a fail-closed 'none' policy) so the
    # auth_request allows the shell to load.
    location = /_embed_frame_policy {
        internal;
        resolver 127.0.0.11 valid=10s;
        set $upstream_api http://api:8000;
        # Codex P1 (#338): the embed token lives in the `et` QUERY param of the
        # iframe URL (/m/<shareToken>?embed=true&et=<embedToken>), NOT the path
        # segment. Passing the path capture (the share token) made the policy
        # endpoint hash a non-embed token, fail to match, and emit 'none' for
        # every normal share. Pass $arg_et so plain shares (no et) send an empty
        # token -> open framing, and restricted embeds send their real token.
        proxy_pass $upstream_api/embed/frame-policy?token=$embed_et;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # SEC-020: Content-Security-Policy on the SPA HTML — defense-in-depth so a
        # future XSS cannot load injected/inline scripts to exfiltrate the JWT
        # from localStorage. script-src 'self' (+ wasm-unsafe-eval for WebAssembly)
        # blocks script injection; style-src 'unsafe-inline' is required by
        # React/MapLibre/Tailwind inline styles; img/connect/font/worker stay
        # permissive so map tiles, glyphs, workers and external sources still load.
        # Any add_header here disables inheritance, so the server-scope security
        # headers are re-declared.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
        try_files $uri $uri/ /index.html;
    }
}
