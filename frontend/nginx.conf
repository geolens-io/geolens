proxy_cache_path /var/cache/nginx/raster_cache levels=1:2 keys_zone=raster_cache:10m max_size=1g inactive=1h use_temp_path=off;

# Bumped from 30r/m -> 600r/m: a single Mapbox/MapLibre map view loads
# ~12 tiles, so 30r/m hit the burst limit immediately for any real use.
# Tilted multi-layer 3D raster views can cold-start with 50-100+ tile
# requests across DEM + hillshade sources, so keep the burst budget above
# that initial fan-out while the steady-state rate still limits sustained abuse.
limit_req_zone $binary_remote_addr zone=raster_anon:10m rate=600r/m;

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # MIME type handling — defense-in-depth (base image http{} also configures this).
    # `default_type application/octet-stream` makes browsers download unknown files
    # rather than render them as text/plain (mitigates content-sniffing surprises).
    # `include /etc/nginx/mime.types` registers .css → text/css, .js → application/javascript, etc.
    # The types {} block adds modern types not in the default mime.types.
    default_type application/octet-stream;
    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
        application/manifest+json webmanifest;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/geo+json
        image/svg+xml;

    location = /env-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/raster-tiles/(?<dataset_id>[0-9a-f-]+)/tiles/(?<z>\d+)/(?<x>\d+)/(?<y>\d+)\.(?<fmt>[a-z]+)$ {
        limit_req zone=raster_anon burst=200 nodelay;

        # Forward to the api-side raster proxy (`/tiles/raster-proxy/...`).
        # The api enforces RBAC, resolves the COG open-path, and proxies to
        # Titiler with the correct render params. Equivalent semantics to
        # the previous nginx auth_request + direct-titiler proxy, without
        # the variable-interpolation pitfalls of `proxy_pass $upstream/path?query`
        # inside a regex location (nginx 1.29 silently drops the query
        # string in that case, so Titiler saw `?url=&` and 500'd).
        resolver 127.0.0.11 valid=10s;
        set $upstream_api http://api:8000;
        rewrite ^.*$ /tiles/raster-proxy/$dataset_id/$z/$x/$y.$fmt break;
        proxy_pass $upstream_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through auth headers so the api can apply RBAC.
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Embed-Token $http_x_embed_token;

        proxy_intercept_errors on;
        error_page 404 = @empty_tile;

        # Tile cache — keyed on dataset/zxy. The api enforces auth on cache
        # MISS, so cache HITS for the same tile across users are safe for
        # public datasets. Private datasets get distinct cache keys via the
        # api setting Cache-Control on its response (`no-store` for private).
        proxy_cache raster_cache;
        proxy_cache_key "$dataset_id/$z/$x/$y.$fmt";
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating;
        # Honor the api's Cache-Control: nginx skips caching when the api
        # sets `no-store` (private dataset).
        proxy_ignore_headers Set-Cookie;

        add_header X-Cache-Status $upstream_cache_status always;
    }

    location @empty_tile {
        return 204;
    }

    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $upstream_api http://api:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $upstream_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_cache off;
        client_max_body_size 500m;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
