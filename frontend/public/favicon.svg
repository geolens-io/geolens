<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="g">
      <circle cx="26" cy="26" r="18"/>
    </clipPath>
  </defs>

  <!-- Lens ring -->
  <circle cx="26" cy="26" r="18" fill="none" stroke="#334155" stroke-width="3.2"/>

  <!-- Graticule (clipped to lens) -->
  <g clip-path="url(#g)" stroke="#334155" fill="none" stroke-width="1.6" opacity="0.5">
    <line x1="8" y1="26" x2="44" y2="26"/>
    <line x1="26" y1="8" x2="26" y2="44"/>
    <ellipse cx="26" cy="26" rx="9" ry="18"/>
    <ellipse cx="26" cy="26" rx="18" ry="9"/>
  </g>

  <!-- Crosshair ticks -->
  <g stroke="#334155" stroke-width="2.8">
    <line x1="26" y1="3" x2="26" y2="6"/>
    <line x1="26" y1="46" x2="26" y2="49"/>
    <line x1="3" y1="26" x2="6" y2="26"/>
    <line x1="46" y1="26" x2="49" y2="26"/>
  </g>

  <!-- Center dot -->
  <circle cx="26" cy="26" r="2" fill="#334155"/>

  <!-- Magnifier handle -->
  <line x1="39" y1="39" x2="56" y2="56" stroke="#334155" stroke-width="4.8" stroke-linecap="round"/>
</svg>
