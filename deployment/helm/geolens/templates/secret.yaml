{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "geolens.secretName" . }}
  labels:
    {{- include "geolens.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL_OVERRIDE: {{ .Values.secrets.databaseUrlOverride | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  TILE_SIGNING_SECRET: {{ .Values.secrets.tileSigningSecret | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  S3_ACCESS_KEY_ID: {{ .Values.storage.s3AccessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.storage.s3SecretAccessKey | quote }}
{{- end }}
