apiVersion: v1
kind: Service
metadata:
  name: {{ include "geolens.fullname" . }}-api
  labels:
    {{- include "geolens.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.api.type }}
  ports:
    - name: http
      port: {{ .Values.service.api.port }}
      targetPort: http
  selector:
    {{- include "geolens.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
