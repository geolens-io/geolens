# ==============================================================================
# GeoLens Custom PostgreSQL Configuration
# ==============================================================================
# Mounted into the db container via docker-compose volume.
# Includes profiling extensions for query performance analysis.

# ---------------------------------------------------------------------------
# Connection
# ---------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 30                   # Sized to the app pool budget (API 16 + Worker 13 + Admin 1). See README "Connection Pool Budget".

# ---------------------------------------------------------------------------
# Profiling: pg_stat_statements
# ---------------------------------------------------------------------------
# Tracks execution statistics for all SQL statements.
# Query with: SELECT * FROM pg_stat_statements ORDER BY total_exec_time DESC;
shared_preload_libraries = 'pg_stat_statements,auto_explain'
pg_stat_statements.max = 5000
pg_stat_statements.track = all

# ---------------------------------------------------------------------------
# Profiling: auto_explain
# ---------------------------------------------------------------------------
# Automatically logs EXPLAIN output for slow queries (>= 100ms).
# Check PostgreSQL logs for output.
auto_explain.log_min_duration = '100ms'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_format = text

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging_collector = on
log_destination = 'stderr'

# ---------------------------------------------------------------------------
# Planner
# ---------------------------------------------------------------------------
random_page_cost = 1.1              # SSD/Docker overlay (default 4.0 is for spinning disk)
jit = off                           # Required: pgvector + JIT causes crashes/hangs
max_worker_processes = 2            # Conservative starting default; raise to host core count for parallel-heavy workloads.
max_parallel_workers = 2            # Match max_worker_processes
max_parallel_workers_per_gather = 1 # Single parallel worker per query keeps the planner predictable; raise for analytic workloads.

# ---------------------------------------------------------------------------
# pgvector tuning (DBM-01 / Phase 271)
# ---------------------------------------------------------------------------
# Default hnsw.ef_search (40) is too low for recall-sensitive semantic search.
# The per-query helper `set_hnsw_recall(ef=100)` in
# backend/app/processing/embeddings/helpers.py issues `SET LOCAL` on hot
# semantic-search paths; this session default backstops queries whose code
# paths forget to call the helper, so recall regressions are not silent.
hnsw.ef_search = 100                # Higher recall; slightly slower hnsw probe.

# ---------------------------------------------------------------------------
# Memory
# ---------------------------------------------------------------------------
# Starting defaults; tune up if you have headroom. Rules of thumb:
#   shared_buffers       ≈ 25% of host RAM
#   effective_cache_size ≈ 75% of host RAM (advisory; doesn't allocate)
#   work_mem             per-sort operation; PostGIS queries may allocate multiple
shared_buffers = 512MB
work_mem = 8MB
effective_cache_size = 1536MB
maintenance_work_mem = 128MB

# ---------------------------------------------------------------------------
# WAL
# ---------------------------------------------------------------------------
wal_buffers = 16MB
min_wal_size = 100MB

# ---------------------------------------------------------------------------
# Logging (slow queries)
# ---------------------------------------------------------------------------
log_min_duration_statement = 1000   # Log queries slower than 1s

# ---------------------------------------------------------------------------
# Autovacuum tuning for many tables
# ---------------------------------------------------------------------------
autovacuum_max_workers = 2          # Conservative default; raise for many-table catalogs on bigger hosts.
autovacuum_naptime = 30
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
