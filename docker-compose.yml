# ==============================================================================
# Shared environment anchors
# ==============================================================================
x-db-env: &db-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB}

x-auth-env: &auth-env
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  GEOLENS_ADMIN_USERNAME: ${GEOLENS_ADMIN_USERNAME}
  GEOLENS_ADMIN_PASSWORD: ${GEOLENS_ADMIN_PASSWORD}
  # JWT tuning + password policy: defaults match Settings (HS256, 15min access /
  # 7d refresh, 12-char min / 3 of 4 classes). Listed here so an operator who
  # overrides them in .env actually sees the override reach the container —
  # without these lines, Pydantic falls back to its compiled defaults inside
  # the image (Settings reads $env, not the host .env file).
  JWT_ALGORITHM: "${JWT_ALGORITHM:-HS256}"
  ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-15}"
  REFRESH_TOKEN_EXPIRE_DAYS: "${REFRESH_TOKEN_EXPIRE_DAYS:-7}"
  PASSWORD_MIN_LENGTH: "${PASSWORD_MIN_LENGTH:-12}"
  PASSWORD_REQUIRE_CLASSES: "${PASSWORD_REQUIRE_CLASSES:-3}"

x-db-ssl-env: &db-ssl-env
  DATABASE_URL_OVERRIDE: "${DATABASE_URL_OVERRIDE:-}"
  DATABASE_SSL_MODE: "${DATABASE_SSL_MODE:-prefer}"
  DATABASE_SSL_CA_CERT: "${DATABASE_SSL_CA_CERT:-}"
  DATABASE_POOL_PRE_PING: "${DATABASE_POOL_PRE_PING:-true}"  # aligned with the Settings default and the .env.example commented default
  DB_USE_EXTERNAL_POOLER: "${DB_USE_EXTERNAL_POOLER:-false}"
  DB_POOL_SIZE: "${DB_POOL_SIZE:-10}"
  DB_MAX_OVERFLOW: "${DB_MAX_OVERFLOW:-3}"  # see README §"Connection Pool Budget"
  DB_POOL_TIMEOUT: "${DB_POOL_TIMEOUT:-30}"
  DB_POOL_RECYCLE: "${DB_POOL_RECYCLE:-1800}"

x-storage-env: &storage-env
  STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
  S3_ENDPOINT: "${S3_ENDPOINT:-}"
  S3_BUCKET: "${S3_BUCKET:-}"
  S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
  S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
  S3_REGION: "${S3_REGION:-us-east-1}"
  S3_ALLOW_HTTP: "${S3_ALLOW_HTTP:-false}"
  S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-auto}"
  # CR-03 (Phase 1210): Azure Blob Storage vars — required when STORAGE_PROVIDER=azure.
  # Defaults to empty string so the api+worker containers receive the variable name
  # (Pydantic's empty_str_to_none validator coerces "" → None, which is correct for
  # optional fields).  Cloud-dev: set these in .env; keep Azurite creds out of the image.
  AZURE_STORAGE_CONTAINER: "${AZURE_STORAGE_CONTAINER:-}"
  AZURE_STORAGE_CONNECTION_STRING: "${AZURE_STORAGE_CONNECTION_STRING:-}"
  AZURE_STORAGE_ACCOUNT_URL: "${AZURE_STORAGE_ACCOUNT_URL:-}"
  AZURE_STORAGE_ACCOUNT_KEY: "${AZURE_STORAGE_ACCOUNT_KEY:-}"

x-logging-env: &logging-env
  LOG_JSON: "${LOG_JSON:-false}"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"
  # fix(#441): pass the SEC-005 posture flag through (kept in sync with
  # docker-compose.prod.yml). Empty (unset) falls back to LOG_JSON in Settings.
  ENVIRONMENT: "${ENVIRONMENT:-}"

x-ai-env: &ai-env
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
  LLM_MODEL: "${LLM_MODEL:-claude-sonnet-5}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o}"
  OPENAI_MODEL_LIGHT: "${OPENAI_MODEL_LIGHT:-}"
  OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
  EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
  EMBEDDING_DIMS: "${EMBEDDING_DIMS:-1536}"
  EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-}"

# Shared hardening profile for the FastAPI-image trio (api, worker, migrate).
# All three run the same Dockerfile target and use the same setpriv-based
# entrypoint flow (start as root -> chown volume mounts -> drop to uid 1001
# -> exec app). Merging the block via `<<: *hardened-base` lets each service
# add only its own user/init/tmpfs/command without re-stating security plumbing.
#
# titiler intentionally NOT in this anchor — it has cap_drop ALL but NO
# cap_add (no setpriv-based uid drop), so granting it CHOWN/DAC_OVERRIDE/etc.
# would weaken its profile.
x-hardened-base: &hardened-base
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN          # chown -R appuser:appgroup ${STAGING_DIR}
    - DAC_OVERRIDE   # chmod g+rwX inside arbitrary-perm volume mounts
    - FOWNER         # chmod operates on files owned by other UIDs
    - SETGID         # setpriv --regid 1001
    - SETUID         # setpriv --reuid 1001
  read_only: true

# ==============================================================================
# Services
# ==============================================================================
# Services at a glance:
#   db        — PostgreSQL 17 + PostGIS 3.5 (catalog data, pgvector, pg_trgm)
#   migrate   — one-shot alembic upgrade heads, exits when done
#   api       — FastAPI REST + OGC API + Records (host :8001 -> container :8000)
#   worker    — Procrastinate job queue (GDAL ingest, embeddings, exports)
#   titiler   — Raster tile server (internal only, reachable at http://titiler:8000)
#   frontend  — Vite dev server (host :8080 -> container :5173, proxies /api -> api:8000)
#   backup    — pg_dump + object-storage archive, runs by default (no profile)
#   minio     — local S3 emulation, opt-in via `--profile cloud-dev`
#   valkey    — local Redis-compatible cache, opt-in via `--profile cloud-dev`
#
# Ports at a glance (host -> container, override via .env):
#   8080 -> frontend:5173   browser entry point; /api proxies to api:8000
#   8001 -> api:8000        direct API access (rarely needed; prefer 8080/api)
#   5434 -> db:5432         psql/DBeaver against local Postgres
#   9000/9001 -> minio      cloud-dev profile only
#   6379 -> valkey          cloud-dev profile only
# All published ports bind 127.0.0.1 only. For QGIS / curl examples in the
# README, use http://localhost:8080/api/... — that's the supported surface.
services:
  db:
    build:
      context: ./db
    command: postgres -c config_file=/etc/postgresql/custom.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Host-port fallback (5434 from .env, 5432 bare).
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # GAP-021: :ro mirrors the sibling conf mount and every repo-file mount on
      # the api service — the init script is read+exec inside the container, never
      # written, so a compromised db container cannot rewrite this host file (it
      # re-executes on every fresh pgdata volume).
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/10-init.sh:ro
      - ./db/postgresql.conf:/etc/postgresql/custom.conf:ro
    # GAP-001: memory limit prevents the DB from consuming all host RAM under
    # heavy query load. 2 GB covers shared_buffers (512 MB) + work_mem headroom
    # for concurrent queries. Raise on hosts with > 8 GB RAM.
    # fix(#448): env-overridable — mirrors docker-compose.prod.yml so the caps
    # can be rebalanced on small hosts without editing the file.
    mem_limit: "${DB_MEM_LIMIT:-2g}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # D02 (docker-audit-20260604): drop ALL caps; re-add only what the postgres
    # entrypoint needs (initdb chowns the data dir, then gosu-drops to postgres).
    # no-new-privileges permits this de-escalation. Verify on a FRESH pgdata
    # volume — these caps surface during initdb/chown.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    # Empty entrypoint suppresses Dockerfile-inherited api-entrypoint.sh on this
    # one-shot service.
    entrypoint: []
    # `upgrade heads` (plural) applies all Alembic branch heads and avoids bare
    # `head` failing when a revision graph has multiple heads. For a single-head
    # graph, `heads` is equivalent to `head`.
    command: sh -c "uv run --no-dev alembic upgrade heads"
    # One-shot: alembic upgrade is idempotent (re-running is safe). Failure
    # should stop the dependency chain, not retry blindly.
    restart: "no"
    # Hardening (security_opt + cap_drop + cap_add + read_only): see
    # x-hardened-base anchor at top of file.
    <<: *hardened-base
    # tmpfs sized smaller than api since one-shot doesn't process uploads.
    # /app/staging is tmpfs (not the upload_staging volume) — migrate never
    # writes uploads, but the shared api-entrypoint.sh probe requires the dir
    # writable before alembic runs.
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /home/appuser:size=64m,uid=1001,gid=1001
      - /app/staging:size=8m,uid=1001,gid=1001
    volumes:
      - ./backend/alembic:/app/alembic
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env]
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    # Runs as root so the entrypoint can fix volume ownership, then drops to
    # uid 1001 (appuser) via setpriv before exec-ing the application.
    user: "0:0"
    init: true
    stop_grace_period: 30s
    restart: unless-stopped
    # GAP-001: 2 GB covers the Python process + Uvicorn workers + ORM caches.
    # Raise if ingesting very large files with many concurrent workers.
    # fix(#448): env-overridable — mirrors docker-compose.prod.yml.
    mem_limit: "${API_MEM_LIMIT:-2g}"
    # Hardening (security_opt + cap_drop + cap_add + read_only): see
    # x-hardened-base anchor at top of file. no-new-privileges:true blocks
    # setuid escalation but NOT setpriv (which de-escalates), so the
    # entrypoint's "start as root -> fix volumes -> setpriv to uid 1001"
    # pattern works unchanged.
    <<: *hardened-base
    # /app/staging is the named volume `upload_staging` (not tmpfs).
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /home/appuser:size=128m,uid=1001,gid=1001
      - /var/run:size=8m
    entrypoint: ["/app/scripts/api-entrypoint.sh"]
    ports:
      # Host-port fallback (8001 from .env, 8000 bare).
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ./.dockerignore:/app/.dockerignore:ro
      - ./.env.example:/app/.env.example:ro
      - ./.github:/app/.github:ro
      - ./CHANGELOG.md:/app/CHANGELOG.md:ro
      - ./CODE_OF_CONDUCT.md:/app/CODE_OF_CONDUCT.md:ro
      - ./Dockerfile:/app/Dockerfile:ro
      - ./README.de.md:/app/README.de.md:ro
      - ./README.es.md:/app/README.es.md:ro
      - ./README.fr.md:/app/README.fr.md:ro
      - ./README.md:/app/README.md:ro
      - ./SUPPORT.md:/app/SUPPORT.md:ro
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend:/app/backend:ro
      - ./backend/tests:/app/tests
      - ./cli:/app/cli:ro
      - ./db:/app/db:ro
      - ./deployment:/app/deployment:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./e2e:/app/e2e:ro
      - ./examples:/app/examples:ro
      - ./frontend:/app/frontend:ro
      - ./scripts/seed-showcase.py:/app/scripts/seed-showcase.py:ro
      - ./sdks:/app/sdks:ro
      # GAP-022: SHARED-STAGING CONTRACT. The api, worker, and titiler services
      # all mount this one named volume at the FIXED path /app/staging and MUST
      # see the same files at the same absolute path (api writes the upload,
      # worker reads it for fan-out ingest, titiler reads rasters under it). The
      # path is therefore NOT operator-tunable in compose — UPLOAD_STAGING_DIR is
      # pinned to /app/staging on every service below so the app's path can never
      # drift from this mount target. To change the path, change all three mounts
      # AND the migrate tmpfs together; a lone env override would silently break
      # the handoff. titiler reads /app/staging via settings.upload_staging_dir's
      # default with no env at all, so the default and this path must agree.
      - upload_staging:/app/staging
    # UVICORN_WORKERS=1 is the dev default to keep --reload working (uvicorn forbids
    # --workers > 1 with --reload). For a production deploy without --reload,
    # raise UVICORN_WORKERS to 2-4 for true parallelism.
    # All continuation lines at the same indent so `>` folds newlines into
    # single spaces. Mismatched indent makes YAML preserve the newlines and
    # sh then sees a multi-line script (uvicorn flags become "command not
    # found" lines and uvicorn binds to its 127.0.0.1 default).
    # GAP-003: --proxy-headers tells uvicorn to populate request.client from
    # X-Forwarded-For / X-Real-IP headers set by the nginx reverse proxy.
    # fix(#430 BA-01): the safety here rests on nginx OVERWRITING X-Forwarded-For with
    # $remote_addr (frontend/nginx.conf) — NOT on the api port being private. The
    # header is injected at the internet-facing nginx edge, so a client CAN forge
    # it; because nginx now replaces (not appends) it, the leftmost value uvicorn
    # trusts is the real socket peer. --forwarded-allow-ips='*' is therefore fine.
    # rate-limit (slowapi get_remote_address) + audit logs (request.client.host)
    # both read request.client, which uvicorn populates only with --proxy-headers.
    command: >
      sh -c "uv run --no-dev uvicorn app.api.main:app
      --host 0.0.0.0 --port 8000
      --workers $${UVICORN_WORKERS:-1}
      --timeout-keep-alive $${UVICORN_TIMEOUT_KEEP_ALIVE:-5}
      --timeout-graceful-shutdown $${UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN:-30}
      --proxy-headers --forwarded-allow-ips='*'
      --reload --reload-dir /app/app"
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env, *storage-env, *logging-env, *ai-env]
      PYTHONPATH: /app
      UVICORN_WORKERS: "${UVICORN_WORKERS:-1}"
      UVICORN_TIMEOUT_KEEP_ALIVE: "${UVICORN_TIMEOUT_KEEP_ALIVE:-5}"
      UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN: "${UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN:-30}"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8080}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080/api}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DCAT_CONTACT_EMAIL: ${DCAT_CONTACT_EMAIL:-}
      REDIS_URL: "${REDIS_URL:-}"
      CDN_BASE_URL: "${CDN_BASE_URL:-}"
      PRESIGNED_MULTIPART_THRESHOLD_MB: "${PRESIGNED_MULTIPART_THRESHOLD_MB:-100}"
      TILE_CACHE_TTL: "${TILE_CACHE_TTL:-300}"
      TILE_SIGNING_SECRET: "${TILE_SIGNING_SECRET:-}"
      UPLOAD_MAX_SIZE_MB: "${UPLOAD_MAX_SIZE_MB:-500}"
      # GAP-022: pinned (not "${UPLOAD_STAGING_DIR:-...}") — the staging path is
      # fixed by the shared-volume contract above; the app's path must equal the
      # /app/staging mount target on every service. See .env.example.
      UPLOAD_STAGING_DIR: "/app/staging"
      UPLOAD_ALLOWED_EXTENSIONS: "${UPLOAD_ALLOWED_EXTENSIONS:-.zip,.gpkg,.geojson,.json,.csv,.tif,.tiff,.xlsx,.xls}"
      REGISTRATION_ENABLED: "${REGISTRATION_ENABLED:-false}"
      TILE_POOL_MIN_SIZE: "${TILE_POOL_MIN_SIZE:-2}"
      TILE_POOL_MAX_SIZE: "${TILE_POOL_MAX_SIZE:-10}"
      ENV_ONLY_CONFIG: "${ENV_ONLY_CONFIG:-false}"
      # CORS: comma-separated allowed origins for cross-origin API access (empty = same-origin only)
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      # Ingest tuning: GDAL_HTTP_TIMEOUT passed to ogr2ogr (SEED-02, raised
      # from the 120s hardcoded default that timed out 50% of AGO layers).
      INGEST_HTTP_TIMEOUT_SECONDS: "${INGEST_HTTP_TIMEOUT_SECONDS:-300}"
      # fix(#434): retention for terminal ingest_jobs rows, purged by the API
      # lifespan sweeper (0 = keep history forever).
      INGEST_JOBS_RETENTION_DAYS: "${INGEST_JOBS_RETENTION_DAYS:-30}"
      # Job-queue schema: PROCRASTINATE_SCHEMA selects which Postgres schema
      # holds the procrastinate_jobs tables; default matches the bundled migration.
      PROCRASTINATE_SCHEMA: "${PROCRASTINATE_SCHEMA:-catalog}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    # See api service comment — same root-then-drop pattern for volume ownership.
    user: "0:0"
    init: true
    stop_grace_period: 35s
    restart: unless-stopped
    # GAP-001: 4 GB covers the worker process + GDAL/OGR buffers during large
    # file ingestion (GeoTIFF COG conversion can be RAM-intensive).
    # fix(#448): env-overridable — mirrors docker-compose.prod.yml.
    mem_limit: "${WORKER_MEM_LIMIT:-4g}"
    # Hardening: see x-hardened-base anchor at top of file (same profile as api).
    <<: *hardened-base
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /home/appuser:size=128m,uid=1001,gid=1001
      - /var/run:size=8m
    entrypoint: ["/app/scripts/worker-entrypoint.sh"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - upload_staging:/app/staging
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env, *storage-env, *logging-env, *ai-env]
      PYTHONPATH: /app
      REDIS_URL: "${REDIS_URL:-}"
      # GAP-022: pinned (not "${UPLOAD_STAGING_DIR:-...}") — the staging path is
      # fixed by the shared-volume contract above; the app's path must equal the
      # /app/staging mount target on every service. See .env.example.
      UPLOAD_STAGING_DIR: "/app/staging"
      WORKER_SHUTDOWN_TIMEOUT: "${WORKER_SHUTDOWN_TIMEOUT:-30}"
      # fix(#448): parallel job slots (2-3 on multi-core hosts; keep 1 on
      # 2-vCPU boxes) and queue pinning for a dedicated raster worker.
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-1}"
      WORKER_QUEUES: "${WORKER_QUEUES:-priority,ingest,raster}"
      # Mirror the api service: ingest tuning + procrastinate schema reach
      # the worker container so operator overrides take effect.
      INGEST_HTTP_TIMEOUT_SECONDS: "${INGEST_HTTP_TIMEOUT_SECONDS:-300}"
      PROCRASTINATE_SCHEMA: "${PROCRASTINATE_SCHEMA:-catalog}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  titiler:
    # Pinned to 2.x stable (held back from 3.x without contract testing).
    # 2.0.5 bump per the 2026-07 TiTiler assessment (patch-level, same contract).
    image: ghcr.io/developmentseed/titiler:2.0.5
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    # titiler binds port 8000 inside container (>1024) — no NET_BIND_SERVICE needed.
    cap_drop:
      - ALL
    # GAP-001: 1 GB covers GDAL_CACHEMAX (200 MB) + Python process overhead for
    # concurrent tile rendering. Raise for very large raster catalogs.
    # fix(#448): env-overridable — mirrors docker-compose.prod.yml.
    mem_limit: "${TITILER_MEM_LIMIT:-1g}"
    # Immutable root with /tmp tmpfs for GDAL VSI cache writes.
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      # GDAL raster I/O tuning — these control how Titiler reads COG/VRT files
      GDAL_CACHEMAX: "200"                              # GDAL block cache in MB (default 5 — raise for concurrent tile requests)
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"         # Skip directory listing on S3/HTTP — avoids slow LIST calls per tile
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ".tif,.tiff,.cog,.vrt"  # Only fetch these extensions via /vsicurl
      GDAL_VRT_RAWRASTERBAND_ALLOWED_SOURCE: "NETWORK_OR_LOCAL"  # Allow VRT bands to reference remote (S3) sources
      VSI_CACHE: "TRUE"                                  # Enable /vsicurl block caching for range-request reuse
      CPL_VSIL_CURL_CACHE_SIZE: "16777216"               # /vsicurl cache size in bytes (16 MB)
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"          # Merge adjacent HTTP range requests into fewer round-trips
      GDAL_HTTP_FOLLOWLOCATION: "NO"                     # Revalidate remote object URLs at the API layer; TiTiler must not follow redirects
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${S3_REGION:-us-east-1}"
      # Azure Blob / Azurite (STOR-03, Phase 1210) — GDAL /vsiaz/ credentials.
      # For Azurite: set AZURE_STORAGE_CONNECTION_STRING to the well-known dev string.
      # Empty defaults keep the existing s3/local stack unchanged when vars are unset.
      AZURE_STORAGE_CONNECTION_STRING: "${AZURE_STORAGE_CONNECTION_STRING:-}"
      AZURE_STORAGE_ACCOUNT: "${AZURE_STORAGE_ACCOUNT:-}"
      AZURE_STORAGE_ACCESS_KEY: "${AZURE_STORAGE_ACCESS_KEY:-}"
      TITILER_API_ROOT_PATH: ""
    volumes:
      - upload_staging:/app/staging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    # No ports: section — internal only, reachable at http://titiler:8000

  frontend:
    # Note: image runs as USER node (uid 1000). On Linux dev hosts where the host
    # user is NOT uid 1000, the bind-mounted ./frontend may not be writable from
    # inside the container, breaking Vite hot-reload. Workaround: override `user:`
    # here. macOS Docker Desktop handles this transparently via the file-sharing layer.
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # USER node (uid 1000) set in frontend/Dockerfile.dev — cap_drop ALL is safe.
    # vite + esbuild + node hot-reload need no Linux capabilities.
    cap_drop:
      - ALL
    # NOTE: read_only NOT applied to frontend (dev). Vite writes HMR cache to
    # /tmp/.vite/ and /app/node_modules/.vite/; the bind-mount of source under
    # /app means the root filesystem is effectively writable already. A
    # production nginx frontend would be compatible with read_only.
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8080}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # API_PROXY_TARGET is consumed only by vite.config.ts (Node side); nothing
      # in the browser bundle reads it.
      API_PROXY_TARGET: http://api:8000
    healthcheck:
      # Vite dev server inside the container; HTTP GET / returns 200 once ready.
      # Cold start can take 10-15s while Vite resolves the import graph.
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy

  backup:
    # Backup runs by default — no --profile flag needed (BKP-01).
    # Configure schedule/retention via BACKUP_* env vars (see .env.example).
    # Builds the multi-arch root Dockerfile backup stage (not ./db which is
    # amd64-only via the postgis/postgis base).
    build:
      context: .
      dockerfile: Dockerfile
      target: backup
    restart: unless-stopped
    # D03 (docker-audit-20260604): backup-entrypoint.sh runs as root throughout
    # (pg_dump/cp/tar/awscli/sleep on files it owns under /backups; the
    # postgres:17 base ships no cron, so it runs the built-in sleep-loop
    # scheduler). It never drops privilege or chowns across uids, so it needs NO
    # added capabilities — cap_drop ALL just removes the unused kernel surface.
    # init:true reaps the sleep loop. No read_only — the entrypoint writes under
    # /backups (and a crontab under /var/spool/cron if a base ever provides cron).
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./scripts:/scripts:ro
      - backup_data:/backups
      # BKP-01 (Phase 1219): mirror docker-compose.prod.yml — tar the upload_staging
      # volume alongside the pg_dump so a restore recovers locally-staged objects
      # (rasters/COGs/source uploads), not just the DB. Read-only: the backup job
      # never mutates app data. CAVEAT: captures the LOCAL upload_staging volume
      # only; deployments that offload objects to external S3 back those up there.
      - upload_staging:/staging:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      POSTGRES_HOST: db
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_S3_ENABLED: ${BACKUP_S3_ENABLED:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ALLOW_HTTP: ${S3_ALLOW_HTTP:-false}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-auto}
    entrypoint: ["/scripts/backup-entrypoint.sh"]
    healthcheck:
      # The entrypoint runs the built-in sleep-loop scheduler (postgres:17 has no
      # cron); the probe just verifies that process is alive.
      test: ["CMD-SHELL", "pgrep -f backup-entrypoint || pgrep -f sleep || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
      # Probe every 5s during start-up so the service reports healthy quickly — it
      # starts last (gated on migrate) and must clear the installer's
      # wait-for-healthy budget on a fresh install.
      start_interval: 5s
    depends_on:
      db:
        condition: service_healthy
      # Gate the first (on-startup) pg_dump behind migrations so a fresh install
      # never captures a pre-migration / empty DB as its first retained backup.
      migrate:
        condition: service_completed_successfully

  # --- cloud-dev profile: local S3 + cache for testing ---
  # All cloud-dev services bind to 127.0.0.1 only — they're for local dev,
  # not for sharing on a LAN or exposing through Docker port forwarding.
  minio:
    # Pinned by SHA256 digest (tag is documentation).
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    profiles: ["cloud-dev"]
    # INST-01 + Codex P1 (true fail-closed, parse-safe). `${VAR:?}` would abort
    # `compose config`/`up` at PARSE time even when cloud-dev is inactive (breaks
    # a verbatim-.env.example install). But `${VAR:-}` alone is NOT fail-closed:
    # MinIO treats an EMPTY MINIO_ROOT_USER as unset and silently boots with the
    # well-known default minioadmin:minioadmin (verified). So keep the parse-safe
    # empty refs in environment: AND enforce non-empty creds at RUNTIME via the
    # entrypoint — the cloud-dev S3 store refuses to start on default/blank creds.
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$MINIO_ROOT_USER" ] || [ -z "$$MINIO_ROOT_PASSWORD" ]; then
          echo "FATAL: cloud-dev MinIO requires MINIO_ROOT_USER and MINIO_ROOT_PASSWORD in .env — refusing to start with default/blank credentials." >&2
          exit 1
        fi
        exec minio server /data --console-address ":9001"
    # D04 (docker-audit-20260604): cloud-dev is opt-in + loopback-only, but minio
    # holds root S3 creds — drop caps + block privilege gain as cheap insurance.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      # Parse-safe empty default (:-); the entrypoint above enforces non-empty at
      # runtime. MUST be listed here so compose passes the host value into the
      # container (the runtime guard checks these).
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  minio-setup:
    # Paired digest pin with the minio service above.
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    profiles: ["cloud-dev"]
    # D04 (docker-audit-20260604): one-shot setup, but no-new-privileges + cap_drop
    # are free hardening.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      minio:
        condition: service_healthy
    # BUG-015 (Phase 1184): Previously used `entrypoint: >` (YAML folded scalar)
    # which collapsed newlines to spaces, destroying the heredoc that wrote the
    # CORS policy JSON — mc anonymous set-json never ran. Fixed by mounting the
    # setup logic as a real script file (heredoc preserved verbatim).
    # INST-01 (Phase 1218): empty-default (:-) so a verbatim-.env.example install
    # parses without the cloud-dev profile; runtime rejects empty creds (fail-closed
    # scope moved from parse-time to runtime). See minio service above.
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-}"
    volumes:
      - ./scripts/minio-setup.sh:/usr/local/bin/minio-setup.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/minio-setup.sh"]

  azurite:
    # Azure Blob Storage emulator — cloud-dev profile only (Phase 1210 / STOR-03).
    # Pinned by SHA256 digest (tag is documentation only).
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0@sha256:647c63a91102a9d8e8000aab803436e1fc85fbb285e7ce830a82ee5d6661cf37
    profiles: ["cloud-dev"]
    # D04 / T-1210-03: cloud-dev opt-in, loopback-only. cap_drop ALL + no-new-privileges
    # are cheap insurance — Azurite holds no keys that matter outside localhost.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:10000:10000"  # Blob service — loopback only
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --loose --skipApiVersionCheck
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 10000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  valkey:
    # 8.x line tip; cloud-dev profile only.
    image: valkey/valkey:8.1.7-alpine
    profiles: ["cloud-dev"]
    # D04 (docker-audit-20260604): drop caps + block privilege gain (opt-in dev cache).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pgdata:
  upload_staging:
  backup_data:
  minio_data:
  valkey_data:
  azurite_data:
