# ==============================================================================
# Shared environment anchors
# ==============================================================================
x-db-env: &db-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB}

x-auth-env: &auth-env
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  GEOLENS_ADMIN_USERNAME: ${GEOLENS_ADMIN_USERNAME}
  GEOLENS_ADMIN_PASSWORD: ${GEOLENS_ADMIN_PASSWORD}

x-db-ssl-env: &db-ssl-env
  DATABASE_URL_OVERRIDE: "${DATABASE_URL_OVERRIDE:-}"
  DATABASE_SSL_MODE: "${DATABASE_SSL_MODE:-}"
  DATABASE_SSL_CA_CERT: "${DATABASE_SSL_CA_CERT:-}"
  DATABASE_POOL_PRE_PING: "${DATABASE_POOL_PRE_PING:-false}"
  DB_USE_EXTERNAL_POOLER: "${DB_USE_EXTERNAL_POOLER:-false}"
  DB_POOL_SIZE: "${DB_POOL_SIZE:-10}"
  DB_MAX_OVERFLOW: "${DB_MAX_OVERFLOW:-3}"  # DBM-04: see README §"Connection Pool Budget"
  DB_POOL_TIMEOUT: "${DB_POOL_TIMEOUT:-30}"
  DB_POOL_RECYCLE: "${DB_POOL_RECYCLE:-1800}"

x-storage-env: &storage-env
  STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
  S3_ENDPOINT: "${S3_ENDPOINT:-}"
  S3_BUCKET: "${S3_BUCKET:-}"
  S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
  S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
  S3_REGION: "${S3_REGION:-us-east-1}"
  S3_ALLOW_HTTP: "${S3_ALLOW_HTTP:-false}"
  S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-auto}"

x-logging-env: &logging-env
  LOG_JSON: "${LOG_JSON:-false}"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"

x-ai-env: &ai-env
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
  LLM_MODEL: "${LLM_MODEL:-claude-sonnet-4-20250514}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o}"
  OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
  EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
  EMBEDDING_DIMS: "${EMBEDDING_DIMS:-1536}"
  EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-}"

# ==============================================================================
# Services
# ==============================================================================
# Resource budget for 2GB VPS deployment target (Phase 272 / INF-01).
#
# Default-profile steady-state memory sum (db + api + worker + titiler + frontend):
#   db(768M) + api(384M) + worker(384M) + titiler(256M) + frontend(128M) = 1920M
# This leaves ~128 MB host headroom on a 2 GB VPS (kernel + Docker engine ~150-200 MB).
#
# Transient peaks:
#   - migrate(384M) runs once at startup; exits before api starts (depends_on:
#     service_completed_successfully), so does not compound with steady-state.
#   - --profile backup adds 192M when active (cron-driven; mostly idle).
#   - --profile cloud-dev (minio + valkey) is local-dev only, NOT counted toward
#     the 2 GB VPS budget.
#
# Limits are honored when deploying via `docker compose up` (Compose-native
# limits don't require Swarm mode).
services:
  db:
    build:
      context: ./db
    command: postgres -c config_file=/etc/postgresql/custom.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/10-init.sh
      - ./db/postgresql.conf:/etc/postgresql/custom.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # postgresql.conf shared_buffers=512MB sets the floor; 768M cap leaves headroom
    # for work_mem * max_connections + autovacuum + temp tables. Reservation matches
    # shared_buffers floor so postgres can always claim that much.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    command: sh -c "uv run alembic upgrade head"
    volumes:
      - ./backend/alembic:/app/alembic
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env]
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    # One-shot service; same envelope as api so the migration fits the
    # 2GB VPS budget when run alongside the running stack. Exits before api
    # starts (depends_on: service_completed_successfully), so the transient
    # 384M peak doesn't compound with api's 384M cap.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 96M

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    # Runs as root so the entrypoint can fix volume ownership, then drops to
    # uid 1001 (appuser) via setpriv before exec-ing the application.
    user: "0:0"
    init: true
    stop_grace_period: 30s
    restart: unless-stopped
    entrypoint: ["/app/scripts/api-entrypoint.sh"]
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
      - upload_staging:/app/staging
    command: >
      sh -c "uv run uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env, *storage-env, *logging-env, *ai-env]
      PYTHONPATH: /app
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8080}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080/api}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      REDIS_URL: "${REDIS_URL:-}"
      CDN_BASE_URL: "${CDN_BASE_URL:-}"
      PRESIGNED_MULTIPART_THRESHOLD_MB: "${PRESIGNED_MULTIPART_THRESHOLD_MB:-100}"
      TILE_CACHE_TTL: "${TILE_CACHE_TTL:-300}"
      TILE_SIGNING_SECRET: "${TILE_SIGNING_SECRET:-}"
      UPLOAD_MAX_SIZE_MB: "${UPLOAD_MAX_SIZE_MB:-500}"
      UPLOAD_STAGING_DIR: "${UPLOAD_STAGING_DIR:-/app/staging}"
      UPLOAD_ALLOWED_EXTENSIONS: "${UPLOAD_ALLOWED_EXTENSIONS:-.zip,.gpkg,.geojson,.json,.csv,.tif,.tiff,.xlsx,.xls}"
      REGISTRATION_ENABLED: "${REGISTRATION_ENABLED:-false}"
      TILE_POOL_MIN_SIZE: "${TILE_POOL_MIN_SIZE:-2}"
      TILE_POOL_MAX_SIZE: "${TILE_POOL_MAX_SIZE:-10}"
      ENV_ONLY_CONFIG: "${ENV_ONLY_CONFIG:-false}"
      # CORS: comma-separated allowed origins for cross-origin API access (empty = same-origin only)
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    # 2GB VPS budget: api fits uvicorn single-worker baseline (~150M) + GDAL ingest
    # offloaded to worker. 384M cap matches worker reservation symmetry. Streaming
    # upload (UPLOAD_MAX_SIZE_MB=500) uses 100M peak in-process via SpooledTemp.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 96M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    # See api service comment — same root-then-drop pattern for volume ownership.
    user: "0:0"
    init: true
    stop_grace_period: 35s
    restart: unless-stopped
    entrypoint: ["/app/scripts/worker-entrypoint.sh"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - upload_staging:/app/staging
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env, *storage-env, *logging-env, *ai-env]
      PYTHONPATH: /app
      REDIS_URL: "${REDIS_URL:-}"
      UPLOAD_STAGING_DIR: "${UPLOAD_STAGING_DIR:-/app/staging}"
      WORKER_SHUTDOWN_TIMEOUT: "${WORKER_SHUTDOWN_TIMEOUT:-30}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Procrastinate worker; smaller than api because it has no tile pool.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 96M

  titiler:
    image: ghcr.io/developmentseed/titiler:2.0.0
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      # GDAL raster I/O tuning — these control how Titiler reads COG/VRT files
      GDAL_CACHEMAX: "200"                              # GDAL block cache in MB (default 5 — raise for concurrent tile requests)
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"         # Skip directory listing on S3/HTTP — avoids slow LIST calls per tile
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ".tif,.tiff,.cog,.vrt"  # Only fetch these extensions via /vsicurl
      GDAL_VRT_RAWRASTERBAND_ALLOWED_SOURCE: "NETWORK_OR_LOCAL"  # Allow VRT bands to reference remote (S3) sources
      VSI_CACHE: "TRUE"                                  # Enable /vsicurl block caching for range-request reuse
      CPL_VSIL_CURL_CACHE_SIZE: "16777216"               # /vsicurl cache size in bytes (16 MB)
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"          # Merge adjacent HTTP range requests into fewer round-trips
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${S3_REGION:-us-east-1}"
      TITILER_API_ROOT_PATH: ""
    volumes:
      - upload_staging:/app/staging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    # No ports: section — internal only, reachable at http://titiler:8000
    # GDAL_CACHEMAX=200 sets a 200M floor for raster block cache; 256M cap leaves
    # ~56M for the titiler runtime + uvicorn worker. Tile concurrency at this cap
    # is limited; bump to 384M if Prometheus shows tile_cache_misses spiking under
    # concurrent load.
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${FRONTEND_PORT:-8080}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # API_PROXY_TARGET is consumed only by vite.config.ts (Node side); nothing
      # in the browser bundle reads it.
      API_PROXY_TARGET: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    # Vite dev server (or nginx in demo overlay) — minimal footprint.
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  backup:
    # Enable with: docker compose --profile backup up -d
    # Configure schedule/retention via BACKUP_* env vars (see .env.example)
    profiles: ["backup"]
    build:
      context: ./db
    restart: unless-stopped
    volumes:
      - ./scripts:/scripts:ro
      - backup_data:/backups
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      POSTGRES_HOST: db
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_S3_ENABLED: ${BACKUP_S3_ENABLED:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ALLOW_HTTP: ${S3_ALLOW_HTTP:-false}
    entrypoint: ["/scripts/backup-entrypoint.sh"]
    depends_on:
      db:
        condition: service_healthy
    # Backup runs cron-driven; only active during the backup window. Conservative
    # cap covers pg_dump streaming + curl multipart upload to S3.
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M

  # --- cloud-dev profile: local S3 + cache for testing ---
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: ["cloud-dev"]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Cloud-dev profile only — local S3 emulation. Not part of 2GB VPS budget.
    # 256M caps minio's internal disk-buffer cache for typical dev usage.
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  minio-setup:
    image: quay.io/minio/mc:RELEASE.2025-04-22T03-17-43Z
    profiles: ["cloud-dev"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/geolens;
      cat > /tmp/cors.json << 'CORSJSON'
      {
        \"CORSRules\": [
          {
            \"AllowedOrigins\": [\"*\"],
            \"AllowedMethods\": [\"GET\", \"PUT\", \"POST\", \"DELETE\"],
            \"AllowedHeaders\": [\"*\"],
            \"ExposeHeaders\": [\"ETag\"],
            \"MaxAgeSeconds\": 3600
          }
        ]
      }
      CORSJSON
      mc anonymous set-json /tmp/cors.json local/geolens || true;
      exit 0;
      "
    # One-shot: creates bucket + sets CORS, exits.
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  valkey:
    image: valkey/valkey:8.1.6-alpine
    profiles: ["cloud-dev"]
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Cloud-dev profile only — local cache emulation.
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

volumes:
  pgdata:
  upload_staging:
  backup_data:
  minio_data:
  valkey_data:
