# ==============================================================================
# Shared environment anchors
# ==============================================================================
x-db-env: &db-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_DB: ${POSTGRES_DB}

x-auth-env: &auth-env
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  GEOLENS_ADMIN_USERNAME: ${GEOLENS_ADMIN_USERNAME}
  GEOLENS_ADMIN_PASSWORD: ${GEOLENS_ADMIN_PASSWORD}

x-db-ssl-env: &db-ssl-env
  DATABASE_URL_OVERRIDE: "${DATABASE_URL_OVERRIDE:-}"
  DATABASE_SSL_MODE: "${DATABASE_SSL_MODE:-prefer}"
  DATABASE_SSL_CA_CERT: "${DATABASE_SSL_CA_CERT:-}"
  DATABASE_POOL_PRE_PING: "${DATABASE_POOL_PRE_PING:-true}"  # CONF-02 (Phase 277): aligned with Settings.database_pool_pre_ping=True default and .env.example commented default
  DB_USE_EXTERNAL_POOLER: "${DB_USE_EXTERNAL_POOLER:-false}"
  DB_POOL_SIZE: "${DB_POOL_SIZE:-10}"
  DB_MAX_OVERFLOW: "${DB_MAX_OVERFLOW:-3}"  # DBM-04: see README §"Connection Pool Budget"
  DB_POOL_TIMEOUT: "${DB_POOL_TIMEOUT:-30}"
  DB_POOL_RECYCLE: "${DB_POOL_RECYCLE:-1800}"

x-storage-env: &storage-env
  STORAGE_PROVIDER: "${STORAGE_PROVIDER:-local}"
  S3_ENDPOINT: "${S3_ENDPOINT:-}"
  S3_BUCKET: "${S3_BUCKET:-}"
  S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
  S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
  S3_REGION: "${S3_REGION:-us-east-1}"
  S3_ALLOW_HTTP: "${S3_ALLOW_HTTP:-false}"
  S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-auto}"

x-logging-env: &logging-env
  LOG_JSON: "${LOG_JSON:-false}"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"

x-ai-env: &ai-env
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
  LLM_MODEL: "${LLM_MODEL:-claude-sonnet-4-20250514}"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o}"
  OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
  EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
  EMBEDDING_DIMS: "${EMBEDDING_DIMS:-1536}"
  EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-}"

# Shared hardening profile for the FastAPI-image trio (api, worker, migrate).
# All three run the same Dockerfile target and use the same setpriv-based
# entrypoint flow (start as root -> chown volume mounts -> drop to uid 1001
# -> exec app). Merging the block via `<<: *hardened-base` lets each service
# add only its own user/init/tmpfs/command without re-stating security plumbing.
#
# titiler intentionally NOT in this anchor — it has cap_drop ALL but NO
# cap_add (no setpriv-based uid drop), so granting it CHOWN/DAC_OVERRIDE/etc.
# would weaken its profile.
x-hardened-base: &hardened-base
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - CHOWN          # chown -R appuser:appgroup ${STAGING_DIR}
    - DAC_OVERRIDE   # chmod g+rwX inside arbitrary-perm volume mounts
    - FOWNER         # chmod operates on files owned by other UIDs
    - SETGID         # setpriv --regid 1001
    - SETUID         # setpriv --reuid 1001
  read_only: true

# ==============================================================================
# Services
# ==============================================================================
# Services at a glance:
#   db        — PostgreSQL 17 + PostGIS 3.5 (catalog data, pgvector, pg_trgm)
#   migrate   — one-shot alembic upgrade head, exits when done
#   api       — FastAPI REST + OGC API + Records (host :8001 -> container :8000)
#   worker    — Procrastinate job queue (GDAL ingest, embeddings, exports)
#   titiler   — Raster tile server (internal only, reachable at http://titiler:8000)
#   frontend  — Vite dev server (host :8080 -> container :5173, proxies /api -> api:8000)
#   backup    — pg_dump + S3 upload, opt-in via `--profile backup`
#   minio     — local S3 emulation, opt-in via `--profile cloud-dev`
#   valkey    — local Redis-compatible cache, opt-in via `--profile cloud-dev`
#
# Ports at a glance (host -> container, override via .env):
#   8080 -> frontend:5173   browser entry point; /api proxies to api:8000
#   8001 -> api:8000        direct API access (rarely needed; prefer 8080/api)
#   5434 -> db:5432         psql/DBeaver against local Postgres
#   9000/9001 -> minio      cloud-dev profile only
#   6379 -> valkey          cloud-dev profile only
# All published ports bind 127.0.0.1 only. For QGIS / curl examples in the
# README, use http://localhost:8080/api/... — that's the supported surface.
#
# Resource budget for local-dev steady-state (db + api + worker + titiler +
# vite frontend): db(768M) + api(384M) + worker(384M) + titiler(256M) +
# frontend(512M) = 2304M. Vite needs ~512 MB to bundle without OOM-kill;
# substitute nginx in a production deploy to fit a 2 GB VPS.
#
# Transient peaks: migrate(384M) is one-shot and exits before api starts.
# --profile backup adds 192M when active. --profile cloud-dev (minio + valkey)
# is local-dev only.
#
# Limits are honored when deploying via `docker compose up` (Compose-native
# limits don't require Swarm mode).
services:
  db:
    build:
      context: ./db
    command: postgres -c config_file=/etc/postgresql/custom.conf
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Host-port fallback (5434 from .env, 5432 bare) — see
      # docs/docker-compose-architecture.md#host-port-fallback
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/10-init.sh
      - ./db/postgresql.conf:/etc/postgresql/custom.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # postgresql.conf shared_buffers=512MB sets the floor; 768M cap leaves headroom
    # for work_mem * max_connections + autovacuum + temp tables. Reservation matches
    # shared_buffers floor so postgres can always claim that much.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768M
        reservations:
          cpus: "0.5"
          memory: 512M

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    # Empty entrypoint suppresses Dockerfile-inherited api-entrypoint.sh on this
    # one-shot service — see docs/docker-compose-architecture.md#migrate-empty-entrypoint
    entrypoint: []
    command: sh -c "uv run --no-dev alembic upgrade head"
    # One-shot: alembic upgrade is idempotent (re-running is safe). Failure
    # should stop the dependency chain, not retry blindly.
    restart: "no"
    # Hardening (security_opt + cap_drop + cap_add + read_only): see
    # x-hardened-base anchor at top of file.
    <<: *hardened-base
    # tmpfs sized smaller than api since one-shot doesn't process uploads.
    # /app/staging is tmpfs (not the upload_staging volume) — migrate never
    # writes uploads, but the shared api-entrypoint.sh probe requires the dir
    # writable before alembic runs.
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /home/appuser:size=64m,uid=1001,gid=1001
      - /app/staging:size=8m,uid=1001,gid=1001
    volumes:
      - ./backend/alembic:/app/alembic
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env]
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    # One-shot service; same envelope as api so the migration fits the
    # 2GB VPS budget when run alongside the running stack. Exits before api
    # starts (depends_on: service_completed_successfully), so the transient
    # 384M peak doesn't compound with api's 384M cap.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 96M

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    # Runs as root so the entrypoint can fix volume ownership, then drops to
    # uid 1001 (appuser) via setpriv before exec-ing the application.
    user: "0:0"
    init: true
    stop_grace_period: 30s
    restart: unless-stopped
    # Hardening (security_opt + cap_drop + cap_add + read_only): see
    # x-hardened-base anchor at top of file. no-new-privileges:true blocks
    # setuid escalation but NOT setpriv (which de-escalates), so the
    # entrypoint's "start as root -> fix volumes -> setpriv to uid 1001"
    # pattern works unchanged.
    <<: *hardened-base
    # /app/staging is the named volume `upload_staging` (not tmpfs).
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /home/appuser:size=128m,uid=1001,gid=1001
      - /var/run:size=8m
    entrypoint: ["/app/scripts/api-entrypoint.sh"]
    ports:
      # Host-port fallback (8001 from .env, 8000 bare) — see
      # docs/docker-compose-architecture.md#host-port-fallback
      - "127.0.0.1:${API_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
      - upload_staging:/app/staging
    # UVICORN_WORKERS=1 is the dev default to keep --reload working (uvicorn forbids
    # --workers > 1 with --reload). For a production deploy without --reload,
    # raise UVICORN_WORKERS to 2-4 for true parallelism.
    # All continuation lines at the same indent so `>` folds newlines into
    # single spaces. Mismatched indent makes YAML preserve the newlines and
    # sh then sees a multi-line script (uvicorn flags become "command not
    # found" lines and uvicorn binds to its 127.0.0.1 default).
    command: >
      sh -c "uv run --no-dev uvicorn app.api.main:app
      --host 0.0.0.0 --port 8000
      --workers $${UVICORN_WORKERS:-1}
      --timeout-keep-alive $${UVICORN_TIMEOUT_KEEP_ALIVE:-5}
      --timeout-graceful-shutdown $${UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN:-30}
      --reload --reload-dir /app/app"
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env, *storage-env, *logging-env, *ai-env]
      PYTHONPATH: /app
      UVICORN_WORKERS: "${UVICORN_WORKERS:-1}"
      UVICORN_TIMEOUT_KEEP_ALIVE: "${UVICORN_TIMEOUT_KEEP_ALIVE:-5}"
      UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN: "${UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN:-30}"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8080}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080/api}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      REDIS_URL: "${REDIS_URL:-}"
      CDN_BASE_URL: "${CDN_BASE_URL:-}"
      PRESIGNED_MULTIPART_THRESHOLD_MB: "${PRESIGNED_MULTIPART_THRESHOLD_MB:-100}"
      TILE_CACHE_TTL: "${TILE_CACHE_TTL:-300}"
      TILE_SIGNING_SECRET: "${TILE_SIGNING_SECRET:-}"
      UPLOAD_MAX_SIZE_MB: "${UPLOAD_MAX_SIZE_MB:-500}"
      UPLOAD_STAGING_DIR: "${UPLOAD_STAGING_DIR:-/app/staging}"
      UPLOAD_ALLOWED_EXTENSIONS: "${UPLOAD_ALLOWED_EXTENSIONS:-.zip,.gpkg,.geojson,.json,.csv,.tif,.tiff,.xlsx,.xls}"
      REGISTRATION_ENABLED: "${REGISTRATION_ENABLED:-false}"
      TILE_POOL_MIN_SIZE: "${TILE_POOL_MIN_SIZE:-2}"
      TILE_POOL_MAX_SIZE: "${TILE_POOL_MAX_SIZE:-10}"
      ENV_ONLY_CONFIG: "${ENV_ONLY_CONFIG:-false}"
      # CORS: comma-separated allowed origins for cross-origin API access (empty = same-origin only)
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    # api fits uvicorn single-worker baseline (~150M) + GDAL ingest offloaded to
    # worker. 384M cap matches worker reservation symmetry. Streaming upload
    # (UPLOAD_MAX_SIZE_MB=500) uses 100M peak in-process via SpooledTemp.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 96M

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    # See api service comment — same root-then-drop pattern for volume ownership.
    user: "0:0"
    init: true
    stop_grace_period: 35s
    restart: unless-stopped
    # Hardening: see x-hardened-base anchor at top of file (same profile as api).
    <<: *hardened-base
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /home/appuser:size=128m,uid=1001,gid=1001
      - /var/run:size=8m
    entrypoint: ["/app/scripts/worker-entrypoint.sh"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - upload_staging:/app/staging
    environment:
      <<: [*db-env, *auth-env, *db-ssl-env, *storage-env, *logging-env, *ai-env]
      PYTHONPATH: /app
      REDIS_URL: "${REDIS_URL:-}"
      UPLOAD_STAGING_DIR: "${UPLOAD_STAGING_DIR:-/app/staging}"
      WORKER_SHUTDOWN_TIMEOUT: "${WORKER_SHUTDOWN_TIMEOUT:-30}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Procrastinate worker; smaller than api because it has no tile pool.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384M
        reservations:
          cpus: "0.25"
          memory: 96M

  titiler:
    # Pinned to 2.x stable (held back from 3.x without contract testing) — see
    # docs/docker-compose-architecture.md#titiler-image-version
    image: ghcr.io/developmentseed/titiler:2.0.2
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    # titiler binds port 8000 inside container (>1024) — no NET_BIND_SERVICE needed.
    cap_drop:
      - ALL
    # Immutable root with /tmp tmpfs for GDAL VSI cache writes.
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      # GDAL raster I/O tuning — these control how Titiler reads COG/VRT files
      GDAL_CACHEMAX: "200"                              # GDAL block cache in MB (default 5 — raise for concurrent tile requests)
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"         # Skip directory listing on S3/HTTP — avoids slow LIST calls per tile
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ".tif,.tiff,.cog,.vrt"  # Only fetch these extensions via /vsicurl
      GDAL_VRT_RAWRASTERBAND_ALLOWED_SOURCE: "NETWORK_OR_LOCAL"  # Allow VRT bands to reference remote (S3) sources
      VSI_CACHE: "TRUE"                                  # Enable /vsicurl block caching for range-request reuse
      CPL_VSIL_CURL_CACHE_SIZE: "16777216"               # /vsicurl cache size in bytes (16 MB)
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"          # Merge adjacent HTTP range requests into fewer round-trips
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-}"
      AWS_DEFAULT_REGION: "${S3_REGION:-us-east-1}"
      TITILER_API_ROOT_PATH: ""
    volumes:
      - upload_staging:/app/staging
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    # No ports: section — internal only, reachable at http://titiler:8000
    # GDAL_CACHEMAX=200 sets a 200M floor for raster block cache; 256M cap leaves
    # ~56M for the titiler runtime + uvicorn worker. Tile concurrency at this cap
    # is limited; bump to 384M if Prometheus shows tile_cache_misses spiking under
    # concurrent load.
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  frontend:
    # Note: image runs as USER node (uid 1000). On Linux dev hosts where the host
    # user is NOT uid 1000, the bind-mounted ./frontend may not be writable from
    # inside the container, breaking Vite hot-reload. Workaround: override `user:`
    # here. macOS Docker Desktop handles this transparently via the file-sharing layer.
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # USER node (uid 1000) set in frontend/Dockerfile.dev — cap_drop ALL is safe.
    # vite + esbuild + node hot-reload need no Linux capabilities.
    cap_drop:
      - ALL
    # NOTE: read_only NOT applied to frontend (dev). Vite writes HMR cache to
    # /tmp/.vite/ and /app/node_modules/.vite/; the bind-mount of source under
    # /app means the root filesystem is effectively writable already. A
    # production nginx frontend would be compatible with read_only.
    ports:
      - "${FRONTEND_PORT:-8080}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # API_PROXY_TARGET is consumed only by vite.config.ts (Node side); nothing
      # in the browser bundle reads it.
      API_PROXY_TARGET: http://api:8000
    healthcheck:
      # Vite dev server inside the container; HTTP GET / returns 200 once ready.
      # Cold start can take 10-15s while Vite resolves the import graph.
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    # Vite dev server — 512M is the floor for vite + esbuild dep bundling on
    # this graph; 128M OOM-kills vite during optimizer pass. A nginx production
    # build fits in a much smaller footprint.
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  backup:
    # Enable with: docker compose --profile backup up -d
    # Configure schedule/retention via BACKUP_* env vars (see .env.example)
    profiles: ["backup"]
    build:
      context: ./db
    restart: unless-stopped
    volumes:
      - ./scripts:/scripts:ro
      - backup_data:/backups
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      POSTGRES_HOST: db
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_S3_ENABLED: ${BACKUP_S3_ENABLED:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ALLOW_HTTP: ${S3_ALLOW_HTTP:-false}
    entrypoint: ["/scripts/backup-entrypoint.sh"]
    healthcheck:
      # Backup runs cron-driven via the entrypoint script's sleep loop.
      # Healthcheck verifies the entrypoint process is alive (sleep + cron tick).
      test: ["CMD-SHELL", "pgrep -f backup-entrypoint || pgrep -f sleep || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    # Backup runs cron-driven; only active during the backup window. Conservative
    # cap covers pg_dump streaming + curl multipart upload to S3.
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M

  # --- cloud-dev profile: local S3 + cache for testing ---
  # All cloud-dev services bind to 127.0.0.1 only — they're for local dev,
  # not for sharing on a LAN or exposing through Docker port forwarding.
  minio:
    # Pinned by SHA256 digest (tag is documentation); bump procedure at
    # docs/docker-compose-architecture.md#minio-image-version-bump
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    profiles: ["cloud-dev"]
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      # Fail-closed creds (no var-default fallback) — see
      # docs/docker-compose-architecture.md#minio-fail-closed-creds
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required for --profile cloud-dev (set in .env)}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required for --profile cloud-dev}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Cloud-dev profile only — local S3 emulation. Not part of 2GB VPS budget.
    # 256M caps minio's internal disk-buffer cache for typical dev usage.
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  minio-setup:
    # Paired digest pin with the minio service above — see
    # docs/docker-compose-architecture.md#minio-image-version-bump
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    profiles: ["cloud-dev"]
    depends_on:
      minio:
        condition: service_healthy
    # Fail-closed creds; see docs/docker-compose-architecture.md#minio-fail-closed-creds
    # The `$$VAR` (double-dollar) in entrypoint below is load-bearing — it passes
    # the literal $VAR to the in-container shell, which then expands it.
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required for --profile cloud-dev}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required for --profile cloud-dev}"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
      mc mb --ignore-existing local/geolens;
      cat > /tmp/cors.json << 'CORSJSON'
      {
        \"CORSRules\": [
          {
            \"AllowedOrigins\": [\"*\"],
            \"AllowedMethods\": [\"GET\", \"PUT\", \"POST\", \"DELETE\"],
            \"AllowedHeaders\": [\"*\"],
            \"ExposeHeaders\": [\"ETag\"],
            \"MaxAgeSeconds\": 3600
          }
        ]
      }
      CORSJSON
      mc anonymous set-json /tmp/cors.json local/geolens || true;
      exit 0;
      "
    # One-shot: creates bucket + sets CORS, exits.
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  valkey:
    # 8.x line tip; cloud-dev profile only — see
    # docs/docker-compose-architecture.md#valkey-image-version
    image: valkey/valkey:8.1.7-alpine
    profiles: ["cloud-dev"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    # Cloud-dev profile only — local cache emulation.
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

volumes:
  pgdata:
  upload_staging:
  backup_data:
  minio_data:
  valkey_data:
