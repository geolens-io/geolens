# Pre-commit hooks for GeoLens security guardrails.
# Pins audit-derived patterns so security regressions trip CI.
# See AGENTS.md "Security pre-commit checklist" for the rules these hooks enforce.
#
# Run locally:
#   pip install pre-commit && pre-commit install
#   pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ssrf-safe-client
        name: "SSRF Rule 2 — httpx.AsyncClient(follow_redirects=True) outside sources/security.py"
        description: >
          Any httpx.AsyncClient with follow_redirects=True must be constructed
          via make_safe_client() from backend/app/modules/catalog/sources/security.py.
          The factory installs the per-hop _revalidate_redirect event hook.
          See AGENTS.md Security pre-commit checklist Rule 2.
          Uses a system bash hook (not pygrep) so multi-line AsyncClient
          declarations are caught. The previous per-line pattern
          `httpx\.AsyncClient\([^)]*follow_redirects=True` would miss:
              _client = httpx.AsyncClient(        # line N — no follow_redirects here
                  follow_redirects=True,          # line N+1 — no AsyncClient( here
              )
          The new hook checks both patterns across the whole file, not per-line.
        language: system
        entry: >-
          bash -c '
          for f in "$@"; do
            if grep -qE "follow_redirects\s*=\s*True" "$f"; then
              # fix(#430 BA-26): scope to the construction site. A raw httpx.AsyncClient(
              # call with follow_redirects=True is the danger; callers using
              # make_safe_client() never write httpx.AsyncClient( at all. The old
              # file-wide "make_safe_client|security.py" substring let a mere
              # docstring/comment mention grant a pass. The two legit raw-construction
              # sites are handled by exclude: below.
              if grep -qE "httpx\.AsyncClient\(" "$f"; then
                echo "FAIL: $f constructs httpx.AsyncClient( with follow_redirects=True"
                echo "  Use make_safe_client() from backend/app/modules/catalog/sources/security.py"
                echo "  See AGENTS.md Security pre-commit checklist Rule 2."
                exit 1
              fi
            fi
          done
          ' --
        types: [python]
        files: '^backend/app/.*\.py$'
        # Excluded files have legitimate follow_redirects=True usage:
        # - security.py: the canonical factory; defines make_safe_client() itself.
        # - tiles/router.py: fixed internal URL (http://titiler:8000) — not user-controlled,
        #   no SSRF risk. Excluded explicitly because its multi-line AsyncClient declaration
        #   (lines 51-54) is the exact shape the pygrep hook could not catch.
        #   If the URL source ever changes to user-controlled, remove this exclusion and
        #   wrap the client in make_safe_client().
        exclude: '^backend/app/modules/catalog/sources/security\.py$|^backend/app/processing/tiles/router\.py$'

      - id: visibility-filter-coverage
        name: "Visibility Rule 1 — route files calling get_dataset must reference check_dataset_access or apply_visibility_filter"
        description: >
          Any route handler that fetches a Record/Dataset/Map by ID must call
          check_dataset_access_or_anonymous (read), check_dataset_access (read),
          check_dataset_write_access (owner-or-admin mutation), or
          apply_visibility_filter. See AGENTS.md Security pre-commit checklist Rule 1.
        language: system
        entry: >-
          bash -c '
          for f in "$@"; do
            # fix(#430 BA-07): match ANY router var. The old alternation stac_|ogc_|layers_
            # was each followed by "\." but the real vars are stac_router,
            # ogc_features_router, layers_router, features_router, ... so only
            # "@router." ever matched, letting features/router.py and
            # layers/router.py escape the hook entirely.
            if grep -qE "^@[A-Za-z_]*router\.(get|post|patch|delete|put)" "$f" \
              && grep -qE "get_dataset\(" "$f" \
              && ! grep -qE "check_dataset_access|check_dataset_write_access|apply_visibility_filter" "$f"; then
              echo "FAIL: $f has route handlers calling get_dataset without an access/visibility check"
              exit 1
            fi
          done
          ' --
        types: [python]
        files: '^backend/app/(modules/catalog|standards)/.*\.py$'

      # --- Lint + format (shift-left; CI backend-lint also enforces these) ---
      - id: ruff-check
        name: "ruff check (backend)"
        language: system
        entry: uv run --project backend ruff check
        types_or: [python, pyi]
        files: '^backend/.*\.py$'
      - id: ruff-format
        name: "ruff format --check (backend)"
        language: system
        entry: uv run --project backend ruff format --check
        types_or: [python, pyi]
        files: '^backend/.*\.py$'

  # --- Generic hygiene + secret scanning ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Auto-fixers — generated/vendored trees excluded so they keep matching their generators.
      - id: trailing-whitespace
        exclude: '(^sdks/|^backend/openapi\.json$|^backend/tests/fixtures/|(^|/)package-lock\.json$|(^|/)uv\.lock$|(^|/)skills-lock\.json$|\.snap$)'
      - id: end-of-file-fixer
        exclude: '(^sdks/|^backend/openapi\.json$|^backend/tests/fixtures/|(^|/)package-lock\.json$|(^|/)uv\.lock$|(^|/)skills-lock\.json$|\.snap$)'
      # Validity / safety checks (non-mutating).
      - id: check-added-large-files
        args: ['--maxkb=2048']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-json
        exclude: '(tsconfig.*\.json$|\.code-workspace$)'   # JSONC (comments) — not strict JSON
      - id: check-toml
      - id: check-yaml
        args: ['--allow-multiple-documents']

  # Secret scanning — guards staged changes against committed credentials.
  # Config + allowlist: .gitleaks.toml. CI also runs a full-tree `gitleaks dir` scan.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
