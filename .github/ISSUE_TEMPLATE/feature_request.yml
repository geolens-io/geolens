name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for GeoLens? We'd love to hear it.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow does it improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search / Catalog
        - Dataset Detail
        - Map Builder
        - Collections
        - Import / Ingestion
        - Admin Panel
        - Sharing / Embed
        - Tiles / Rendering
        - Auth / Permissions
        - API / OGC
        - Infrastructure / Deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to related issues, etc.
    validations:
      required: false
