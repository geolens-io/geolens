name: Prod Compose Smoke

# INST-02 (Phase 1218): pull the PUBLISHED release images and boot
# docker-compose.prod.yml to healthy, then tear down. This catches an
# image/compose combination that parses (CI `installer-test` runs `config -q`)
# but cannot actually start — e.g. a missing baked dependency, a broken
# entrypoint, or a migrate failure that only surfaces at runtime.
#
# Trigger model:
#   - on a release TAG push: smoke that tag's images (publish.yml has just
#     pushed `:vX.Y.Z` + `:latest`).
#   - manual workflow_dispatch: smoke an explicit version, default `latest`.
#
# This job genuinely pulls + boots a real stack. It is intended to run in CI on
# push (tag) / on demand — NOT locally (port collisions with a running stack and
# GHCR pull cost). The cheap parse-only precondition (`config -q`) is covered by
# the always-on `installer-test` job in ci.yml.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Published image tag to smoke (e.g. v1.2.3 or latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prod-smoke:
    name: Pull release images + boot prod compose to healthy
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Resolve image tag to smoke
        id: ver
        run: |
          # On a tag push, github.ref_name is the tag (vX.Y.Z). On manual
          # dispatch, use the input (default latest).
          if [ "${{ github.event_name }}" = "push" ]; then
            VER="${{ github.ref_name }}"
          else
            VER="${{ github.event.inputs.version }}"
          fi
          # publish.yml tags images via `type=semver,pattern={{version}}`, which
          # STRIPS the leading `v` (a `v1.3.0` tag push publishes `geolens-api:1.3.0`).
          # GEOLENS_VERSION is used verbatim as the image tag in compose, so strip
          # the `v` here or the pull asks GHCR for a non-existent `:v1.3.0`.
          VER="${VER#v}"
          echo "version=${VER:-latest}" >> "$GITHUB_OUTPUT"
          echo "Smoking image tag: ${VER:-latest}"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write .env from .env.example
        env:
          GEOLENS_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          cp .env.example .env
          # CI-distinct, non-default secrets. JWT_SECRET_KEY must be >= 32 chars
          # to satisfy the Settings validator (backend/app/config.py).
          sed -i -E 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=geolens_smoke_pw|' .env
          sed -i -E 's|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=prod-smoke-secret-key-padding-32chars-min|' .env
          sed -i -E 's|^GEOLENS_ADMIN_PASSWORD=.*|GEOLENS_ADMIN_PASSWORD=admin|' .env
          # The prebuilt-image path: pin the version + select the prod compose so a
          # bare `docker compose` resolves to the published images.
          {
            echo "GEOLENS_VERSION=${GEOLENS_VERSION}"
            echo "COMPOSE_FILE=docker-compose.prod.yml"
            echo "DATABASE_SSL_MODE=disable"
          } >> .env

      - name: Pull release images
        # `db` is intentionally excluded: docker-compose.prod.yml builds it
        # locally (PostGIS + pgvector, ~20s) and publishes no image, so
        # `compose pull db` errors "no image to pull". The boot step's
        # `up -d --wait` builds it. The rest pull from GHCR.
        #
        # On a release-tag push this workflow races publish.yml (both fire on a
        # `v*` tag push), so the images may not be on GHCR yet. Retry the pull
        # with backoff to let publish.yml finish pushing before we fail — cheaper
        # and simpler than a cross-workflow `workflow_run` dependency, and it still
        # works for manual workflow_dispatch (succeeds on attempt 1).
        #
        # The window MUST exceed publish.yml's full duration: multi-arch buildx +
        # Trivy scan + attestation runs ~12 min, and the v1.3.0 cut FAILED here at
        # the old ~5-min (10×30s) window. Use ~20 min (40×30s) so a tag-push smoke
        # reliably waits out the publish; the job timeout below is raised to match.
        # (On a normal run the images already exist → attempt 1 succeeds, no wait.)
        run: |
          for attempt in $(seq 1 40); do
            if docker compose -f docker-compose.prod.yml pull migrate api worker titiler frontend; then
              echo "Pulled release images on attempt ${attempt}."
              exit 0
            fi
            echo "attempt ${attempt}/40: images not published yet (publish.yml may still be running); retrying in 30s"
            sleep 30
          done
          echo "Release images never became pullable after 40 attempts (~20 min)."
          exit 1

      - name: Boot prod compose to healthy
        # --wait blocks until every service with a healthcheck is healthy and every
        # restart:no one-shot (migrate) has exited 0; it fails non-zero otherwise.
        run: docker compose -f docker-compose.prod.yml up -d --wait --wait-timeout 240

      - name: Assert migrate exited 0
        run: |
          CODE="$(docker inspect -f '{{.State.ExitCode}}' "$(docker compose -f docker-compose.prod.yml ps -aq migrate)")"
          echo "migrate exit code: ${CODE}"
          test "${CODE}" = "0"

      - name: Curl frontend -> /api/health
        run: |
          # The frontend (nginx) is bound to 127.0.0.1:8080 and proxies /api -> api.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health >/tmp/health.json; then
              echo "health OK:"; cat /tmp/health.json; echo
              exit 0
            fi
            echo "attempt ${i}: /api/health not ready yet"; sleep 3
          done
          echo "frontend -> /api/health never returned 200"; exit 1

      # E2E through the PROD reverse proxy: now that the published stack is
      # healthy, drive the existing Playwright audit suite against the prod nginx
      # (127.0.0.1:8080) via E2E_BASE_URL. release.yml is gated on this workflow's
      # success (workflow_run), so a failing tag E2E withholds the GitHub Release
      # (the "latest" pointer the website + release API follow).
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E audit suite through prod proxy
        env:
          E2E_BASE_URL: http://127.0.0.1:8080
          GEOLENS_ADMIN_USERNAME: admin
          GEOLENS_ADMIN_PASSWORD: admin
        run: npm run e2e:smoke:audit

      - name: Upload Playwright test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: prod-smoke-playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: prod-smoke-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Compose logs on failure
        if: failure()
        run: docker compose -f docker-compose.prod.yml logs --tail=200

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
