# Manual-trigger publish workflow for the GeoLens SDKs.
# One-time cold-start credentials required before the first publish:
#   1. PyPI Trusted Publishing configured for `geolens` at https://pypi.org/manage/account/publishing/
#   2. npm granular token (Bypass 2FA + Read/Write) in repo secret NPM_TOKEN
#   3. The @geolens npm org claimed by the maintainer (one-time)
# See docs.getgeolens.com for the full first-publish runbook.
name: Publish SDKs

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which SDK to publish'
        required: true
        type: choice
        options:
          - python
          - typescript
          - both
        default: 'both'
      dry_run:
        description: 'Build only, do not publish'
        required: false
        type: boolean
        default: false
      force_publish:
        description: 'Override pre-flight gate (allow re-publishing over an existing version). Only set true after confirming the existing version is intentionally being re-published.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # for PyPI Trusted Publishing

jobs:
  publish-python:
    if: inputs.target == 'python' || inputs.target == 'both'
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.10.2"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build wheel + sdist
        working-directory: sdks/python
        run: uv build

      - name: List built artifacts
        working-directory: sdks/python
        run: ls -la dist/

      - name: Pre-flight version gate (geolens on PyPI)
        if: ${{ !inputs.dry_run }}
        working-directory: sdks/python
        run: |
          set -e
          PROJECT_NAME=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["name"])
          PY
          )
          PACKAGE_VERSION=$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )
          VERSION_PATTERN=$(printf '%s\n' "$PACKAGE_VERSION" | python -c 'import re, sys; print(re.escape(sys.stdin.read().strip()))')
          if PIP_OUTPUT=$(pip3 index versions "$PROJECT_NAME" 2>&1); then
            echo "$PIP_OUTPUT"
            if echo "$PIP_OUTPUT" | grep -Eq "(^|[ ,(])${VERSION_PATTERN}([, )]|$)"; then
              if [ "${{ inputs.force_publish }}" = "true" ]; then
                echo "::warning::PyPI $PROJECT_NAME already has $PACKAGE_VERSION — force_publish=true override active; proceeding"
              else
                echo "::error::PyPI $PROJECT_NAME already has $PACKAGE_VERSION. Refusing to re-publish without force_publish=true."
                exit 1
              fi
            else
              echo "PyPI $PROJECT_NAME exists but $PACKAGE_VERSION is not present; proceeding with first publish of this version"
            fi
          elif echo "$PIP_OUTPUT" | grep -q "No matching distribution"; then
            echo "PyPI $PROJECT_NAME: unclaimed (safe to publish)"
          elif [ "${{ inputs.force_publish }}" = "true" ]; then
            echo "::warning::PyPI $PROJECT_NAME lookup failed — force_publish=true override active; proceeding"
          else
            echo "::error::Could not determine PyPI state for $PROJECT_NAME:"
            echo "$PIP_OUTPUT"
            exit 1
          fi

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        working-directory: sdks/python
        run: uv publish --trusted-publishing automatic

  publish-typescript:
    if: inputs.target == 'typescript' || inputs.target == 'both'
    name: Publish TypeScript SDK to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      # OIDC Trusted Publishing requires npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm (OIDC trusted publishing support)
        run: npm install -g npm@latest

      - name: Pre-flight version gate (@geolens/sdk on npm)
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          PACKAGE_VERSION=$(node -p "require('./sdks/typescript/package.json').version")
          if CURRENT=$(npm view @geolens/sdk version 2>/dev/null); then
            if [ "${CURRENT}" = "${PACKAGE_VERSION}" ]; then
              if [ "${{ inputs.force_publish }}" = "true" ]; then
                echo "::warning::npm @geolens/sdk already has $PACKAGE_VERSION — force_publish=true override active; proceeding"
              else
                echo "::error::npm @geolens/sdk already has $PACKAGE_VERSION. Refusing to re-publish without force_publish=true."
                exit 1
              fi
            else
              echo "npm @geolens/sdk exists at $CURRENT; proceeding with first publish of $PACKAGE_VERSION"
            fi
          else
            echo "npm @geolens/sdk: unclaimed (safe to publish)"
          fi

      - name: Install dependencies (locked)
        working-directory: sdks/typescript
        run: npm ci

      - name: Build
        working-directory: sdks/typescript
        run: npm run build

      - name: Verify package contents (dry run)
        working-directory: sdks/typescript
        run: npm pack --dry-run

      - name: Publish to npm (OIDC Trusted Publishing)
        if: ${{ !inputs.dry_run }}
        working-directory: sdks/typescript
        # Trusted Publishing: the workflow's `id-token: write` permission plus the npm
        # trusted publisher configured for @geolens/sdk (geolens-io/geolens · this
        # workflow, no environment) let npm authenticate via OIDC — no NPM_TOKEN secret.
        # npm >= 11.5.1 (installed above) also generates + attaches provenance
        # automatically, so no explicit --provenance flag is needed. OIDC + provenance
        # both require a public source repository (it is). `--access public` is kept for
        # the scoped package. NPM_TOKEN secret is now unused (kept as a manual fallback).
        run: npm publish --access public
