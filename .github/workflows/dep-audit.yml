name: Dependency audit

# Added 2026-06-02 (dep-audit). Fails PRs on high/critical CVEs and strong
# copyleft; runs Trivy OS-CVE scans the local audit could not (trivy is not on
# dev machines). Weekly cron catches newly-disclosed CVEs in unchanged deps.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # Monday 08:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-audit:
    name: Python audit (uv)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.11"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - name: Verify lockfile in sync
        run: uv lock --check
      - name: Export locked prod requirements
        run: uv export --locked --no-dev --format requirements-txt -o /tmp/reqs.txt
      - name: pip-audit (OSV + PyPI advisory DB)
        run: uv run --with pip-audit pip-audit -r /tmp/reqs.txt --strict
      - name: License gate (block strong/network copyleft)
        run: uv run --with pip-licenses pip-licenses --fail-on="GPL-3.0-only;GPL-3.0;GPL-2.0;AGPL-3.0;SSPL-1.0;BSL-1.1"

      # Extend the BLOCKING license gate to the CLI + Python SDK (same allowlist).
      # Both ship their own uv.lock; `--project` resolves each locked env.
      - name: License gate — CLI (block strong/network copyleft)
        working-directory: cli
        run: uv run --with pip-licenses pip-licenses --fail-on="GPL-3.0-only;GPL-3.0;GPL-2.0;AGPL-3.0;SSPL-1.0;BSL-1.1"

      - name: License gate — Python SDK (block strong/network copyleft)
        working-directory: sdks/python
        run: uv run --with pip-licenses pip-licenses --fail-on="GPL-3.0-only;GPL-3.0;GPL-2.0;AGPL-3.0;SSPL-1.0;BSL-1.1"

  js-audit:
    name: JS audit (${{ matrix.directory }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory: [".", "frontend", "sdks/typescript"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v6
        with:
          node-version: "24" # CI tooling runner (LTS); build image is node 26
          cache: "npm"
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json
      - name: Install
        working-directory: ${{ matrix.directory }}
        run: npm ci
      - name: npm audit (block high+)
        working-directory: ${{ matrix.directory }}
        run: npm audit --audit-level=high
      - name: License report (advisory — tune allowlist before enforcing)
        working-directory: ${{ matrix.directory }}
        continue-on-error: true
        run: |
          npx --yes license-checker --production --summary || true
          # Hard-gate candidate once the compound-SPDX allowlist is validated:
          # npx license-checker --production --onlyAllow \
          #   'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;CC0-1.0;Unlicense;Python-2.0;PSF-2.0;BlueOak-1.0.0;0BSD;OFL-1.1;MPL-2.0;CUSTOM'

  docker-audit:
    name: Docker image scan (Trivy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `enforce: "1"` fails the job on a fixable CRITICAL CVE; `enforce: "0"`
        # is report-only. The slim/alpine images we pin (node/python/nginx) are
        # controllable — a CRITICAL there is actionable (bump the tag), so they
        # ENFORCE — keep these three pins matched to the Dockerfile `FROM` tags
        # they mirror (bump together). postgis/postgis:17-3.5 is an
        # uncontrollable third-party fat
        # Debian-11 image whose CRITICAL set is dominated by CVEs in baked-in Go
        # binaries that only the upstream maintainer can rebuild — and that set
        # shifts with every Trivy DB update. Gating on it would make CI red on
        # upstream timing, not on our code, so it is scanned + REPORTED but not
        # gated (tracked via Dependabot + this report; revisit at each postgis
        # base bump).
        include:
          - image: "node:26.5.0-alpine"
            enforce: "1"
          - image: "python:3.14.6-slim"
            enforce: "1"
          - image: "nginxinc/nginx-unprivileged:1.31.1-alpine"
            enforce: "1"
          - image: "postgis/postgis:17-3.5"
            enforce: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # Scope is CRITICAL (not HIGH): these scan UPSTREAM base images, whose HIGH
      # OS-CVE count churns with every Debian/Alpine disclosure independent of our
      # code — gating on HIGH would red the build on upstream timing. The built
      # images also run `apt-get upgrade`/`apk upgrade`, lowering real exposure,
      # and HIGH base CVEs are tracked via Dependabot. ignore-unfixed:true keeps
      # the gate quiet for CVEs with no upstream fix. Per-image `enforce` above
      # decides gate-vs-report. Transient Docker Hub i/o timeouts are not CVEs —
      # rerun the job.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: "table"
          severity: "CRITICAL"
          exit-code: ${{ matrix.enforce }}
          ignore-unfixed: true
          # Scoped, justified CVE suppressions only (see .trivyignore.yaml's
          # `vulnerabilities:` section). Trivy <0.71 does not auto-detect the YAML
          # ignore file, so point at it explicitly.
          trivyignores: ".trivyignore.yaml"

  iac-scan:
    name: IaC config scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # Enforcing gate: Trivy config mode auto-detects Dockerfiles,
      # docker-compose*.yml, and nginx config at the repo root; fails the job on
      # any CRITICAL or HIGH misconfiguration finding. ignore-unfixed is inert for
      # config/misconfiguration scans (no fixed-version concept) — severity scope
      # alone bounds noise. The Helm chart lives in the sibling geolens-deployments
      # repo (geolens-helm is archived) — out of scope here.
      - name: Trivy config scan (enforcing)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          # Path-scoped, justified suppressions only (db/Dockerfile postgres root
          # user — see .trivyignore.yaml). Trivy <0.71 does not auto-detect the
          # YAML ignore file, so point at it explicitly. DS-0002 stays enforced
          # on every other Dockerfile.
          trivyignores: ".trivyignore.yaml"
