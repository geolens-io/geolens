name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly E2E signal without per-PR cost: the e2e-test job below runs ONLY on
  # `schedule`/`workflow_dispatch` (it stays skipped on push/PR), so this cron
  # gives a recurring browser-suite signal while keeping the free-tier Actions
  # budget at zero for routine pushes and PRs.
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# OCG-04: Single source-of-truth for the pinned geolens-enterprise ref.
# Update this SHA when either side bumps EXTENSION_API_VERSION (core constant:
# backend/app/platform/extensions/version.py) and re-verify the enterprise
# suite passes against core before merging. Companion to the EXTENSION_API_VERSION
# fail-loud loader check introduced in Plan 1206-01.
env:
  # geolens-enterprise origin/main as of 2026-06-14; core@1206 re-verified GREEN
  # against this ref (load_extensions boots, EnterprisePermissionExtension resolves,
  # legacy EXTENSION_API_VERSION tolerated, test_saml_overlay.py 21 passed).
  ENTERPRISE_PINNED_REF: "af12809713a5a2f481d90c9d5c65a8e2bae888bc"

# Least-privilege default for every job. The `changes` job widens to add
# pull-requests:read; no job needs write (publishing lives in publish*.yml).
permissions:
  contents: read

jobs:
  # ---------- detect changed paths for conditional jobs ----------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      cli: ${{ steps.filter.outputs.cli }}
      alembic: ${{ steps.filter.outputs.alembic }}
      installer: ${{ steps.filter.outputs.installer }}
      backup: ${{ steps.filter.outputs.backup }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              # Files the backend introspection tests (test_phase_27*) assert
              # against — a change here can break Backend Tests, so they must
              # run on PRs that touch these even with no backend/** change.
              - 'README.md'
              - 'frontend/README.md'
              - 'CHANGELOG.md'
              - '.env.example'
              - '.dockerignore'
              - 'nginx.conf'
              - 'db/**'
            frontend:
              - 'frontend/**'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              - 'playwright.builder-hardening.config.ts'
              - 'docker-compose*.yml'
            cli:
              - 'cli/**'
              - 'sdks/python/**'
            alembic:
              - 'backend/alembic/**'
              - 'backend/scripts/test_alembic_upgrade_clean_db.sh'
              # OCG-02: backend/app/models/** was deleted in b63803c1; replaced
              # with the real model layout so model-only PRs still trigger alembic
              # check (blocks Phase-1207 dormant-tenant_id migration drift gate).
              - 'backend/app/**/models.py'
              - 'backend/app/core/db/models.py'
              - 'backend/app/processing/**/models.py'
              - 'db/**'
            installer:
              - 'scripts/install.sh'
              - 'scripts/backup-entrypoint.sh'
              - 'scripts/tests/test-install-tag-resolution.sh'
              - 'scripts/tests/test-install-secret-generation.sh'
              - 'scripts/tests/test-install-main-wrapper.sh'
              - 'scripts/tests/test-backup-s3-signature.sh'
              - 'scripts/check_env_doc_drift.py'
              - '.env.example'
              - 'docker-compose.yml'
              - 'docker-compose.prod.yml'
            backup:
              - 'scripts/backup-entrypoint.sh'
              - 'scripts/restore.sh'
              - 'scripts/tests/test-backup-restore-roundtrip.sh'
              - 'docker-compose.prod.yml'

  # ---------- backend ----------
  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # TSEAM-03 (Phase 1207-02): no third "cloud" edition.
      # Edition stays binary (community|enterprise); cloud IS enterprise in
      # multi_tenant mode.  A literal 'cloud' token in edition.py or
      # license.py would re-introduce a third-edition axis (KISS Rule 1).
      # `grep -nE` returns exit 0 on a match (which is a FAIL for us) and
      # exit 1 on no match (which is our SUCCESS) — flip semantics with `!`.
      - name: TSEAM-03 — no literal 'cloud' edition token in core/edition.py or core/license.py
        run: |
          if grep -nE "['\"]cloud['\"]" app/core/edition.py app/core/license.py; then
            echo "FAIL: Found a literal 'cloud' edition token — edition must stay binary (community|enterprise). TSEAM-03"
            exit 1
          fi
          echo "OK: no 'cloud' edition literal in core/edition.py or core/license.py"

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      # Security guardrails (SSRF/IDOR) + generic hygiene. Ruff is covered by the
      # backend-lint job; gitleaks runs as a dedicated full-tree scan below (the
      # pre-commit gitleaks hook only inspects staged diffs).
      - name: Run pre-commit hooks
        env:
          SKIP: ruff-check,ruff-format,gitleaks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Install gitleaks
        run: |
          GL=8.30.1
          GL_SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          echo "${GL_SHA256}  gitleaks.tar.gz" | sha256sum --check --strict
          tar -xz -f gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Secret scan (tracked tree)
        run: gitleaks dir . -c .gitleaks.toml --redact --no-banner

  # ---------- installer ----------
  # Regression guard for the release-tag checkout in scripts/install.sh: a remote
  # branch named identically to a release tag must not shadow the tag. Pure
  # shell + git (no Docker/DB), so it is fast and only runs when the installer or
  # its test changes.
  installer-test:
    name: Installer Tag Resolution
    needs: changes
    if: needs.changes.outputs.installer == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Tag/branch shadowing regression test
        run: sh scripts/tests/test-install-tag-resolution.sh

      - name: Installer secret-generation regression test
        run: sh scripts/tests/test-install-secret-generation.sh

      - name: Installer main() wrapper regression test
        run: sh scripts/tests/test-install-main-wrapper.sh

      - name: Backup S3 signature regression test
        run: sh scripts/tests/test-backup-s3-signature.sh

      - name: Env-doc-drift gate (install.sh keys documented in .env.example)
        run: python3 scripts/check_env_doc_drift.py

      - name: Validate compose files parse
        env:
          GEOLENS_VERSION: 0.0.0-ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          JWT_SECRET_KEY: ci-compose-validate-padding-32chars
          GEOLENS_ADMIN_USERNAME: admin
          GEOLENS_ADMIN_PASSWORD: admin
          MINIO_ROOT_USER: ci
          MINIO_ROOT_PASSWORD: ci-padding
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.prod.yml config -q

  # ---------- backup + restore round-trip (BKP-04) ----------
  # Full DR path: pg_dump -Fc → upload to S3 (MinIO) → download → pg_restore →
  # row-count assert, plus the object-storage (upload_staging) tar round-trip.
  # The same row-match logic runs locally via
  # scripts/tests/test-backup-restore-roundtrip.sh (DB + tar only, no S3); this
  # job adds the S3/MinIO offset leg, which is CI-on-push only.
  backup-roundtrip:
    name: Backup Restore Round-trip
    needs: changes
    if: needs.changes.outputs.backup == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: geolens
      PGPASSWORD: geolens_test
      S3_BUCKET: geolens-backups-ci
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: geolens
          POSTGRES_PASSWORD: geolens_test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U geolens -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        # bitnami/minio:* tags were withdrawn in Bitnami's Aug-2025 "Secure
        # Images" migration (all bitnami/minio:<tag> now 404). The last free
        # build lives under bitnamilegacy/, pinned here by digest for
        # reproducibility (auto-runs `minio server` + ships `mc` for the
        # healthcheck — the test creates its own bucket via `aws s3 mb`).
        image: bitnamilegacy/minio@sha256:451fe6858cb770cc9d0e77ba811ce287420f781c7c1b806a386f6896471a349c
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: geolens-backups-ci
        ports:
          - 9000:9000
        options: >-
          --health-cmd "mc ready local || curl -sf http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install postgresql-client + tooling
        run: |
          # The postgres service for this job is postgis/postgis:17-3.5 (PG17).
          # Ubuntu 24.04 (noble) ships postgresql-client 16 by default, and pg_dump
          # refuses to dump a newer server ("aborting because of server version
          # mismatch"), so add the PGDG apt repo and install the matching v17
          # client (pg_dump/pg_restore/psql/createdb/dropdb).
          #
          # awscli is intentionally NOT installed: it was dropped from the noble
          # apt archive ("no installation candidate") and AWS CLI v2 is already
          # preinstalled on the ubuntu-latest runner (the only `aws` use is
          # `s3 mb/cp` against MinIO in the S3-offset step below).
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-17 curl

      - name: Local round-trip (DB + staging tar, no S3)
        env:
          # Point the standalone script at the CI Postgres service.
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: geolens
          POSTGRES_PASSWORD: geolens_test
          POSTGRES_DB: postgres
        run: |
          # Skip .env.test sourcing inside CI by passing connection via env; the
          # script falls back to env vars when .env.test is absent. CI checkout
          # ships .env.test, so override the host/port to the service container.
          bash scripts/tests/test-backup-restore-roundtrip.sh

      - name: Full S3 offset round-trip (pg_dump → MinIO → download → pg_restore)
        run: |
          set -euo pipefail
          export AWS_ACCESS_KEY_ID="$S3_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$S3_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION=us-east-1
          AWS="aws --endpoint-url $S3_ENDPOINT"

          SRC=geolens_s3_src_$$
          DST=geolens_s3_dst_$$
          createdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" "$SRC"
          psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$SRC" -v ON_ERROR_STOP=1 -c \
            "CREATE SCHEMA IF NOT EXISTS catalog;
             CREATE TABLE catalog.records (id serial PRIMARY KEY, name text);
             INSERT INTO catalog.records (name) SELECT 'r-'||g FROM generate_series(1, 91) g;"
          SRC_N=$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$SRC" -tAc "SELECT COUNT(*) FROM catalog.records;")

          pg_dump -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$SRC" -Fc --no-owner --no-acl -f /tmp/s3.dump
          $AWS s3 mb "s3://$S3_BUCKET" 2>/dev/null || true
          $AWS s3 cp /tmp/s3.dump "s3://$S3_BUCKET/daily/s3.dump"

          # staging tar to S3 too
          mkdir -p /tmp/staging/nested
          echo cog > /tmp/staging/a.tif; echo fgb > /tmp/staging/nested/b.fgb
          tar czf /tmp/staging.tar.gz -C /tmp/staging .
          $AWS s3 cp /tmp/staging.tar.gz "s3://$S3_BUCKET/daily/staging.tar.gz"

          # Download both back and restore into a fresh DB
          $AWS s3 cp "s3://$S3_BUCKET/daily/s3.dump" /tmp/s3-dl.dump
          $AWS s3 cp "s3://$S3_BUCKET/daily/staging.tar.gz" /tmp/staging-dl.tar.gz
          pg_restore --list /tmp/s3-dl.dump >/dev/null
          createdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" "$DST"
          pg_restore -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$DST" --clean --if-exists --no-owner /tmp/s3-dl.dump || true
          DST_N=$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$DST" -tAc "SELECT COUNT(*) FROM catalog.records;")

          mkdir -p /tmp/staging-out && tar xzf /tmp/staging-dl.tar.gz -C /tmp/staging-out
          diff -r /tmp/staging /tmp/staging-out

          echo "S3 round-trip counts: src=$SRC_N dst=$DST_N"
          [ "$SRC_N" = "$DST_N" ] || { echo "FAIL: S3 round-trip row count mismatch"; exit 1; }
          dropdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" --if-exists "$SRC"
          dropdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" --if-exists "$DST"
          echo "PASS: full S3/MinIO backup+restore round-trip"

  openapi-snapshot:
    name: OpenAPI Snapshot Drift
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Padding values to satisfy app.core.config.Settings() validation —
      # this job imports the FastAPI app to dump the schema; it never
      # connects to a DB or runs admin auth.
      JWT_SECRET_KEY: openapi-snapshot-padding-key-32chars
      POSTGRES_PASSWORD: ci-padding-no-db
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: admin
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Verify openapi.json is up to date
        run: uv run python scripts/dump_openapi.py --check

  sdks-check:
    name: SDKs Drift Gate
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Match the OpenAPI snapshot job's env so dump_openapi.py runs
      JWT_SECRET_KEY: sdks-check-padding-key-32characters-here
      POSTGRES_PASSWORD: ci-padding-no-db
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: admin
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Install backend dependencies (for dump_openapi.py)
        working-directory: backend
        run: uv sync --locked --dev

      - name: Install TypeScript SDK dependencies (locked)
        working-directory: sdks/typescript
        run: npm ci

      - name: Regenerate SDKs and check for drift
        run: make sdks-check

  # ---------- version coherence ----------
  # REL-04: assert every version site agrees (backend/cli/sdks×2/root+frontend
  # package.json/openapi.json info.version/main.py fallback constant). Blocks a
  # release where one site silently drifted from the rest. Pure stdlib (tomllib
  # + json + re); no DB, no Docker, runs on every push/PR.
  version-coherence:
    name: Version Coherence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Check all version sites agree
        run: python scripts/check_version_coherence.py

  # ---------- CLI ----------
  # Structural enforcement that the CLI never grows
  # a direct httpx/requests dependency. Runs on cli/** OR sdks/python/**
  # changes (the SDK is the CLI's only HTTP surface — a regression in the
  # SDK can ripple into the CLI through a behavior change in the wrapper).
  cli-test:
    name: CLI Tests
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # CLI round-trip tests import the FastAPI app and exercise DB-backed
      # routes; point the test lifecycle at the local CI PostgreSQL container.
      JWT_SECRET_KEY: cli-test-padding-key-32characters-here
      POSTGRES_USER: geolens
      POSTGRES_PASSWORD: geolens_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: admin
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Start PostgreSQL with PostGIS + pgvector
        working-directory: .
        run: |
          docker build -t geolens-cli-test-db -f - . <<'DOCKERFILE'
          FROM postgis/postgis:17-3.5
          RUN apt-get update \
              && apt-get install -y --no-install-recommends postgresql-17-pgvector \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run -d --name cli-test-postgres \
            -e POSTGRES_DB=postgres \
            -e POSTGRES_USER=geolens \
            -e POSTGRES_PASSWORD=geolens_test \
            -p 5432:5432 \
            geolens-cli-test-db
          for i in $(seq 1 30); do
            if docker exec cli-test-postgres pg_isready -U geolens -d postgres >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      # Install backend + SDK + CLI editable into ONE shared venv
      # (backend/.venv). The round-trip test in backend/tests/ imports
      # geolens_cli, so all three packages need to coexist in the env
      # that pytest uses. Using `uv pip install -e ../...` from backend/
      # places SDK + CLI editable into backend's venv (uv-sources in
      # cli/pyproject.toml resolves the geolens SDK dep against the
      # local sibling tree.
      - name: Install backend + SDK + CLI into shared venv
        working-directory: backend
        run: |
          uv sync --locked --dev
          uv pip install -e ../sdks/python
          uv pip install -e "../cli[dev]"

      # OCCLI-06 structural gate (1/2): no direct httpx/requests imports.
      # `grep -rE` returns exit 1 when no matches → success for us; flip
      # to fail if we DID match.
      - name: OCCLI-06 — no httpx/requests imports in cli/geolens_cli/
        working-directory: cli
        run: |
          if grep -rE '^(import|from) (httpx|requests)' geolens_cli/; then
            echo "FAIL: CLI imports httpx or requests directly (OCCLI-06)"
            exit 1
          fi
          echo "OK: zero direct httpx/requests imports in cli/geolens_cli/"

      # OCCLI-06 structural gate (2/2): cli/pyproject.toml declares no
      # httpx or requests dep (transitive via the geolens SDK is fine).
      # Use system python (not `uv run`) — the script only needs stdlib
      # tomllib, and `uv run` from cli/ would force a separate cli/.venv
      # resolution distinct from the shared backend/.venv used elsewhere.
      - name: OCCLI-06 — no httpx/requests in cli/pyproject.toml deps
        working-directory: cli
        run: |
          python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          deps = d['project']['dependencies']
          forbidden = [x for x in deps if 'httpx' in x or 'requests' in x]
          assert not forbidden, f'FAIL: cli/pyproject.toml declares forbidden direct deps: {forbidden}'
          print('OK: no httpx/requests direct deps in cli/pyproject.toml')
          "

      - name: Manifest CLI contract tests
        working-directory: cli
        run: |
          uv run --project ../backend pytest -v \
            tests/test_manifest_schema.py \
            tests/test_manifest_validate.py \
            tests/test_manifest_apply.py \
            tests/test_manifest_examples.py \
            tests/test_manifest_cli_offline.py

      # CLI unit tests: run from cli/ so pytest picks up cli/pyproject.toml's
      # [tool.pytest.ini_options] testpaths, but use the SHARED backend venv
      # (which has cli + sdk + cli's deps installed editable) via
      # `--project ../backend` so pytest doesn't try to resolve a fresh
      # cli/.venv from PyPI.
      - name: CLI unit tests
        working-directory: cli
        run: uv run --project ../backend pytest -v

      - name: Manifest CLI round-trip contract test
        working-directory: backend
        run: uv run pytest tests/test_cli_round_trip.py::TestManifestApplyRoundTrip -v

      - name: CLI round-trip integration test
        working-directory: backend
        run: uv run pytest tests/test_cli_round_trip.py -v

  backend-test:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_USER: geolens
      POSTGRES_PASSWORD: geolens_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      # Must be ≥ 32 chars to satisfy the Settings validator (backend/app/config.py).
      JWT_SECRET_KEY: test-secret-key-for-ci-padding-32chars
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: admin
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Probe enterprise token availability
        env:
          ENTERPRISE_TOKEN: ${{ secrets.GEOLENS_ENTERPRISE_TOKEN }}
        run: |
          if [ -n "${ENTERPRISE_TOKEN}" ]; then
            echo "HAS_ENTERPRISE_TOKEN=1" >> $GITHUB_ENV
          else
            echo "HAS_ENTERPRISE_TOKEN=0" >> $GITHUB_ENV
          fi

      - name: Checkout geolens-enterprise (skip on fork PRs without secret)
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          repository: geolens-io/geolens-enterprise
          token: ${{ secrets.GEOLENS_ENTERPRISE_TOKEN }}
          path: geolens-enterprise
          # OCG-04: pinned to a tested ref so a moving enterprise main cannot
          # silently skew the tested combination. Re-pin + re-verify when either
          # geolens-enterprise OR core bumps EXTENSION_API_VERSION.
          # Ref value is declared once at the workflow env level (ENTERPRISE_PINNED_REF).
          ref: ${{ env.ENTERPRISE_PINNED_REF }}
          persist-credentials: false

      - name: Start PostgreSQL with PostGIS + pgvector
        working-directory: .
        run: |
          docker build -t geolens-test-db -f - . <<'DOCKERFILE'
          FROM postgis/postgis:17-3.5
          RUN apt-get update \
              && apt-get install -y --no-install-recommends postgresql-17-pgvector \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run -d --name test-postgres \
            -e POSTGRES_DB=postgres \
            -e POSTGRES_USER=geolens \
            -e POSTGRES_PASSWORD=geolens_test \
            -p 5432:5432 \
            geolens-test-db
          for i in $(seq 1 30); do
            if docker exec test-postgres pg_isready -U geolens -d postgres >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gdal-bin xmlsec1

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Install enterprise overlay (if available)
        run: |
          if [ -d "../geolens-enterprise" ] && [ -f "../geolens-enterprise/pyproject.toml" ]; then
            uv add --editable ../geolens-enterprise
            # pysaml2 7.5.4 can resolve pyOpenSSL 22.x, which breaks against
            # the backend's patched cryptography line in CI. Force a compatible
            # runtime wheel after installing the editable overlay and keep uv
            # from syncing the resolver's stale transitive choice back in.
            uv pip install "pyOpenSSL>=25.3.0"
            echo "UV_NO_SYNC=1" >> $GITHUB_ENV
            echo "OVERLAY_INSTALLED=1" >> $GITHUB_ENV
            echo "geolens-enterprise installed; lifecycle marker will be collected"
          else
            echo "OVERLAY_INSTALLED=0" >> $GITHUB_ENV
            echo "geolens-enterprise not available (fork PR or missing GEOLENS_ENTERPRISE_TOKEN secret) -- lifecycle marker deselected"
          fi

      - name: Set up database extensions, roles, and schemas
        run: |
          PGPASSWORD=geolens_test psql -h localhost -U geolens -d postgres -c "
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS unaccent;
            CREATE SCHEMA IF NOT EXISTS catalog;
            CREATE SCHEMA IF NOT EXISTS data;
            ALTER DATABASE postgres SET search_path TO catalog, data, public;
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'geolens_reader') THEN
                CREATE ROLE geolens_reader NOLOGIN;
              END IF;
            END \$\$;
            GRANT USAGE ON SCHEMA data TO geolens_reader;
            ALTER DEFAULT PRIVILEGES IN SCHEMA data GRANT SELECT ON TABLES TO geolens_reader;
          "

      - name: Run migrations
        # `heads` (plural) applies every branch head — with the enterprise
        # overlay present in CI the graph has two (core 0007 + enterprise e002),
        # and bare `head` errors "Multiple head revisions present". OSS-only is
        # unaffected (heads == head). Mirrors the migrate service + MIG-04 job.
        run: uv run alembic upgrade heads

      - name: Normalize search_path for the drift check (MIG-03)
        # `alembic check` reflects the live schema and diffs it against the ORM
        # metadata. Our models are explicitly schema-qualified
        # (`__table_args__ = {"schema": "catalog"}`) and env.py runs the check with
        # include_schemas=True. The setup step set the postgres DB default
        # search_path to `catalog, data, public` — with catalog FIRST it is the
        # connection-default schema, so alembic reflects every catalog table under
        # the unqualified/None key while the metadata is keyed under explicit
        # `catalog`. They never match, so `alembic check` reports ALL tables as
        # add_table (a wholesale empty-reflection false positive, NOT real drift).
        # Dropping catalog from the default (keeping data, public) makes reflection
        # key catalog tables under `catalog`, matching the qualified metadata, so
        # the gate fires only on REAL drift. Migrations are unaffected: each is
        # schema-qualified and 0002_procrastinate sets its own search_path, so they
        # already ran above under `catalog, data, public`.
        run: |
          PGPASSWORD=geolens_test psql -h localhost -U geolens -d postgres -c \
            "ALTER DATABASE postgres SET search_path TO data, public;"

      # MIG-03: autogenerate drift gate. With the DB now at head, `alembic check`
      # exits non-zero if the ORM models have drifted from the migration scripts
      # (e.g. a model column added without a matching migration). env.py's
      # include_object filter hides the enterprise-overlay SAML columns when no
      # overlay is discovered, so this gate is clean on OSS-only runs and only
      # fires on REAL drift. Companion to the `make alembic-check` one-liner.
      - name: Alembic drift check (MIG-03)
        run: uv run alembic check

      - name: Manifest backend apply contract tests
        run: |
          uv run pytest -v \
            tests/test_manifest_apply_api.py \
            tests/test_manifest_apply_service.py \
            tests/test_manifest_apply_vrt.py \
            tests/test_manifest_apply_roundtrip.py \
            tests/test_layering.py::test_manifest_apply_backend_has_no_cli_sdk_or_enterprise_imports \
            tests/test_layering.py::test_manifest_apply_router_uses_upload_permission

      - name: Run tests with coverage
        # --cov-fail-under=58.5 is the CI floor. backend/pyproject.toml declares
        # fail_under=60; the two are intentionally NOT yet aligned here — raising
        # the CI gate above measured coverage would RED main. Bump this to 60 only
        # after a measured run confirms real coverage >= 60 (the overlay-installed
        # run on push is the one to read).
        run: |
          if [ "${OVERLAY_INSTALLED:-0}" = "1" ]; then
            echo "Running pytest with lifecycle marker INCLUDED (overlay installed)"
            uv run pytest -v --tb=short -m 'not perf' --cov=app --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml:coverage.xml --cov-fail-under=58.5
          else
            echo "Running pytest with lifecycle marker DESELECTED (overlay unavailable on fork PR)"
            uv run pytest -v --tb=short -m 'not perf and not lifecycle' --cov=app --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml:coverage.xml --cov-fail-under=58.5
          fi

      - name: Verify SAML fixtures unchanged after pytest
        run: |
          # Catch BOTH modified-tracked-files (the original regression) AND
          # newly-created fixture files like idp_response_*.xml.b64 — those
          # are untracked after the originals were renamed to .template,
          # and `git diff --quiet` would silently miss them.
          DIRTY=$(git status --porcelain -- tests/fixtures/saml/)
          if [ -n "$DIRTY" ]; then
            echo "::error::SAML fixture dir mutated by pytest run -- regression of phase 227 (saml-test-fixture-tmp-path)."
            echo "$DIRTY"
            git diff --stat -- tests/fixtures/saml/
            git diff -- tests/fixtures/saml/ | head -200
            exit 1
          fi

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 14

  # ---------- alembic clean-DB upgrade smoke ----------
  # Exercise the full migration chain against a freshly-initialized PostGIS
  # container via the clean-DB upgrade
  # script. Builds the project's custom PostGIS+pgvector image, spins up a
  # throwaway DB, and runs `alembic upgrade head` from a clean state.
  # Catches migration-on-clean-DB breakage that the backend-test job can miss
  # because backend-test runs migrations on a DB that already saw earlier
  # migrations in test scope.
  alembic-clean-db:
    name: Alembic Clean-DB Upgrade
    needs: changes
    if: needs.changes.outputs.alembic == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Run alembic clean-DB upgrade smoke
        run: ./backend/scripts/test_alembic_upgrade_clean_db.sh
        env:
          # The script reads these for the throwaway container; explicit
          # is better than relying on bash defaults.
          ALEMBIC_TEST_DB_PORT: 54399
          ALEMBIC_TEST_TIMEOUT: 90

  # ---------- MIG-04: enterprise heads-plural upgrade against a clean DB ----------
  # With the enterprise overlay installed the migration graph forks into TWO
  # heads (core 0007_tenant_data_schemas + enterprise e002_add_saml_columns).
  # `alembic upgrade heads` (PLURAL) must apply BOTH chains; this job asserts
  # the production CLI command (exactly what the docker-compose `migrate`
  # service runs) does so against a clean Postgres and that the enterprise SAML
  # column actually lands. It guards the MIG-04 env.py fix that propagates the
  # overlay version dirs onto the live ScriptDirectory the CLI constructs —
  # without it, `alembic upgrade heads` silently applies only the core head and
  # skips the e-chain, breaking SAML login on enterprise deployments.
  #
  # Mirrors the backend-test job's overlay-install pattern (token probe + pinned
  # ref checkout + `uv add --editable`). Skips cleanly on fork PRs without the
  # GEOLENS_ENTERPRISE_TOKEN secret (the overlay is private). References: MIG-04.
  alembic-enterprise-heads:
    name: Alembic Enterprise Heads (MIG-04)
    needs: changes
    if: needs.changes.outputs.alembic == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_USER: geolens
      POSTGRES_PASSWORD: geolens_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      DATABASE_SSL_MODE: disable
      JWT_SECRET_KEY: test-secret-key-for-ci-padding-32chars
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: admin
      GEOLENS_EDITION: enterprise
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Probe enterprise token availability
        env:
          ENTERPRISE_TOKEN: ${{ secrets.GEOLENS_ENTERPRISE_TOKEN }}
        run: |
          if [ -n "${ENTERPRISE_TOKEN}" ]; then
            echo "HAS_ENTERPRISE_TOKEN=1" >> $GITHUB_ENV
          else
            echo "HAS_ENTERPRISE_TOKEN=0" >> $GITHUB_ENV
          fi

      - name: Checkout geolens-enterprise (skip on fork PRs without secret)
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          repository: geolens-io/geolens-enterprise
          token: ${{ secrets.GEOLENS_ENTERPRISE_TOKEN }}
          path: geolens-enterprise
          # OCG-04: pinned to the same tested ref as the backend-test job.
          ref: ${{ env.ENTERPRISE_PINNED_REF }}
          persist-credentials: false

      - name: Skip notice (no enterprise overlay available)
        if: env.HAS_ENTERPRISE_TOKEN != '1'
        run: echo "geolens-enterprise unavailable (fork PR or missing GEOLENS_ENTERPRISE_TOKEN) — MIG-04 enterprise heads-plural job skipped."

      - name: Start PostgreSQL with PostGIS + pgvector
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        working-directory: .
        run: |
          docker build -t geolens-test-db -f - . <<'DOCKERFILE'
          FROM postgis/postgis:17-3.5
          RUN apt-get update \
              && apt-get install -y --no-install-recommends postgresql-17-pgvector \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run -d --name test-postgres \
            -e POSTGRES_DB=postgres \
            -e POSTGRES_USER=geolens \
            -e POSTGRES_PASSWORD=geolens_test \
            -p 5432:5432 \
            geolens-test-db
          for i in $(seq 1 30); do
            if docker exec test-postgres pg_isready -U geolens -d postgres >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        with:
          python-version: "3.13"

      - name: Install system dependencies
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        run: sudo apt-get update && sudo apt-get install -y gdal-bin xmlsec1 postgresql-client

      - name: Install Python dependencies + enterprise overlay
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        run: |
          uv sync --locked --dev
          uv add --editable ../geolens-enterprise
          # Match backend-test: keep a CI-compatible pyOpenSSL after the overlay
          # pulls pysaml2's transitive choice.
          uv pip install "pyOpenSSL>=25.3.0"

      - name: Set up database extensions and schemas
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        run: |
          PGPASSWORD=geolens_test psql -h localhost -U geolens -d postgres -c "
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS unaccent;
            CREATE SCHEMA IF NOT EXISTS catalog;
            CREATE SCHEMA IF NOT EXISTS data;
          "

      - name: Alembic upgrade heads (PLURAL) — apply core + enterprise chains
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        run: uv run --no-dev alembic upgrade heads

      - name: Assert BOTH heads applied + SAML column present
        if: env.HAS_ENTERPRISE_TOKEN == '1'
        run: |
          set -euo pipefail
          echo "==> applied heads in catalog.alembic_version:"
          HEADS=$(PGPASSWORD=geolens_test psql -h localhost -U geolens -d postgres -tAc \
            "SELECT version_num FROM catalog.alembic_version ORDER BY 1;")
          echo "${HEADS}"
          # Expect exactly two heads: the core head + enterprise e002. The core
          # head revision is intentionally NOT hardcoded — it advances with every
          # core migration (e.g. 0007 -> 0008_oauth_saml_columns), and hardcoding it
          # made this gate break on every unrelated core migration. Assert "a
          # non-e002 head exists" instead of pinning a specific revision.
          COUNT=$(printf '%s\n' "${HEADS}" | grep -c . || true)
          if [ "${COUNT}" -ne 2 ]; then
            echo "FAIL: expected 2 applied heads (core + enterprise), got ${COUNT}." >&2
            echo "      'alembic upgrade heads' did not apply the enterprise e-chain (MIG-04)." >&2
            exit 1
          fi
          echo "${HEADS}" | grep -q "e002_add_saml_columns" || { echo "FAIL: enterprise head e002 missing" >&2; exit 1; }
          CORE_HEAD=$(printf '%s\n' "${HEADS}" | grep -v "e002_add_saml_columns" || true)
          [ -n "${CORE_HEAD}" ] || { echo "FAIL: core head missing (only e002 applied)" >&2; exit 1; }
          echo "core head applied: ${CORE_HEAD}"
          # Affirmative schema assertion: the SAML column must exist. As of
          # 0008_oauth_saml_columns it is created by BOTH the core chain (for OSS)
          # and enterprise e002 (idempotent ADD COLUMN IF NOT EXISTS), so this holds
          # regardless of which migration applied it first.
          SAML=$(PGPASSWORD=geolens_test psql -h localhost -U geolens -d postgres -tAc \
            "SELECT count(*) FROM information_schema.columns WHERE table_schema='catalog' AND table_name='oauth_providers' AND column_name='idp_entity_id';")
          if [ "${SAML}" != "1" ]; then
            echo "FAIL: SAML column catalog.oauth_providers.idp_entity_id absent (got count=${SAML})." >&2
            exit 1
          fi
          echo "OK: both heads applied (core ${CORE_HEAD} + e002) and SAML column present (MIG-04)."

  # ---------- pytest parallel-isolation gate ----------
  # Defends the fixture-isolation fixes against regression.
  # Runs `pytest -n 4` against the backend test suite (the known residual
  # failures are a tracked flake-class, not regressions from this gate).
  # The `-n 4` value was chosen from local xdist performance benchmarking.
  # Sister-shape to alembic-clean-db (line 462).
  pytest-parallel-isolation:
    name: Pytest Parallel Isolation
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.alembic == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_USER: geolens
      POSTGRES_PASSWORD: geolens_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      # Must be ≥ 32 chars to satisfy the Settings validator (backend/app/config.py).
      JWT_SECRET_KEY: test-secret-key-for-ci-padding-32chars
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: admin
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Start PostgreSQL with PostGIS + pgvector
        working-directory: .
        run: |
          docker build -t geolens-test-db -f - . <<'DOCKERFILE'
          FROM postgis/postgis:17-3.5
          RUN apt-get update \
              && apt-get install -y --no-install-recommends postgresql-17-pgvector \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run -d --name test-postgres \
            -e POSTGRES_DB=postgres \
            -e POSTGRES_USER=geolens \
            -e POSTGRES_PASSWORD=geolens_test \
            -p 5432:5432 \
            geolens-test-db
          for i in $(seq 1 30); do
            if docker exec test-postgres pg_isready -U geolens -d postgres >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gdal-bin xmlsec1

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Set up database extensions, roles, and schemas
        run: |
          PGPASSWORD=geolens_test psql -h localhost -U geolens -d postgres -c "
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS unaccent;
            CREATE SCHEMA IF NOT EXISTS catalog;
            CREATE SCHEMA IF NOT EXISTS data;
            ALTER DATABASE postgres SET search_path TO catalog, data, public;
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'geolens_reader') THEN
                CREATE ROLE geolens_reader NOLOGIN;
              END IF;
            END \$\$;
            GRANT USAGE ON SCHEMA data TO geolens_reader;
            ALTER DEFAULT PRIVILEGES IN SCHEMA data GRANT SELECT ON TABLES TO geolens_reader;
          "

      - name: Run migrations
        # `heads` (plural) applies every branch head — with the enterprise
        # overlay present in CI the graph has two (core 0007 + enterprise e002),
        # and bare `head` errors "Multiple head revisions present". OSS-only is
        # unaffected (heads == head). Mirrors the migrate service + MIG-04 job.
        run: uv run alembic upgrade heads

      - name: Run tests with -n 4
        # Regression gate for the fixture-isolation work.
        # The `-n 4` value was chosen from local xdist performance benchmarking.
        # No coverage flags here — backend-test job already covers coverage; this job is a regression gate only.
        # Skips the enterprise overlay (simpler is better; overlay-specific fixture races
        # are tracked separately if they surface).
        run: uv run pytest -n 4 -v --tb=short -m 'not perf'

  # ---------- frontend ----------
  frontend-lint:
    name: Frontend Lint & Typecheck
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Locale parity
        run: npm run test:i18n

      - name: Changed namespaces exist in all languages
        run: npm run check:i18n:changed

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ---------- license-check ----------
  # Non-blocking license-checker against the
  # frontend dependency tree. Failure does not block PR merge — reviewers
  # consult the uploaded artifact when a license-relevant change is suspected
  # (new package added, license clause changed in lockfile, etc.). Promote to
  # blocking once a curated allowlist is in place.
  license-check:
    name: License Check (frontend)
    runs-on: ubuntu-latest
    if: always()  # run even if other jobs fail
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (locked)
        working-directory: frontend
        run: npm ci

      - name: Run license-checker (non-blocking)
        working-directory: frontend
        # Non-blocking: license-list changes shouldn't fail CI until we have a
        # curated allowlist. Output is a JSON file uploaded as an artifact.
        continue-on-error: true
        run: |
          mkdir -p ../artifacts
          npx --yes license-checker --json --out ../artifacts/license-report.json
          echo "Top-level license summary:"
          npx --yes license-checker --summary || true

      - name: Upload license report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: license-report
          path: artifacts/license-report.json
          retention-days: 30

  # ---------- security ----------
  security-scan:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run bandit (static security analysis)
        run: uv run bandit -r app/ -c pyproject.toml --severity-level high --confidence-level high

      - name: Run pip-audit (dependency vulnerability scan)
        run: uv run pip-audit --strict --desc

  # ---------- WORK-04: overlay-image-probe matrix ----------
  # Builds BOTH the 'api' and 'worker' image targets and runs a python probe
  # asserting the in-repo dummy overlay (not Default) resolves on each.
  #
  # Proof: WORK-01/02/03 worker bootstrap fix holds across both runtime images
  # in a real container (not just in pytest). The dummy overlay is used so the
  # probe runs without the enterprise secret (no GEOLENS_ENTERPRISE_TOKEN needed).
  #
  # Trigger scope: push to main + manual dispatch only (pin-sha-probe-push-only
  # decision). This conserves geolens-io free-tier Actions minutes — PRs do not
  # burn two docker-build+run cycles per push (the existing e2e gate follows the
  # same minutes-saving convention). References: WORK-04.
  overlay-image-probe:
    name: "Overlay Image Probe (${{ matrix.target }})"
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [api, worker]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Build ${{ matrix.target }} image with dummy overlay baked in
        run: |
          # Build the OSS image target. The dummy overlay lives at
          # backend/tests/fixtures/dummy_overlay/ (inside the backend/ build
          # context, copied to /app/tests/fixtures/dummy_overlay/ in the image).
          # The probe script imports it directly at /app/tests/fixtures/dummy_overlay/
          # via PYTHONPATH=/app — no entry-point registration needed at image-build time.
          docker build \
            --target ${{ matrix.target }} \
            --tag geolens-probe-${{ matrix.target }}:ci \
            .

      - name: "Probe overlay resolution on ${{ matrix.target }} image"
        run: |
          # Run the probe script inside the built image:
          # --with-dummy-overlay: directly installs the dummy overlay and asserts
          #   catalog_port is DummyCatalogPort (not DefaultCatalogPort).
          # PYTHONPATH=/app: makes tests.fixtures.dummy_overlay importable.
          # --no-healthcheck: container exits after the probe, no need to wait.
          # Exits 0 on PROBE PASSED, 1 on PROBE FAILED (fails this step).
          #
          # Note: the probe uses the OSS image (no enterprise secret needed).
          # The dummy overlay is part of the backend source tree baked into the image.
          #
          # Invoke via `uv run --no-dev python` (the image's production launch
          # pattern — see the api/worker CMD). The runtime image does NOT put the
          # /app/.venv on PATH, so a bare `--entrypoint python` runs the base-image
          # system interpreter with no project dependencies and the probe dies at
          # the first third-party import (`import structlog`). uv run activates the
          # baked /app/.venv so the probe exercises the real runtime.
          docker run \
            --rm \
            --no-healthcheck \
            -e PYTHONPATH=/app \
            -e JWT_SECRET_KEY=probe-padding-key-not-real-32chars \
            -e GEOLENS_ADMIN_USERNAME=probe \
            -e GEOLENS_ADMIN_PASSWORD=probe \
            -e POSTGRES_PASSWORD=probe \
            --entrypoint uv \
            geolens-probe-${{ matrix.target }}:ci \
            run --no-dev python scripts/probe_overlay_resolution.py --with-dummy-overlay

  # ---------- E2E (NIGHTLY / ON-DEMAND GATE — see .github/CONTRIBUTING.md "End-to-end (Playwright)") ----------
  # Runs on the nightly `schedule` cron and manual `workflow_dispatch` ONLY — it
  # stays skipped on push/PR so the dockerized stack + browser fixtures never
  # burn the free-tier Actions budget per-PR. Reviewers still run
  # `npm run e2e:smoke[:audit]` locally before approving user-flow changes (PR
  # description should note which suites passed); the cron provides the recurring
  # CI signal.
  e2e-test:
    name: E2E Tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, pytest-parallel-isolation, frontend-lint, frontend-test, security-scan]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Create .env file
        run: |
          cp .env.example .env
          # Override the dev defaults with CI-distinct values. JWT_SECRET_KEY must
          # be ≥ 32 chars to satisfy the Settings validator (backend/app/config.py).
          sed -i -E 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=geolens_dev|' .env
          sed -i -E 's|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=e2e-test-secret-key-padding-32chars-min|' .env
          sed -i -E 's|^GEOLENS_ADMIN_PASSWORD=.*|GEOLENS_ADMIN_PASSWORD=admin|' .env
          echo "DATABASE_SSL_MODE=disable" >> .env

      - name: Export admin credentials for E2E
        run: |
          echo "GEOLENS_ADMIN_USERNAME=admin" >> $GITHUB_ENV
          echo "GEOLENS_ADMIN_PASSWORD=admin" >> $GITHUB_ENV

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 120

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Docker Compose logs
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop services
        if: always()
        run: docker compose down
