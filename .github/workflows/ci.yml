name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly E2E signal without per-PR cost: the e2e-test job below runs ONLY on
  # `schedule`/`workflow_dispatch` (it stays skipped on push/PR), so this cron
  # gives a recurring browser-suite signal while keeping the free-tier Actions
  # budget at zero for routine pushes and PRs.
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for every job. The `changes` job widens to add
# pull-requests:read; no job needs write (publishing lives in publish*.yml).
permissions:
  contents: read

jobs:
  # ---------- detect changed paths for conditional jobs ----------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      cli: ${{ steps.filter.outputs.cli }}
      alembic: ${{ steps.filter.outputs.alembic }}
      installer: ${{ steps.filter.outputs.installer }}
      backup: ${{ steps.filter.outputs.backup }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              # Files the backend introspection tests (test_phase_27*) assert
              # against — a change here can break Backend Tests, so they must
              # run on PRs that touch these even with no backend/** change.
              - 'README.md'
              - 'frontend/README.md'
              - 'CHANGELOG.md'
              - '.env.example'
              - '.dockerignore'
              - 'nginx.conf'
              - 'db/**'
            frontend:
              - 'frontend/**'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              - 'playwright.builder-hardening.config.ts'
              - 'docker-compose*.yml'
            cli:
              - 'cli/**'
              - 'sdks/python/**'
            alembic:
              - 'backend/alembic/**'
              - 'backend/scripts/test_alembic_upgrade_clean_db.sh'
              # OCG-02: backend/app/models/** was deleted in b63803c1; replaced
              # with the real model layout so model-only PRs still trigger alembic
              # check (blocks model migration drift regressions).
              - 'backend/app/**/models.py'
              - 'backend/app/core/db/models.py'
              - 'backend/app/processing/**/models.py'
              - 'db/**'
            installer:
              - 'scripts/install.sh'
              - 'scripts/backup-entrypoint.sh'
              - 'scripts/tests/test-install-tag-resolution.sh'
              - 'scripts/tests/test-install-secret-generation.sh'
              - 'scripts/tests/test-install-main-wrapper.sh'
              - 'scripts/tests/test-backup-s3-signature.sh'
              - 'scripts/check_env_doc_drift.py'
              - '.env.example'
              - 'docker-compose.yml'
              - 'docker-compose.prod.yml'
            backup:
              - 'scripts/backup-entrypoint.sh'
              - 'scripts/restore.sh'
              - 'scripts/tests/test-backup-restore-roundtrip.sh'
              - 'docker-compose.prod.yml'
              - 'Dockerfile'
              - '.github/workflows/publish.yml'

  # ---------- backend ----------
  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      # TSEAM-03 (Phase 1207-02): no third "cloud" runtime mode.
      # A literal 'cloud' token in edition.py or license.py would re-introduce
      # a separate hosted-product axis (KISS Rule 1).
      # `grep -nE` returns exit 0 on a match (which is a FAIL for us) and
      # exit 1 on no match (which is our SUCCESS) — flip semantics with `!`.
      - name: TSEAM-03 - no literal 'cloud' runtime token in core/edition.py or core/license.py
        run: |
          if grep -nE "['\"]cloud['\"]" app/core/edition.py app/core/license.py; then
            echo "FAIL: Found a literal 'cloud' runtime token. TSEAM-03"
            exit 1
          fi
          echo "OK: no 'cloud' runtime literal in core/edition.py or core/license.py"

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      # Security guardrails (SSRF/IDOR) + generic hygiene. Ruff is covered by the
      # backend-lint job; gitleaks runs as a dedicated full-tree scan below (the
      # pre-commit gitleaks hook only inspects staged diffs).
      - name: Run pre-commit hooks
        env:
          SKIP: ruff-check,ruff-format,gitleaks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Install gitleaks
        run: |
          GL=8.30.1
          GL_SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          echo "${GL_SHA256}  gitleaks.tar.gz" | sha256sum --check --strict
          tar -xz -f gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Secret scan (tracked tree)
        run: gitleaks dir . -c .gitleaks.toml --redact --no-banner

  # ---------- installer ----------
  # Regression guard for the release-tag checkout in scripts/install.sh: a remote
  # branch named identically to a release tag must not shadow the tag. Pure
  # shell + git (no Docker/DB), so it is fast and only runs when the installer or
  # its test changes.
  installer-test:
    name: Installer Tag Resolution
    needs: changes
    if: needs.changes.outputs.installer == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Tag/branch shadowing regression test
        run: sh scripts/tests/test-install-tag-resolution.sh

      - name: Installer secret-generation regression test
        run: sh scripts/tests/test-install-secret-generation.sh

      - name: Installer main() wrapper regression test
        run: sh scripts/tests/test-install-main-wrapper.sh

      - name: Backup S3 signature regression test
        run: sh scripts/tests/test-backup-s3-signature.sh

      - name: Env-doc-drift gate (install.sh keys documented in .env.example)
        run: python3 scripts/check_env_doc_drift.py

      - name: Validate compose files parse
        env:
          GEOLENS_VERSION: 0.0.0-ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          JWT_SECRET_KEY: ci-compose-validate-padding-32chars
          GEOLENS_ADMIN_USERNAME: admin
          GEOLENS_ADMIN_PASSWORD: geolens-ci-admin-password
          MINIO_ROOT_USER: ci
          MINIO_ROOT_PASSWORD: ci-padding
        run: |
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.prod.yml config -q

  # ---------- backup + restore round-trip (BKP-03) ----------
  # Boots the backup image (built/loaded from --target backup in the root
  # Dockerfile) and exercises backup → restore for BOTH DB modes:
  #   BUNDLED: backup image runs pg_dump + SigV4 S3 upload inside the image;
  #            restored dump row counts must match exactly.
  #   MANAGED: provider-snapshot DB (seeded directly) + object-storage archive
  #            pulled from MinIO; asserts the functional pairing.
  # The fast leg (test-backup-restore-roundtrip.sh, both modes, no S3) runs
  # first; the full image-boot leg follows to prove the shipped SigV4 path.
  backup-roundtrip:
    name: Backup Restore Round-trip
    needs: changes
    if: needs.changes.outputs.backup == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: geolens
      PGPASSWORD: geolens_test
      S3_BUCKET: geolens-backups-ci
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: geolens
          POSTGRES_PASSWORD: geolens_test
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U geolens -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        # bitnami/minio:* tags were withdrawn in Bitnami's Aug-2025 "Secure
        # Images" migration (all bitnami/minio:<tag> now 404). The last free
        # build lives under bitnamilegacy/, pinned here by digest for
        # reproducibility (auto-runs `minio server` + ships `mc` for the
        # healthcheck — bucket is pre-created via MINIO_DEFAULT_BUCKETS).
        image: bitnamilegacy/minio@sha256:451fe6858cb770cc9d0e77ba811ce287420f781c7c1b806a386f6896471a349c
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: geolens-backups-ci
        ports:
          - 9000:9000
        options: >-
          --health-cmd "mc ready local || curl -sf http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build backup image (Dockerfile --target backup, --load for docker run)
        run: |
          # BKP-03: build+load the backup stage so CI boots the SAME image
          # definition that publish.yml ships. On a PR no GHCR tag exists yet;
          # --load makes it available to `docker run` on this runner without a
          # registry push (T-1247-SC: never pull an external image for the proof).
          docker buildx build \
            --load \
            --target backup \
            -t geolens-backup:ci \
            .

      - name: Install postgresql-client + tooling
        run: |
          # The postgres service for this job is postgis/postgis:17-3.5 (PG17).
          # Ubuntu 24.04 (noble) ships postgresql-client 16 by default, and pg_dump
          # refuses to dump a newer server ("aborting because of server version
          # mismatch"), so add the PGDG apt repo and install the matching v17
          # client (pg_dump/pg_restore/psql/createdb/dropdb).
          #
          # awscli is intentionally NOT installed from apt (dropped from noble).
          # AWS CLI v2 is already preinstalled on ubuntu-latest runners and is
          # used in the managed-mode step below to pull the staging archive from
          # MinIO after the backup image uploads it via its own SigV4 path.
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-17 curl

      - name: Local round-trip (bundled + managed modes, no S3)
        env:
          # Point the standalone script at the CI Postgres service.
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: geolens
          POSTGRES_PASSWORD: geolens_test
          POSTGRES_DB: postgres
        run: |
          # Fast leg: exercises both bundled-mode DB recovery and managed-mode
          # provider-snapshot + object-storage recovery without requiring S3/MinIO
          # or the backup image (pure pg_dump/pg_restore + tar). CI checkout ships
          # .env.test, so env overrides are passed explicitly.
          bash scripts/tests/test-backup-restore-roundtrip.sh

      - name: BUNDLED MODE — boot backup image (SigV4 S3 upload via image) → download → pg_restore → row-count assert
        run: |
          set -euo pipefail
          # Seed a source DB with known rows.
          SRC=geolens_ci_bund_src_$$
          DST=geolens_ci_bund_dst_$$
          createdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" "$SRC"
          psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$SRC" -v ON_ERROR_STOP=1 -c \
            "CREATE SCHEMA IF NOT EXISTS catalog;
             CREATE TABLE catalog.records (id serial PRIMARY KEY, name text);
             CREATE TABLE catalog.datasets (id serial PRIMARY KEY, slug text);
             INSERT INTO catalog.records (name) SELECT 'img-r-'||g FROM generate_series(1, 113) g;
             INSERT INTO catalog.datasets (slug) SELECT 'img-d-'||g FROM generate_series(1, 57) g;"
          SRC_R=$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$SRC" -tAc "SELECT COUNT(*) FROM catalog.records;")
          SRC_D=$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$SRC" -tAc "SELECT COUNT(*) FROM catalog.datasets;")

          # Staging dir (object storage) for the image to archive and upload.
          mkdir -p /tmp/ci-staging/nested
          echo "cog-data" > /tmp/ci-staging/a.tif
          echo "fgb-data" > /tmp/ci-staging/nested/b.fgb

          # Backups output volume (host-mounted so we can resolve filenames).
          mkdir -p /tmp/ci-backups

          # Run the backup image — it connects to $SRC, runs pg_dump, archives
          # /staging, and uploads BOTH to MinIO via the image's SigV4 uploader
          # (BKP-02 path — this is the shipped behaviour being proven here).
          # --network host lets the container reach the postgres + minio services.
          # Array form keeps the run_args readable while putting docker run and
          # the image name on a single line (required by the acceptance grep).
          run_args=(
            --rm --network host
            -e POSTGRES_HOST=localhost -e POSTGRES_PORT=5432
            -e POSTGRES_USER="$PGUSER" -e POSTGRES_PASSWORD="$PGPASSWORD"
            -e POSTGRES_DB="$SRC"
            -e BACKUP_S3_ENABLED=true
            -e S3_ENDPOINT="$S3_ENDPOINT" -e S3_BUCKET="$S3_BUCKET"
            -e S3_ACCESS_KEY_ID="$S3_ACCESS_KEY_ID"
            -e S3_SECRET_ACCESS_KEY="$S3_SECRET_ACCESS_KEY"
            -e S3_ALLOW_HTTP=true -e S3_ADDRESSING_STYLE=path
            -v /tmp/ci-backups:/backups -v /tmp/ci-staging:/staging:ro
          )
          docker run "${run_args[@]}" geolens-backup:ci --run-backup

          # Verify the backup image produced a non-empty dump.
          DUMP_FILE=$(find /tmp/ci-backups/daily -name '*.dump' -type f | head -1)
          [ -n "$DUMP_FILE" ] || { echo "FAIL: backup image produced no dump file"; exit 1; }
          [ -s "$DUMP_FILE" ] || { echo "FAIL: backup image dump file is empty"; exit 1; }

          # Restore into DST using the same flags restore.sh uses (bundled-mode
          # recovery path). Tolerate expected nonzero on warnings from --clean.
          pg_restore --list "$DUMP_FILE" >/dev/null
          createdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" "$DST"
          set +e
          pg_restore -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$DST" \
            --clean --if-exists --no-owner "$DUMP_FILE" 2>/tmp/bund-restore.err
          RC=$?
          set -e
          if [ "$RC" -ne 0 ] && grep -qi "error:" /tmp/bund-restore.err; then
            cat /tmp/bund-restore.err >&2
            echo "FAIL: bundled-mode pg_restore reported errors (exit ${RC})"; exit 1
          fi

          DST_R=$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$DST" -tAc "SELECT COUNT(*) FROM catalog.records;")
          DST_D=$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$DST" -tAc "SELECT COUNT(*) FROM catalog.datasets;")
          # Hard row-count asserts — must not be weakened with || true (T-1247-09).
          [ "$SRC_R" = "$DST_R" ] || { echo "FAIL: bundled-mode records count mismatch: $SRC_R != $DST_R"; exit 1; }
          [ "$SRC_D" = "$DST_D" ] || { echo "FAIL: bundled-mode datasets count mismatch: $SRC_D != $DST_D"; exit 1; }
          echo "PASS [BUNDLED MODE]: image backup→SigV4-S3→restore, records=${SRC_R} datasets=${SRC_D}"
          dropdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" --if-exists "$SRC"
          dropdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" --if-exists "$DST"

      - name: MANAGED MODE — provider-snapshot DB + object-storage archive recovery → row-count + object-tree assert
        run: |
          set -euo pipefail
          # Managed mode: the database is provider-owned (e.g. AWS RDS / Cloud SQL).
          # GeoLens backup covers OBJECT STORAGE ONLY; the DB is recovered by the
          # provider from a native snapshot. Model the pairing:
          #   (a) "Provider snapshot" — seed a fresh DB directly via SQL with the
          #       same rows (does NOT go through restore.sh's docker-compose-exec
          #       path, which does not apply to an external managed DB).
          #   (b) Object-storage recovery — pull the staging archive that the
          #       backup image uploaded to MinIO in the bundled-mode step above.
          #   (c) Functional-pairing assert — DB rows present + objects present.
          SNAP=geolens_ci_mgd_snap_$$

          # (a) "Provider snapshot" — create and seed the DB directly via SQL.
          createdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" "$SNAP"
          psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$SNAP" -v ON_ERROR_STOP=1 -c \
            "CREATE SCHEMA IF NOT EXISTS catalog;
             CREATE TABLE catalog.records (id serial PRIMARY KEY, name text);
             CREATE TABLE catalog.datasets (id serial PRIMARY KEY, slug text);
             INSERT INTO catalog.records (name) SELECT 'img-r-'||g FROM generate_series(1, 113) g;
             INSERT INTO catalog.datasets (slug) SELECT 'img-d-'||g FROM generate_series(1, 57) g;"
          SNAP_R=$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$SNAP" -tAc "SELECT COUNT(*) FROM catalog.records;")
          SNAP_D=$(psql -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$SNAP" -tAc "SELECT COUNT(*) FROM catalog.datasets;")
          # Hard row-count asserts — must not be weakened with || true (T-1247-09).
          [ "$SNAP_R" = "113" ] || { echo "FAIL: managed-mode snapshot DB records wrong: $SNAP_R"; exit 1; }
          [ "$SNAP_D" = "57" ]  || { echo "FAIL: managed-mode snapshot DB datasets wrong: $SNAP_D"; exit 1; }
          echo "  managed-mode snapshot DB: records=${SNAP_R} datasets=${SNAP_D}"

          # (b) Object-storage recovery — pull staging archive from MinIO.
          #     The backup image uploaded it (under backups/daily/) in the step above.
          export AWS_ACCESS_KEY_ID="$S3_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$S3_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION=us-east-1
          AWS="aws --endpoint-url $S3_ENDPOINT"

          STAGING_KEY=$($AWS s3 ls "s3://$S3_BUCKET/backups/daily/" \
            | grep 'staging-.*\.tar\.gz' | awk '{print $4}' | head -1)
          [ -n "$STAGING_KEY" ] || { echo "FAIL: managed-mode: no staging archive in MinIO"; exit 1; }
          $AWS s3 cp "s3://$S3_BUCKET/backups/daily/$STAGING_KEY" /tmp/ci-mgd-staging.tar.gz
          mkdir -p /tmp/ci-mgd-staging-out
          tar xzf /tmp/ci-mgd-staging.tar.gz -C /tmp/ci-mgd-staging-out
          diff -r /tmp/ci-staging /tmp/ci-mgd-staging-out
          STAGING_FILES=$(find /tmp/ci-mgd-staging-out -type f | wc -l | tr -d ' ')
          echo "  managed-mode object-storage: ${STAGING_FILES} file(s) restored from archive"

          echo "PASS [MANAGED MODE]: provider-snapshot DB (records=${SNAP_R} datasets=${SNAP_D}) + object-storage archive verified"
          dropdb -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" --if-exists "$SNAP"

  openapi-snapshot:
    name: OpenAPI Snapshot Drift
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Padding values to satisfy app.core.config.Settings() validation —
      # this job imports the FastAPI app to dump the schema; it never
      # connects to a DB or runs admin auth.
      JWT_SECRET_KEY: openapi-snapshot-padding-key-32chars
      POSTGRES_PASSWORD: ci-padding-no-db
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: geolens-ci-admin-password
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Verify openapi.json is up to date
        run: uv run python scripts/dump_openapi.py --check

  sdks-check:
    name: SDKs Drift Gate
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Match the OpenAPI snapshot job's env so dump_openapi.py runs
      JWT_SECRET_KEY: sdks-check-padding-key-32characters-here
      POSTGRES_PASSWORD: ci-padding-no-db
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: geolens-ci-admin-password
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Install backend dependencies (for dump_openapi.py)
        working-directory: backend
        run: uv sync --locked --dev

      - name: Install TypeScript SDK dependencies (locked)
        working-directory: sdks/typescript
        run: npm ci

      - name: Regenerate SDKs and check for drift
        run: make sdks-check

  # ---------- version coherence ----------
  # REL-04: assert every version site agrees (backend/cli/sdks×2/root+frontend
  # package.json/openapi.json info.version/main.py fallback constant). Blocks a
  # release where one site silently drifted from the rest. Pure stdlib (tomllib
  # + json + re); no DB, no Docker, runs on every push/PR.
  version-coherence:
    name: Version Coherence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Check all version sites agree
        run: python scripts/check_version_coherence.py

  # ---------- docs contract ----------
  # Enforce docs-contract.json: validates the contract against install.sh +
  # pyproject (so it can't drift from the binaries) and scans the READMEs for
  # the forbidden drift patterns (stale compose filename, raw-port OGC endpoints,
  # overbroad standards claims, weak default admin credentials). getgeolens.com
  # vendors a copy of this contract and runs the same forbidden list over its
  # site/docs content.
  # Pure stdlib; runs on every push/PR.
  docs-contract:
    name: Docs Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Check docs contract (install/ports/version + forbidden patterns)
        run: python scripts/check_docs_contract.py

      - name: Public surface gate (launch-sensitive terms)
        run: make public-surface-check

  # ---------- CLI ----------
  # Structural enforcement that the CLI never grows
  # a direct httpx/requests dependency. Runs on cli/** OR sdks/python/**
  # changes (the SDK is the CLI's only HTTP surface — a regression in the
  # SDK can ripple into the CLI through a behavior change in the wrapper).
  cli-test:
    name: CLI Tests
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # CLI round-trip tests import the FastAPI app and exercise DB-backed
      # routes; point the test lifecycle at the local CI PostgreSQL container.
      JWT_SECRET_KEY: cli-test-padding-key-32characters-here
      POSTGRES_USER: geolens
      POSTGRES_PASSWORD: geolens_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: geolens-ci-admin-password
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Start PostgreSQL with PostGIS + pgvector
        working-directory: .
        run: |
          docker build -t geolens-cli-test-db -f - . <<'DOCKERFILE'
          FROM postgis/postgis:17-3.5
          RUN apt-get update \
              && apt-get install -y --no-install-recommends postgresql-17-pgvector \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run -d --name cli-test-postgres \
            -e POSTGRES_DB=postgres \
            -e POSTGRES_USER=geolens \
            -e POSTGRES_PASSWORD=geolens_test \
            -p 5432:5432 \
            geolens-cli-test-db
          for i in $(seq 1 30); do
            if docker exec cli-test-postgres pg_isready -U geolens -d postgres >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      # Install backend + SDK + CLI editable into ONE shared venv
      # (backend/.venv). The round-trip test in backend/tests/ imports
      # geolens_cli, so all three packages need to coexist in the env
      # that pytest uses. Using `uv pip install -e ../...` from backend/
      # places SDK + CLI editable into backend's venv (uv-sources in
      # cli/pyproject.toml resolves the geolens SDK dep against the
      # local sibling tree.
      - name: Install backend + SDK + CLI into shared venv
        working-directory: backend
        run: |
          uv sync --locked --dev
          uv pip install -e ../sdks/python
          uv pip install -e "../cli[dev]"

      # OCCLI-06 structural gate (1/2): no direct httpx/requests imports.
      # `grep -rE` returns exit 1 when no matches → success for us; flip
      # to fail if we DID match.
      - name: OCCLI-06 — no httpx/requests imports in cli/geolens_cli/
        working-directory: cli
        run: |
          if grep -rE '^(import|from) (httpx|requests)' geolens_cli/; then
            echo "FAIL: CLI imports httpx or requests directly (OCCLI-06)"
            exit 1
          fi
          echo "OK: zero direct httpx/requests imports in cli/geolens_cli/"

      # OCCLI-06 structural gate (2/2): cli/pyproject.toml declares no
      # httpx or requests dep (transitive via the geolens SDK is fine).
      # Use system python (not `uv run`) — the script only needs stdlib
      # tomllib, and `uv run` from cli/ would force a separate cli/.venv
      # resolution distinct from the shared backend/.venv used elsewhere.
      - name: OCCLI-06 — no httpx/requests in cli/pyproject.toml deps
        working-directory: cli
        run: |
          python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          deps = d['project']['dependencies']
          forbidden = [x for x in deps if 'httpx' in x or 'requests' in x]
          assert not forbidden, f'FAIL: cli/pyproject.toml declares forbidden direct deps: {forbidden}'
          print('OK: no httpx/requests direct deps in cli/pyproject.toml')
          "

      - name: Manifest CLI contract tests
        working-directory: cli
        run: |
          uv run --project ../backend pytest -v \
            tests/test_manifest_schema.py \
            tests/test_manifest_validate.py \
            tests/test_manifest_apply.py \
            tests/test_manifest_examples.py \
            tests/test_manifest_cli_offline.py

      # CLI unit tests: run from cli/ so pytest picks up cli/pyproject.toml's
      # [tool.pytest.ini_options] testpaths, but use the SHARED backend venv
      # (which has cli + sdk + cli's deps installed editable) via
      # `--project ../backend` so pytest doesn't try to resolve a fresh
      # cli/.venv from PyPI.
      - name: CLI unit tests
        working-directory: cli
        run: uv run --project ../backend pytest -v

      - name: Manifest CLI round-trip contract test
        working-directory: backend
        run: uv run pytest tests/test_cli_round_trip.py::TestManifestApplyRoundTrip -v

      - name: CLI round-trip integration test
        working-directory: backend
        run: uv run pytest tests/test_cli_round_trip.py -v

  backend-test:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_USER: geolens
      POSTGRES_PASSWORD: geolens_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      # Must be ≥ 32 chars to satisfy the Settings validator (backend/app/config.py).
      JWT_SECRET_KEY: test-secret-key-for-ci-padding-32chars
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: geolens-ci-admin-password
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Start PostgreSQL with PostGIS + pgvector
        working-directory: .
        run: |
          docker build -t geolens-test-db -f - . <<'DOCKERFILE'
          FROM postgis/postgis:17-3.5
          RUN apt-get update \
              && apt-get install -y --no-install-recommends postgresql-17-pgvector \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run -d --name test-postgres \
            -e POSTGRES_DB=postgres \
            -e POSTGRES_USER=geolens \
            -e POSTGRES_PASSWORD=geolens_test \
            -p 5432:5432 \
            geolens-test-db
          for i in $(seq 1 30); do
            if docker exec test-postgres pg_isready -U geolens -d postgres >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gdal-bin xmlsec1

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Set up database extensions, roles, and schemas
        run: |
          PGPASSWORD=geolens_test psql -h localhost -U geolens -d postgres -c "
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS unaccent;
            CREATE SCHEMA IF NOT EXISTS catalog;
            CREATE SCHEMA IF NOT EXISTS data;
            ALTER DATABASE postgres SET search_path TO catalog, data, public;
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'geolens_reader') THEN
                CREATE ROLE geolens_reader NOLOGIN;
              END IF;
            END \$\$;
            GRANT USAGE ON SCHEMA data TO geolens_reader;
            ALTER DEFAULT PRIVILEGES IN SCHEMA data GRANT SELECT ON TABLES TO geolens_reader;
          "

      - name: Run migrations
        # `heads` (plural) applies every Alembic branch head and is also safe
        # when the migration graph currently has a single head.
        run: uv run alembic upgrade heads

      - name: Normalize search_path for the drift check (MIG-03)
        # `alembic check` reflects the live schema and diffs it against the ORM
        # metadata. Our models are explicitly schema-qualified
        # (`__table_args__ = {"schema": "catalog"}`) and env.py runs the check with
        # include_schemas=True. The setup step set the postgres DB default
        # search_path to `catalog, data, public` — with catalog FIRST it is the
        # connection-default schema, so alembic reflects every catalog table under
        # the unqualified/None key while the metadata is keyed under explicit
        # `catalog`. They never match, so `alembic check` reports ALL tables as
        # add_table (a wholesale empty-reflection false positive, NOT real drift).
        # Dropping catalog from the default (keeping data, public) makes reflection
        # key catalog tables under `catalog`, matching the qualified metadata, so
        # the gate fires only on REAL drift. Migrations are unaffected: each is
        # schema-qualified and 0002_procrastinate sets its own search_path, so they
        # already ran above under `catalog, data, public`.
        run: |
          PGPASSWORD=geolens_test psql -h localhost -U geolens -d postgres -c \
            "ALTER DATABASE postgres SET search_path TO data, public;"

      # MIG-03: autogenerate drift gate. With the DB now at head, `alembic check`
      # exits non-zero if the ORM models have drifted from the migration scripts
      # (e.g. a model column added without a matching migration). env.py's
      # include_object filter hides extension-provided SAML columns when no
      # extension is discovered, so this gate is clean on OSS-only runs and only
      # fires on REAL drift. Companion to the `make alembic-check` one-liner.
      - name: Alembic drift check (MIG-03)
        run: uv run alembic check

      - name: Manifest backend apply contract tests
        run: |
          uv run pytest -v \
            tests/test_manifest_apply_api.py \
            tests/test_manifest_apply_service.py \
            tests/test_manifest_apply_vrt.py \
            tests/test_manifest_apply_roundtrip.py \
            tests/test_layering.py

      - name: Run tests with coverage
        # --cov-fail-under=58.5 is the CI floor. backend/pyproject.toml declares
        # fail_under=60; the two are intentionally NOT yet aligned here — raising
        # the CI gate above measured coverage would RED main. Bump this to 60
        # only after a measured run confirms real coverage >= 60.
        run: uv run pytest -v --tb=short -m 'not perf and not lifecycle' --cov=app --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml:coverage.xml --cov-fail-under=58.5

      - name: Verify SAML fixtures unchanged after pytest
        run: |
          # Catch BOTH modified-tracked-files (the original regression) AND
          # newly-created fixture files like idp_response_*.xml.b64 — those
          # are untracked after the originals were renamed to .template,
          # and `git diff --quiet` would silently miss them.
          DIRTY=$(git status --porcelain -- tests/fixtures/saml/)
          if [ -n "$DIRTY" ]; then
            echo "::error::SAML fixture dir mutated by pytest run -- regression of phase 227 (saml-test-fixture-tmp-path)."
            echo "$DIRTY"
            git diff --stat -- tests/fixtures/saml/
            git diff -- tests/fixtures/saml/ | head -200
            exit 1
          fi

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 14

  # ---------- alembic clean-DB upgrade smoke ----------
  # Exercise the full migration chain against a freshly-initialized PostGIS
  # container via the clean-DB upgrade
  # script. Builds the project's custom PostGIS+pgvector image, spins up a
  # throwaway DB, and runs `alembic upgrade head` from a clean state.
  # Catches migration-on-clean-DB breakage that the backend-test job can miss
  # because backend-test runs migrations on a DB that already saw earlier
  # migrations in test scope.
  alembic-clean-db:
    name: Alembic Clean-DB Upgrade
    needs: changes
    if: needs.changes.outputs.alembic == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --locked

      - name: Run alembic clean-DB upgrade smoke
        run: ./backend/scripts/test_alembic_upgrade_clean_db.sh
        env:
          # The script reads these for the throwaway container; explicit
          # is better than relying on bash defaults.
          ALEMBIC_TEST_DB_PORT: 54399
          ALEMBIC_TEST_TIMEOUT: 90

  # ---------- pytest parallel-isolation gate ----------
  # Defends the fixture-isolation fixes against regression.
  # Runs `pytest -n 4` against the backend test suite (the known residual
  # failures are a tracked flake-class, not regressions from this gate).
  # The `-n 4` value was chosen from local xdist performance benchmarking.
  # Sister-shape to alembic-clean-db (line 462).
  pytest-parallel-isolation:
    name: Pytest Parallel Isolation
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.alembic == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_USER: geolens
      POSTGRES_PASSWORD: geolens_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      # Must be ≥ 32 chars to satisfy the Settings validator (backend/app/config.py).
      JWT_SECRET_KEY: test-secret-key-for-ci-padding-32chars
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: geolens-ci-admin-password
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Start PostgreSQL with PostGIS + pgvector
        working-directory: .
        run: |
          docker build -t geolens-test-db -f - . <<'DOCKERFILE'
          FROM postgis/postgis:17-3.5
          RUN apt-get update \
              && apt-get install -y --no-install-recommends postgresql-17-pgvector \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run -d --name test-postgres \
            -e POSTGRES_DB=postgres \
            -e POSTGRES_USER=geolens \
            -e POSTGRES_PASSWORD=geolens_test \
            -p 5432:5432 \
            geolens-test-db
          for i in $(seq 1 30); do
            if docker exec test-postgres pg_isready -U geolens -d postgres >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gdal-bin xmlsec1

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Set up database extensions, roles, and schemas
        run: |
          PGPASSWORD=geolens_test psql -h localhost -U geolens -d postgres -c "
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS unaccent;
            CREATE SCHEMA IF NOT EXISTS catalog;
            CREATE SCHEMA IF NOT EXISTS data;
            ALTER DATABASE postgres SET search_path TO catalog, data, public;
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'geolens_reader') THEN
                CREATE ROLE geolens_reader NOLOGIN;
              END IF;
            END \$\$;
            GRANT USAGE ON SCHEMA data TO geolens_reader;
            ALTER DEFAULT PRIVILEGES IN SCHEMA data GRANT SELECT ON TABLES TO geolens_reader;
          "

      - name: Run migrations
        # `heads` (plural) applies every Alembic branch head and is also safe
        # when the migration graph currently has a single head.
        run: uv run alembic upgrade heads

      - name: Run tests with -n 4
        # Regression gate for the fixture-isolation work.
        # The `-n 4` value was chosen from local xdist performance benchmarking.
        # No coverage flags here — backend-test job already covers coverage; this job is a regression gate only.
        # Uses the default public test environment; optional runtime-specific
        # fixture races are tracked separately if they surface.
        run: uv run pytest -n 4 -v --tb=short -m 'not perf'

  # ---------- frontend ----------
  frontend-lint:
    name: Frontend Lint & Typecheck
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Locale parity
        run: npm run test:i18n

      - name: Changed namespaces exist in all languages
        run: npm run check:i18n:changed

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ---------- license-check ----------
  # BLOCKING license-checker against the frontend production dependency tree:
  # fails CI on any license outside the curated permissive allowlist (validated
  # against the current tree). The JSON report is still uploaded as an artifact.
  license-check:
    name: License Check (frontend)
    runs-on: ubuntu-latest
    if: always()  # run even if other jobs fail
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (locked)
        working-directory: frontend
        run: npm ci

      - name: Run license-checker (blocking — curated allowlist)
        working-directory: frontend
        # BLOCKING: fails CI if a production dependency carries a license outside
        # the curated permissive allowlist (validated against the current tree:
        # MIT/ISC/BSD/Apache-2.0/MPL-2.0/OFL-1.1/0BSD + two dual-license SPDX
        # expressions). Exclusions:
        #   --excludePrivatePackages          drops the app's own private package.
        #   @mapbox/jsonlint-lines-primitives is MIT but declares its license as a
        #     URL (reported "Custom"), so it is excluded by name, not by license.
        # A new disallowed license (or a jsonlint version bump) fails here on
        # purpose — extend the allowlist or the exclusion deliberately.
        run: |
          mkdir -p ../artifacts
          npx --yes license-checker --production --json --out ../artifacts/license-report.json
          npx --yes license-checker --production \
            --onlyAllow 'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;MPL-2.0;OFL-1.1;0BSD;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0;(MIT OR Apache-2.0);(BSD-3-Clause AND Apache-2.0)' \
            --excludePrivatePackages \
            --excludePackages '@mapbox/jsonlint-lines-primitives@2.0.2' \
            --summary

      - name: Upload license report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: license-report
          path: artifacts/license-report.json
          retention-days: 30

  # ---------- security ----------
  security-scan:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run bandit (static security analysis)
        run: uv run bandit -r app/ -c pyproject.toml --severity-level high --confidence-level high

      - name: Run pip-audit (dependency vulnerability scan)
        run: uv run pip-audit --strict --desc

  # ---------- WORK-04: runtime extension image probe matrix ----------
  # Builds BOTH the 'api' and 'worker' image targets and runs a python probe
  # asserting the in-repo dummy runtime extension (not Default) resolves on each.
  #
  # Proof: WORK-01/02/03 worker bootstrap fix holds across both runtime images
  # in a real container (not just in pytest). The dummy runtime extension keeps
  # the probe self-contained in the public source tree.
  #
  # Trigger scope: push to main + manual dispatch only (pin-sha-probe-push-only
  # decision). This conserves geolens-io free-tier Actions minutes — PRs do not
  # burn two docker-build+run cycles per push (the existing e2e gate follows the
  # same minutes-saving convention). References: WORK-04.
  runtime-extension-image-probe:
    name: "Runtime Extension Image Probe (${{ matrix.target }})"
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target: [api, worker]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Build ${{ matrix.target }} image with dummy runtime extension fixture baked in
        run: |
          # Build the OSS image target. The dummy runtime extension fixture lives at
          # backend/tests/fixtures/dummy_overlay/ (inside the backend/ build
          # context, copied to /app/tests/fixtures/dummy_overlay/ in the image).
          # The probe script imports it directly at /app/tests/fixtures/dummy_overlay/
          # via PYTHONPATH=/app — no entry-point registration needed at image-build time.
          docker build \
            --target ${{ matrix.target }} \
            --tag geolens-probe-${{ matrix.target }}:ci \
            .

      - name: "Probe runtime extension resolution on ${{ matrix.target }} image"
        run: |
          # Run the probe script inside the built image:
          # --with-dummy-overlay: directly installs the dummy runtime extension and asserts
          #   catalog_port is DummyCatalogPort (not DefaultCatalogPort).
          # PYTHONPATH=/app: makes tests.fixtures.dummy_overlay importable.
          # --no-healthcheck: container exits after the probe, no need to wait.
          # Exits 0 on PROBE PASSED, 1 on PROBE FAILED (fails this step).
          #
          # Note: the probe uses the OSS image with the dummy runtime extension
          # fixture baked into the image.
          #
          # Invoke via `uv run --no-dev python` (the image's production launch
          # pattern — see the api/worker CMD). The runtime image does NOT put the
          # /app/.venv on PATH, so a bare `--entrypoint python` runs the base-image
          # system interpreter with no project dependencies and the probe dies at
          # the first third-party import (`import structlog`). uv run activates the
          # baked /app/.venv so the probe exercises the real runtime.
          docker run \
            --rm \
            --no-healthcheck \
            -e PYTHONPATH=/app \
            -e JWT_SECRET_KEY=probe-padding-key-not-real-32chars \
            -e GEOLENS_ADMIN_USERNAME=probe \
            -e GEOLENS_ADMIN_PASSWORD=probe \
            -e POSTGRES_PASSWORD=probe \
            --entrypoint uv \
            geolens-probe-${{ matrix.target }}:ci \
            run --no-dev python scripts/probe_overlay_resolution.py --with-dummy-overlay

  # ---------- E2E (NIGHTLY / ON-DEMAND GATE — see .github/CONTRIBUTING.md "End-to-end (Playwright)") ----------
  # Runs on the nightly `schedule` cron and manual `workflow_dispatch` ONLY — it
  # stays skipped on push/PR so the dockerized stack + browser fixtures never
  # burn the free-tier Actions budget per-PR. Reviewers still run
  # `npm run e2e:smoke[:audit]` locally before approving user-flow changes (PR
  # description should note which suites passed); the cron provides the recurring
  # CI signal.
  e2e-test:
    name: E2E Tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, pytest-parallel-isolation, frontend-lint, frontend-test, security-scan]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Create .env file
        run: |
          cp .env.example .env
          # Override the dev defaults with CI-distinct values. JWT_SECRET_KEY must
          # be ≥ 32 chars to satisfy the Settings validator (backend/app/config.py).
          sed -i -E 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=geolens_dev|' .env
          sed -i -E 's|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=e2e-test-secret-key-padding-32chars-min|' .env
          sed -i -E 's|^GEOLENS_ADMIN_PASSWORD=.*|GEOLENS_ADMIN_PASSWORD=geolens-ci-admin-password|' .env
          echo "DATABASE_SSL_MODE=disable" >> .env

      - name: Export admin credentials for E2E
        run: |
          echo "GEOLENS_ADMIN_USERNAME=admin" >> $GITHUB_ENV
          echo "GEOLENS_ADMIN_PASSWORD=geolens-ci-admin-password" >> $GITHUB_ENV

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 120

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Docker Compose logs
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop services
        if: always()
        run: docker compose down

  # ---- E2E / A11Y trigger matrix (REL-03) ----
  # nightly cron ("0 7 * * *") + workflow_dispatch → e2e-test (full npx playwright test)
  # release tag push (v*)                         → prod-smoke.yml (e2e:smoke:audit against
  #                                                  published images), gates release.yml via
  #                                                  workflow_run on "Prod Compose Smoke"
  # pull_request                                  → NO browser jobs; per-PR Actions budget = 0
  # push(main) + nightly + dispatch               → accessibility (axe + keyboard-nav, below)
  accessibility:
    name: Accessibility (axe + keyboard-nav)
    # always() so this still evaluates when the needed jobs are SKIPPED on
    # schedule/manual runs (they only force-run on push) — without it GitHub
    # auto-skips a job whose needs were skipped. The failure/cancelled guard
    # preserves the push gate: don't run the expensive a11y suite if an upstream
    # lint/test failed.
    if: >-
      always()
      && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, pytest-parallel-isolation, frontend-lint, frontend-test, security-scan]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Create .env file
        run: |
          cp .env.example .env
          sed -i -E 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=geolens_dev|' .env
          sed -i -E 's|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=e2e-test-secret-key-padding-32chars-min|' .env
          sed -i -E 's|^GEOLENS_ADMIN_PASSWORD=.*|GEOLENS_ADMIN_PASSWORD=geolens-ci-admin-password|' .env
          echo "DATABASE_SSL_MODE=disable" >> .env

      - name: Export admin credentials for E2E
        run: |
          echo "GEOLENS_ADMIN_USERNAME=admin" >> $GITHUB_ENV
          echo "GEOLENS_ADMIN_PASSWORD=geolens-ci-admin-password" >> $GITHUB_ENV

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 120

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npx playwright test e2e/accessibility.spec.ts e2e/keyboard-nav.spec.ts --project=chromium

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: accessibility-playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: accessibility-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Docker Compose logs
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop services
        if: always()
        run: docker compose down
