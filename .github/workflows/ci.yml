name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- detect changed paths for conditional jobs ----------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
            frontend:
              - 'frontend/**'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'e2e/**'
              - 'playwright.config.ts'
              - 'docker-compose*.yml'
            cli:
              - 'cli/**'
              - 'sdks/python/**'

  # ---------- backend ----------
  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  openapi-snapshot:
    name: OpenAPI Snapshot Drift
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET_KEY: openapi-snapshot-padding-key-32chars
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Verify openapi.json is up to date
        run: uv run python scripts/dump_openapi.py --check

  sdks-check:
    name: SDKs Drift Gate
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Match the OpenAPI snapshot job's env so dump_openapi.py runs
      JWT_SECRET_KEY: sdks-check-padding-key-32characters-here
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdks/typescript/package-lock.json

      - name: Install backend dependencies (for dump_openapi.py)
        working-directory: backend
        run: uv sync --locked --dev

      - name: Install TypeScript SDK dependencies (locked)
        working-directory: sdks/typescript
        run: npm ci

      - name: Regenerate SDKs and check for drift
        run: make sdks-check

  # ---------- CLI ----------
  # Phase 216 / OCCLI-06: structural enforcement that the CLI never grows
  # a direct httpx/requests dependency. Runs on cli/** OR sdks/python/**
  # changes (the SDK is the CLI's only HTTP surface — a regression in the
  # SDK can ripple into the CLI through a behavior change in the wrapper).
  cli-test:
    name: CLI Tests
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: cli-test-padding-key-32characters-here
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend (for round-trip test FastAPI app)
        working-directory: backend
        run: uv sync --locked --dev

      - name: Install Python SDK from local path (round-trip dep)
        working-directory: sdks/python
        run: uv pip install -e .

      - name: Install CLI from local path with dev extras
        working-directory: cli
        run: uv pip install -e ".[dev]"

      # OCCLI-06 structural gate (1/2): no direct httpx/requests imports.
      # `grep -rE` returns exit 1 when no matches → success for us; flip
      # to fail if we DID match.
      - name: OCCLI-06 — no httpx/requests imports in cli/geolens_cli/
        working-directory: cli
        run: |
          if grep -rE '^(import|from) (httpx|requests)' geolens_cli/; then
            echo "FAIL: CLI imports httpx or requests directly (OCCLI-06)"
            exit 1
          fi
          echo "OK: zero direct httpx/requests imports in cli/geolens_cli/"

      # OCCLI-06 structural gate (2/2): cli/pyproject.toml declares no
      # httpx or requests dep (transitive via geolens-sdk is fine).
      - name: OCCLI-06 — no httpx/requests in cli/pyproject.toml deps
        working-directory: cli
        run: |
          uv run python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          deps = d['project']['dependencies']
          forbidden = [x for x in deps if 'httpx' in x or 'requests' in x]
          assert not forbidden, f'FAIL: cli/pyproject.toml declares forbidden direct deps: {forbidden}'
          print('OK: no httpx/requests direct deps in cli/pyproject.toml')
          "

      - name: CLI unit tests
        working-directory: cli
        run: uv run pytest -v

      - name: CLI round-trip integration test
        working-directory: backend
        run: uv run pytest tests/test_cli_round_trip.py -v

  backend-test:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_USER: geolens
      POSTGRES_PASSWORD: geolens_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: geolens_test
      # Must be ≥ 32 chars to satisfy the Settings validator (backend/app/config.py).
      JWT_SECRET_KEY: test-secret-key-for-ci-padding-32chars
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: admin
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL with PostGIS + pgvector
        working-directory: .
        run: |
          docker build -t geolens-test-db -f - . <<'DOCKERFILE'
          FROM postgis/postgis:17-3.5
          RUN apt-get update \
              && apt-get install -y --no-install-recommends postgresql-17-pgvector \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run -d --name test-postgres \
            -e POSTGRES_DB=geolens_test \
            -e POSTGRES_USER=geolens \
            -e POSTGRES_PASSWORD=geolens_test \
            -p 5432:5432 \
            geolens-test-db
          for i in $(seq 1 30); do
            if docker exec test-postgres pg_isready -U geolens -d geolens_test >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gdal-bin

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Set up database extensions, roles, and schemas
        run: |
          PGPASSWORD=geolens_test psql -h localhost -U geolens -d geolens_test -c "
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS unaccent;
            CREATE SCHEMA IF NOT EXISTS catalog;
            CREATE SCHEMA IF NOT EXISTS data;
            ALTER DATABASE geolens_test SET search_path TO catalog, data, public;
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'geolens_reader') THEN
                CREATE ROLE geolens_reader NOLOGIN;
              END IF;
            END \$\$;
            GRANT USAGE ON SCHEMA data TO geolens_reader;
            ALTER DEFAULT PRIVILEGES IN SCHEMA data GRANT SELECT ON TABLES TO geolens_reader;
          "

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: uv run pytest -v --tb=short -m 'not perf' --cov=app --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml:coverage.xml --cov-fail-under=58.5

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 14

  # ---------- frontend ----------
  frontend-lint:
    name: Frontend Lint & Typecheck
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Locale parity
        run: npm run test:i18n

      - name: Changed namespaces exist in all languages
        run: npm run check:i18n:changed

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ---------- security ----------
  security-scan:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run bandit (static security analysis)
        run: uv run bandit -r app/ -c pyproject.toml --severity-level high --confidence-level high

      - name: Run pip-audit (dependency vulnerability scan)
        run: uv run pip-audit --strict --desc --ignore-vuln CVE-2026-4539

  # ---------- E2E (disabled to save CI minutes — run locally via `npx playwright test`) ----------
  e2e-test:
    name: E2E Tests
    if: false
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test, security-scan]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env
          # Override the dev defaults with CI-distinct values. JWT_SECRET_KEY must
          # be ≥ 32 chars to satisfy the Settings validator (backend/app/config.py).
          sed -i -E 's|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=geolens_dev|' .env
          sed -i -E 's|^JWT_SECRET_KEY=.*|JWT_SECRET_KEY=e2e-test-secret-key-padding-32chars-min|' .env
          sed -i -E 's|^GEOLENS_ADMIN_PASSWORD=.*|GEOLENS_ADMIN_PASSWORD=admin|' .env
          echo "DATABASE_SSL_MODE=disable" >> .env

      - name: Export admin credentials for E2E
        run: |
          echo "GEOLENS_ADMIN_USERNAME=admin" >> $GITHUB_ENV
          echo "GEOLENS_ADMIN_PASSWORD=admin" >> $GITHUB_ENV

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 120

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Docker Compose logs
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop services
        if: always()
        run: docker compose down
