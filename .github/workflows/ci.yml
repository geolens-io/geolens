name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_USER: geolens
      POSTGRES_PASSWORD: geolens_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: geolens_test
      JWT_SECRET_KEY: test-secret-key-for-ci
      GEOLENS_ADMIN_USERNAME: admin
      GEOLENS_ADMIN_PASSWORD: admin
    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL with PostGIS + pgvector
        working-directory: .
        run: |
          docker build -t geolens-test-db -f - . <<'DOCKERFILE'
          FROM postgis/postgis:17-3.5
          RUN apt-get update \
              && apt-get install -y --no-install-recommends postgresql-17-pgvector \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          docker run -d --name test-postgres \
            -e POSTGRES_DB=geolens_test \
            -e POSTGRES_USER=geolens \
            -e POSTGRES_PASSWORD=geolens_test \
            -p 5432:5432 \
            geolens-test-db
          for i in $(seq 1 30); do
            if docker exec test-postgres pg_isready -U geolens -d geolens_test >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gdal-bin

      - name: Install Python dependencies
        run: uv sync --locked --dev

      - name: Set up database extensions, roles, and schemas
        run: |
          PGPASSWORD=geolens_test psql -h localhost -U geolens -d geolens_test -c "
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE SCHEMA IF NOT EXISTS catalog;
            CREATE SCHEMA IF NOT EXISTS data;
            ALTER DATABASE geolens_test SET search_path TO catalog, data, public;
            DO \$\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'geolens_reader') THEN
                CREATE ROLE geolens_reader NOLOGIN;
              END IF;
            END \$\$;
            GRANT USAGE ON SCHEMA data TO geolens_reader;
            ALTER DEFAULT PRIVILEGES IN SCHEMA data GRANT SELECT ON TABLES TO geolens_reader;
          "

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=app --cov-report=term-missing --cov-report=html:htmlcov --cov-report=xml:coverage.xml

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 14

  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Locale parity
        run: npm run test:i18n

      - name: Changed namespaces exist in all languages
        run: npm run check:i18n:changed

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run bandit (static security analysis)
        run: uv run bandit -r app/ -c pyproject.toml --severity-level high --confidence-level high

      - name: Run pip-audit (dependency vulnerability scan)
        run: uv run pip-audit --strict --desc --ignore-vuln CVE-2026-4539

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test, security-scan]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=$/POSTGRES_PASSWORD=geolens_dev/' .env
          sed -i 's/^JWT_SECRET_KEY=$/JWT_SECRET_KEY=e2e-test-secret-key/' .env
          sed -i 's/^GEOLENS_ADMIN_PASSWORD=$/GEOLENS_ADMIN_PASSWORD=admin/' .env

      - name: Export admin credentials for E2E
        run: |
          echo "GEOLENS_ADMIN_USERNAME=admin" >> $GITHUB_ENV
          echo "GEOLENS_ADMIN_PASSWORD=admin" >> $GITHUB_ENV

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 120

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Docker Compose logs
        if: failure()
        run: docker compose logs --tail=200

      - name: Stop services
        if: always()
        run: docker compose down
