name: Publish Images

on:
  push:
    tags:
      - "v*.*.*"
  # Manual trigger to exercise the build + multi-arch Trivy gate on demand.
  # Default is a SCAN-ONLY dry run (no push) — the amd64 + arm64 images are
  # built and Trivy-scanned, but the push/SBOM/attest steps are skipped. Set
  # push_images=true only to perform a real manual publish.
  workflow_dispatch:
    inputs:
      push_images:
        description: "Also push images to GHCR (real publish). Leave false for a scan-only dry run."
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Build & Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: geolens-api
            target: api
            description: "PostGIS-native GIS data catalog API"
          - image: geolens-worker
            target: worker
            description: "PostGIS-native GIS data catalog worker"
          - image: geolens-frontend
            target: frontend
            description: "PostGIS-native GIS data catalog frontend"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=Apache-2.0

      # Gate BOTH published arches on Trivy. `load: true` can only materialize a
      # single-platform image, so amd64 and arm64 are built + scanned separately
      # (QEMU is set up above for the arm64 build). The push below ships
      # linux/amd64,linux/arm64, so each arch must clear the gate first.
      - name: Build amd64 image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.image }}:scan-amd64
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Trivy vulnerability scan (amd64)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan-amd64
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Build arm64 image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/arm64
          load: true
          tags: ${{ matrix.image }}:scan-arm64
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Trivy vulnerability scan (arm64)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan-arm64
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Push multi-arch images — only on a tag push, or a manual run with
      # push_images=true. Skipped on the scan-only dry run (both scans above
      # still execute, so the gate is exercised without publishing).
      - name: Build and push
        id: push
        if: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      # Generate SBOM from pushed image (only when we actually pushed)
      - name: Generate SBOM
        if: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
          output-file: sbom-${{ matrix.image }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      # Attest SBOM to the published image (only when we pushed AND repo is public)
      - name: Attest SBOM
        if: ${{ (github.event_name == 'push' || github.event.inputs.push_images == 'true') && !github.event.repository.private }}
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom-${{ matrix.image }}.spdx.json
          push-to-registry: true
