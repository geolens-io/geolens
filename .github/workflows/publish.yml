name: Publish Images

on:
  push:
    tags:
      - "v*.*.*"
  # Manual trigger to exercise the build + multi-arch Trivy gate on demand.
  # Default is a SCAN-ONLY dry run (no push) — the amd64 + arm64 images are
  # built and Trivy-scanned, but the push/SBOM/attest steps are skipped.
  # push_images=true performs a real manual publish and MUST be run from a tag
  # ref (the metadata step emits only type=semver tags, which require a semver
  # Git tag): `gh workflow run publish.yml --ref vX.Y.Z -f push_images=true`.
  # A guard step below fails fast if push_images=true is dispatched off a branch.
  workflow_dispatch:
    inputs:
      push_images:
        description: "Real publish to GHCR — REQUIRES a tag ref (--ref vX.Y.Z). Leave false for a scan-only dry run."
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Build & Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: geolens-api
            target: api
            description: "PostGIS-native GIS data catalog API"
          - image: geolens-worker
            target: worker
            description: "PostGIS-native GIS data catalog worker"
          - image: geolens-frontend
            target: frontend
            description: "PostGIS-native GIS data catalog frontend"
          - image: geolens-backup
            target: backup
            description: "Automated pg_dump backup service with S3 offload"
            # Report-only Trivy gate (exit 0): the postgres:17 base is an
            # uncontrollable upstream fat image whose CRITICAL/HIGH CVEs we can't
            # patch on our cadence (same policy as the postgis db image in
            # dep-audit.yml). The scan still runs and prints findings to the log;
            # it just doesn't block the release. Base churn is tracked separately.
            scan_exit_code: '0'

    steps:
      # Fail fast (with guidance) if a real manual publish is dispatched off a
      # branch — type=semver emits no tags there, so the push would otherwise
      # fail later with a cryptic empty-tags buildx error. Tag pushes and the
      # scan-only dry run (push_images=false) are unaffected.
      - name: Require a tag ref for manual publishes
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_images == 'true' && github.ref_type != 'tag' }}
        run: |
          echo "::error::push_images=true requires a tag ref so metadata-action can emit semver tags. Re-run as: gh workflow run publish.yml --ref vX.Y.Z -f push_images=true"
          exit 1

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # `latest` only on a real GA tag — exclude prereleases (a `-rc`/`-beta`
            # suffix). Otherwise a `v1.4.0-rc.1` push clobbers `:latest` with an
            # unreleased candidate (same spirit as #325 gating release.yml's
            # isPrerelease). Fresh `:latest` pulls must track the last GA.
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # Gate BOTH published arches on Trivy. `load: true` can only materialize a
      # single-platform image, so amd64 and arm64 are built + scanned separately
      # (QEMU is set up above for the arm64 build). The push below ships
      # linux/amd64,linux/arm64, so each arch must clear the gate first.
      - name: Build amd64 image for scanning
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64
          load: true
          tags: ${{ matrix.image }}:scan-amd64
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Trivy vulnerability scan (amd64)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan-amd64
          format: table
          exit-code: ${{ matrix.scan_exit_code || '1' }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Build arm64 image for scanning
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/arm64
          load: true
          tags: ${{ matrix.image }}:scan-arm64
          cache-from: type=gha,scope=${{ matrix.image }}

      - name: Trivy vulnerability scan (arm64)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan-arm64
          format: table
          exit-code: ${{ matrix.scan_exit_code || '1' }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Push multi-arch images — only on a tag push, or a manual run with
      # push_images=true. Skipped on the scan-only dry run (both scans above
      # still execute, so the gate is exercised without publishing).
      - name: Build and push
        id: push
        if: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # fix(#441): stamp the exact commit into the image so /api/health can
          # report it (`build` field). Only the pushed image needs it; the
          # scan-only builds above stay cache-stable without it.
          build-args: |
            GEOLENS_BUILD_SHA=${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      # Generate SBOM from pushed image (only when we actually pushed)
      - name: Generate SBOM
        if: ${{ github.event_name == 'push' || github.event.inputs.push_images == 'true' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
          output-file: sbom-${{ matrix.image }}.spdx.json
          upload-artifact: false
          upload-release-assets: false

      # Attest SBOM to the published image (only when we pushed AND repo is public)
      - name: Attest SBOM
        if: ${{ (github.event_name == 'push' || github.event.inputs.push_images == 'true') && !github.event.repository.private }}
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom-${{ matrix.image }}.spdx.json
          push-to-registry: true
