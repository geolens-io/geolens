name: Publish Images

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    name: Build & Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: geolens-api
            context: ./backend
            description: "PostGIS-native GIS data catalog API"
          - image: geolens-frontend
            context: ./frontend
            description: "PostGIS-native GIS data catalog frontend"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=Apache-2.0

      # Build local image for security scanning (single platform)
      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          load: true
          tags: ${{ matrix.image }}:scan
          cache-from: type=gha,scope=${{ matrix.image }}

      # Fail on HIGH/CRITICAL vulnerabilities before pushing
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # Push multi-arch images (only runs if scan passes)
      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      # Generate SBOM from pushed image
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
          output-file: sbom-${{ matrix.image }}.spdx.json

      # Attest SBOM to the published image
      - name: Attest SBOM
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom-${{ matrix.image }}.spdx.json
          push-to-registry: true
