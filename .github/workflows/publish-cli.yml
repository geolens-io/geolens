# Manual-trigger publish workflow for the GeoLens CLI.
# Phase 228 ships the cold-start credentials:
#   1. PyPI Trusted Publishing configured for `geolens` (CLI) at https://pypi.org/manage/account/publishing/
#   2. The maintainer claims the `geolens` PyPI name (one-time, automatic on first publish via pending-publisher OIDC)
# See docs/cli.md (§Publishing) for the full first-publish runbook.
name: Publish CLI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish'
        required: false
        type: boolean
        default: false
      force_publish:
        description: 'Override pre-flight gate (allow re-publishing over an existing version). Only set true after confirming the existing version is intentionally being re-published.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write  # for PyPI Trusted Publishing (Phase 228 — active)

jobs:
  publish-cli:
    name: Publish geolens CLI to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.2"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel + sdist
        working-directory: cli
        run: uv build

      - name: List built artifacts
        working-directory: cli
        run: ls -la dist/

      - name: Pre-flight name-availability gate (geolens on PyPI)
        if: ${{ !inputs.dry_run }}
        run: |
          set -e
          if pip3 index versions geolens 2>&1 | grep -q "No matching distribution"; then
            echo "PyPI geolens: unclaimed (safe to publish)"
          elif [ "${{ inputs.force_publish }}" = "true" ]; then
            CURRENT=$(pip3 index versions geolens 2>&1 | head -1)
            echo "::warning::PyPI geolens already published: $CURRENT — force_publish=true override active; proceeding"
          else
            CURRENT=$(pip3 index versions geolens 2>&1 | head -1)
            echo "::error::PyPI geolens already published: $CURRENT. Refusing to publish without explicit force_publish=true input. If this is an intentional re-publish, re-run the workflow with force_publish=true."
            exit 1
          fi

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        working-directory: cli
        run: uv publish --trusted-publishing automatic
