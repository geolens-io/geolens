# Clean-machine smoke verification of published GeoLens packages.
#
# Runs automatically after the gated SDK/CLI publishes complete (workflow_run,
# below), and can be run manually any time. Jobs run inside fresh Docker images
# (python:3.13-slim, node:22-slim) — no repo context, no runner pollution; mimics
# what a downstream user gets. Each check polls with a bounded retry to absorb
# registry/CDN propagation lag.
#
# Manual usage:
#   gh workflow run verify-published.yml -f version=vX.Y.Z
# Omit version (or pass 'latest') to verify whatever each registry calls latest.
#
# This intentionally does NOT trigger on `push: tags`. On a tag push the GHCR
# images are still building and the PyPI/npm publishes are still waiting on the
# `publish` environment's approval gate, so a tag-triggered run would always
# race/expire. Triggering after the publishes finish is the correct ordering.
# See docs.getgeolens.com for the release runbook.
name: Verify Published Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to verify (e.g. v1.2.4; default: latest)'
        required: false
        type: string
        default: 'latest'
  # Auto-run after a gated publish completes. The two publish workflows finish at
  # different times; the concurrency group below collapses the duplicate triggers
  # into a single verify run once both are done.
  workflow_run:
    workflows: ["Publish SDKs", "Publish CLI"]
    types: [completed]

permissions:
  contents: read

# Collapse the two publish-completion triggers (and any manual run) for the same
# version into one in-flight verify; a later trigger supersedes an earlier one.
concurrency:
  group: verify-published-${{ inputs.version || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: true

env:
  # Manual dispatch → the version input. workflow_run after a tag publish →
  # head_branch is the tag (e.g. v1.2.4), used only when it looks like a version
  # tag; a non-tag publish (e.g. dispatched from a branch) falls back to 'latest'.
  VERIFY_VERSION: ${{ inputs.version || (startsWith(github.event.workflow_run.head_branch, 'v') && github.event.workflow_run.head_branch) || 'latest' }}
  # Bounded retry to absorb registry/CDN propagation lag after a publish.
  # 20 × 15s ≈ 5 min ceiling per check.
  MAX_ATTEMPTS: '20'
  RETRY_DELAY: '15'

jobs:
  verify-python:
    # Manual dispatch always runs; an auto-trigger only runs if the publish succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Verify Python packages on python:3.13-slim
    runs-on: ubuntu-latest
    steps:
      - name: pip install + smoke import (geolens SDK + geolens-cli)
        env:
          VERSION: ${{ env.VERIFY_VERSION }}
        run: |
          if [ "${VERSION}" = "latest" ]; then
            SDK_SPEC="geolens"
            CLI_SPEC="geolens-cli"
          else
            PACKAGE_VERSION="${VERSION#v}"
            SDK_SPEC="geolens==${PACKAGE_VERSION}"
            CLI_SPEC="geolens-cli==${PACKAGE_VERSION}"
          fi

          attempt=1
          while true; do
            if docker run --rm \
              -e SDK_SPEC="${SDK_SPEC}" \
              -e CLI_SPEC="${CLI_SPEC}" \
              python:3.13-slim sh -c '
              pip install --no-cache-dir "${SDK_SPEC}" "${CLI_SPEC}" &&
              geolens --version &&
              python -c "from geolens import GeolensClient; print(GeolensClient)"
            '; then
              echo "verified ${SDK_SPEC} + ${CLI_SPEC} on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -ge "${MAX_ATTEMPTS}" ]; then
              echo "::error::${SDK_SPEC} / ${CLI_SPEC} not installable after ${attempt} attempts (~$((MAX_ATTEMPTS * RETRY_DELAY))s)"
              exit 1
            fi
            echo "attempt ${attempt}/${MAX_ATTEMPTS} failed; retrying in ${RETRY_DELAY}s (registry may still be propagating)"
            attempt=$((attempt + 1))
            sleep "${RETRY_DELAY}"
          done

  verify-typescript:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Verify TypeScript package on node:22-slim
    runs-on: ubuntu-latest
    steps:
      - name: npm install + smoke import (@geolens/sdk)
        env:
          VERSION: ${{ env.VERIFY_VERSION }}
        run: |
          if [ "${VERSION}" = "latest" ]; then
            SDK_SPEC="@geolens/sdk"
          else
            PACKAGE_VERSION="${VERSION#v}"
            SDK_SPEC="@geolens/sdk@${PACKAGE_VERSION}"
          fi

          attempt=1
          while true; do
            if docker run --rm \
              -e SDK_SPEC="${SDK_SPEC}" \
              node:22-slim sh -c '
              mkdir -p /tmp/geolens-sdk-smoke &&
              cd /tmp/geolens-sdk-smoke &&
              npm init -y >/dev/null &&
              npm install --no-save "${SDK_SPEC}" &&
              node -e "import(\"@geolens/sdk\").then(m => { if (typeof m.createGeolensClient !== \"function\") throw new Error(\"createGeolensClient export missing\"); console.log(\"createGeolensClient export ok\") })"
            '; then
              echo "verified ${SDK_SPEC} on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -ge "${MAX_ATTEMPTS}" ]; then
              echo "::error::${SDK_SPEC} not installable after ${attempt} attempts (~$((MAX_ATTEMPTS * RETRY_DELAY))s)"
              exit 1
            fi
            echo "attempt ${attempt}/${MAX_ATTEMPTS} failed; retrying in ${RETRY_DELAY}s (registry may still be propagating)"
            attempt=$((attempt + 1))
            sleep "${RETRY_DELAY}"
          done

  verify-ghcr:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Verify GHCR images
    runs-on: ubuntu-latest
    steps:
      - name: docker pull public API and frontend images
        env:
          VERSION: ${{ env.VERIFY_VERSION }}
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ "${VERSION}" = "latest" ]; then
            IMAGE_TAG="latest"
          else
            IMAGE_TAG="${VERSION#v}"
          fi

          attempt=1
          while true; do
            if docker pull "ghcr.io/${OWNER}/geolens-api:${IMAGE_TAG}" \
              && docker pull "ghcr.io/${OWNER}/geolens-frontend:${IMAGE_TAG}"; then
              echo "verified geolens-api + geolens-frontend @ ${IMAGE_TAG} on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -ge "${MAX_ATTEMPTS}" ]; then
              echo "::error::GHCR images @ ${IMAGE_TAG} not pullable after ${attempt} attempts (~$((MAX_ATTEMPTS * RETRY_DELAY))s)"
              exit 1
            fi
            echo "attempt ${attempt}/${MAX_ATTEMPTS} failed; retrying in ${RETRY_DELAY}s (images may still be building/propagating)"
            attempt=$((attempt + 1))
            sleep "${RETRY_DELAY}"
          done

  verify-github-release:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Verify GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Check release exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ env.VERIFY_VERSION }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${VERSION}" = "latest" ]; then
            VIEW_ARGS=""
          else
            case "${VERSION}" in
              v*) TAG="${VERSION}" ;;
              *) TAG="v${VERSION}" ;;
            esac
            VIEW_ARGS="${TAG}"
          fi

          attempt=1
          while true; do
            if gh release view ${VIEW_ARGS} --repo "${REPOSITORY}" --json tagName,isDraft,isPrerelease,url; then
              echo "release verified on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -ge "${MAX_ATTEMPTS}" ]; then
              echo "::error::release ${VIEW_ARGS:-latest} not found after ${attempt} attempts (~$((MAX_ATTEMPTS * RETRY_DELAY))s)"
              exit 1
            fi
            echo "attempt ${attempt}/${MAX_ATTEMPTS} failed; retrying in ${RETRY_DELAY}s"
            attempt=$((attempt + 1))
            sleep "${RETRY_DELAY}"
          done
