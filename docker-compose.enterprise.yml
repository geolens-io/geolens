# Enterprise overlay: mount the private enterprise package into containers.
# Usage: docker compose -f docker-compose.yml -f docker-compose.enterprise.yml up
services:
  api:
    volumes:
      - ../geolens-enterprise:/enterprise
    environment:
      GEOLENS_ENTERPRISE_PATH: /enterprise
      GEOLENS_EDITION: "${GEOLENS_EDITION:-enterprise}"
      # AWS Marketplace metering — read by MarketplaceBillingExtension in
      # geolens-enterprise (Phase 223). Inert without the overlay loaded.
      AWS_MARKETPLACE_PRODUCT_CODE: "${AWS_MARKETPLACE_PRODUCT_CODE:-}"
      AWS_MARKETPLACE_PUBLIC_KEY_VERSION: "${AWS_MARKETPLACE_PUBLIC_KEY_VERSION:-1}"

  worker:
    volumes:
      - ../geolens-enterprise:/enterprise
    environment:
      GEOLENS_ENTERPRISE_PATH: /enterprise
      GEOLENS_EDITION: "${GEOLENS_EDITION:-enterprise}"

  migrate:
    volumes:
      - ../geolens-enterprise:/enterprise
    environment:
      GEOLENS_ENTERPRISE_PATH: /enterprise
      GEOLENS_EDITION: "${GEOLENS_EDITION:-enterprise}"
    command: >
      sh -c "
        if [ -d /enterprise ] && [ -f /enterprise/pyproject.toml ]; then
          echo 'Installing enterprise extensions for migration...' &&
          uv add --editable /enterprise 2>&1 || true;
        fi &&
        uv run alembic upgrade head
      "
