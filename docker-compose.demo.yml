# ==============================================================================
# GeoLens Demo Overlay
#
# Usage:
#   cp .env.demo .env
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d
#
# This overlay:
#   - Adds a seeder service that populates sample data on first run
#   - Adds a reset service that restores demo data every 24 hours
#   - Reduces upload limits for public demo safety
#   - Disables hot-reload and clears dev bind mounts (production-like API, worker, frontend)
# ==============================================================================

services:
  api:
    # Clear dev bind mounts — use code baked into the image
    volumes:
      - upload_staging:/app/staging
    # Production command — no --reload — UVICORN_WORKERS may be >1.
    # All continuation lines at the same indent so YAML `>` folds newlines
    # to single spaces; mismatched indent preserves them and sh sees a
    # multi-line script (uvicorn binds to its 127.0.0.1 default and the
    # frontend container can't reach api). `--no-dev` is required because
    # `read_only: true` (Phase 272) blocks uv from mutating /app/.venv to
    # install dev deps that the prod image was built without.
    command: >
      sh -c "uv run --no-dev uvicorn app.api.main:app
      --host 0.0.0.0 --port 8000
      --workers $${UVICORN_WORKERS:-2}
      --timeout-keep-alive $${UVICORN_TIMEOUT_KEEP_ALIVE:-5}
      --timeout-graceful-shutdown $${UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN:-30}"
    environment:
      # 300 MB so the seeder can upload the downsampled NE shaded relief
      # (~100 MB) and the UCDP GED CSV subset (~130 MB). Interactive uploads
      # from the public demo UI are still gated by their own per-request
      # limit; this setting only affects the seeder container pathway.
      UPLOAD_MAX_SIZE_MB: "300"
      # Phase 268 H-19: explicit opt-in to allow .env.demo defaults. Without
      # this flag, the api refuses to boot with public-demo credentials.
      GEOLENS_DEMO_MODE: "true"

  worker:
    # Clear dev bind mounts for worker too
    volumes:
      - upload_staging:/app/staging
    environment:
      # Phase 268 H-19: workers also load Settings(), so they need the same
      # demo-mode opt-in to start with .env.demo defaults.
      GEOLENS_DEMO_MODE: "true"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    # !override fully replaces the dev mapping ("8080:5173") with the prod
    # mapping ("8080:8080"). Compose's default merge would concatenate both
    # entries, causing host port 8080 to be bound twice and the container to
    # fail with "Bind for 0.0.0.0:8080 failed: port is already allocated".
    ports: !override
      - "${FRONTEND_PORT:-8080}:8080"
    volumes: !override []
    healthcheck:
      # Demo/prod frontend is nginx on 8080, not the dev Vite server on 5173.
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

  seeder:
    # Multi-stage seeder image (Plan 218-05) — bakes every Theme 1/2/3
    # dataset into the image at build time so runtime makes zero outbound
    # network calls. ENTRYPOINT is set in the Dockerfile (run-seeder.sh).
    build:
      context: .
      dockerfile: docker/seeder/Dockerfile
    environment:
      GEOLENS_ADMIN_USERNAME: ${GEOLENS_ADMIN_USERNAME}
      GEOLENS_ADMIN_PASSWORD: ${GEOLENS_ADMIN_PASSWORD}
      GEOLENS_BASE_URL: "http://api:8000"
    # No volume mount — scripts and data are baked into the seeder image.
    depends_on:
      api:
        condition: service_healthy
      worker:
        # Ingest jobs are processed by the Procrastinate worker — the seeder
        # needs both the API (for POST /api/ingest/*) and the worker (to
        # drain the queue) before submitting any jobs. Without this, a
        # cold-start race can leave submitted jobs stuck pending.
        condition: service_healthy
    # Seeder is idempotent on datasets (skips existing) so retries are safe.
    # Guards against transient API slowness / DB not-ready at first boot.
    restart: on-failure:3

  reset:
    image: postgis/postgis:17-3.5
    entrypoint: ["/scripts/reset-demo.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      POSTGRES_HOST: db
      RESET_INTERVAL_HOURS: "${RESET_INTERVAL_HOURS:-24}"
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
