# ==============================================================================
# GeoLens Demo Overlay
#
# Usage:
#   cp .env.demo .env
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d
#
# This overlay:
#   - Adds a seeder service that populates sample data on first run
#   - Adds a reset service that restores demo data every 24 hours
#   - Reduces upload limits for public demo safety
#   - Disables hot-reload (production-like frontend)
# ==============================================================================

services:
  api:
    environment:
      UPLOAD_MAX_SIZE_MB: "50"

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes: []
    depends_on:
      api:
        condition: service_healthy

  seeder:
    build:
      context: ./backend
    entrypoint: ["/scripts/seed-demo.sh"]
    environment:
      GEOLENS_ADMIN_USERNAME: ${GEOLENS_ADMIN_USERNAME}
      GEOLENS_ADMIN_PASSWORD: ${GEOLENS_ADMIN_PASSWORD}
      GEOLENS_BASE_URL: "http://api:8000"
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  reset:
    image: postgis/postgis:17-3.5
    entrypoint: ["/scripts/reset-demo.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-geolens}
      POSTGRES_HOST: db
      RESET_INTERVAL_HOURS: "${RESET_INTERVAL_HOURS:-24}"
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
